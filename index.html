<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; }
        .carousel-track { display: flex; transition: transform 0.7s ease-in-out; width: 100%; }
        .carousel-page { 
            min-width: 100%; display: flex !important; flex-wrap: nowrap; flex-direction: row !important; 
            padding: 1.5rem 1rem; gap: 10px; justify-content: space-between;
        }
        .economic-section { background-color: #dcfce7; border: 1px solid #bbf7d0; border-radius: 1.5rem; }
        .indicator-item { 
            flex: 1; background-color: #1e293b; color: white; padding: 15px 5px; border-radius: 12px;
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 165px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); min-width: 0;
        }
        .modal-table td, .modal-table th { border: 1px solid #e2e8f0; padding: 10px; text-align: left; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-6">
    <header class="mb-6 flex justify-between items-end border-b-2 border-blue-900 pb-4">
        <div>
            <h1 class="text-xl md:text-3xl font-black text-blue-900 uppercase italic">Hệ Thống Chỉ Số Điều Hành 2026</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px] md:text-xs">Ủy ban nhân dân xã Bình Hưng</p>
        </div>
        <div id="clock" class="text-xl md:text-3xl font-mono font-bold text-blue-700">00:00:00</div>
    </header>

    <section class="mb-8 economic-section overflow-hidden">
        <div class="p-4 bg-white/40 flex justify-between items-center border-b border-green-200 px-4 md:px-6">
            <h3 class="font-bold text-green-900 uppercase text-[10px] md:text-xs tracking-wider">📊 Chỉ tiêu KT-XH chủ yếu</h3>
            <span id="page-num" class="font-mono text-[10px] font-bold text-green-700 bg-green-200/50 px-3 py-1 rounded-full border border-green-300">TRANG 1/6</span>
        </div>
        <div class="overflow-hidden"><div id="carouselTrack" class="carousel-track"></div></div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">
        <div onclick="openDonThuModal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-red-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">📂 Đơn thư (Chi tiết)</h4>
            <div class="space-y-3">
                <div class="flex justify-between items-end"><span class="text-sm font-bold text-slate-600">Tổng số:</span><span id="dt_tong" class="text-3xl font-black text-blue-900">0</span></div>
                <div class="grid grid-cols-2 gap-2 text-[11px] font-bold uppercase text-center">
                    <div class="bg-emerald-50 p-2 rounded text-emerald-700">Xong: <span id="dt_da_giai_quyet" class="block text-lg">0</span></div>
                    <div class="bg-orange-50 p-2 rounded text-orange-700">Đang xử lý: <span id="dt_dang_giai_quyet" class="block text-lg">0</span></div>
                </div>
            </div>
        </div>
        <div onclick="open1022Modal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-orange-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">📞 Phản ánh 1022</h4>
            <div class="space-y-2">
                <div class="flex justify-between border-b pb-1"><span class="text-sm text-slate-600 font-bold">Tổng:</span><span id="pa_1022_tong" class="text-xl font-black text-orange-600">0</span></div>
                <div class="text-[11px] font-bold">
                    <div class="flex justify-between text-emerald-600 mb-1"><span>+ Đã GQ:</span><span id="pa_1022_xong">0</span></div>
                    <div class="flex justify-between text-red-600"><span>+ Chờ:</span><span id="pa_1022_cho">0</span></div>
                </div>
            </div>
        </div>
        <div onclick="openHoSoModal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-blue-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">📋 Hồ sơ TTHC</h4>
            <div class="mb-2 space-y-1">
                <div class="text-3xl font-black text-blue-900 leading-tight"><span id="hs_tong_hien_thi">0</span> hồ sơ</div>
                <div class="text-sm font-bold text-slate-600">Đúng hạn: <span id="hs_dh_count_hien_thi">0</span> <span id="hs_dh_rate_hien_thi" class="text-emerald-600 text-xs">(0%)</span></div>
            </div>
            <div class="pt-2 border-t text-[11px] font-bold text-slate-400">Trực tuyến: <span id="hs_ol_count_hien_thi">0</span> <span id="hs_ol_rate_hien_thi" class="text-blue-600">(0%)</span></div>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-emerald-500 text-center flex flex-col justify-center">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">⚖️ Văn bản chỉ đạo</h4>
            <div id="vb_tong" class="text-5xl font-black text-emerald-700">0</div>
        </div>
    </div>

    <div id="hoSoModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">...</div>
    <div id="donThuModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-2 backdrop-blur-sm">...</div>
    <div id="modal1022" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-2 backdrop-blur-sm">...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4",
            authDomain: "dashboard-demo-ce0da.firebaseapp.com",
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-demo-ce0da",
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        
        // DANH SÁCH CHỈ TIÊU & KẾ HOẠCH TỪ EXCEL
        const indicators = [
            { id: "ct_1", ten: "Tốc độ tăng tổng giá trị SX", kh: "10.5%", dv: "%" },
            { id: "ct_2", ten: "Tổng thu ngân sách nhà nước", kh: "100%", dv: "Tr.đ" },
            { id: "ct_3", ten: "Tỷ lệ giải ngân vốn ĐTC", kh: "≥95%", dv: "%" },
            { id: "ct_4", ten: "Tỷ lệ dân số tham gia BHYT", kh: "≥95%", dv: "%" },
            { id: "ct_5", ten: "Lao động tham gia BHXH", kh: "59.5%", dv: "%" },
            { id: "ct_6", ten: "Trường Mầm non đạt chuẩn QG", kh: "27%", dv: "%" },
            { id: "ct_7", ten: "Trường Tiểu học đạt chuẩn QG", kh: "32%", dv: "%" },
            { id: "ct_8", ten: "Trường THCS đạt chuẩn QG", kh: "43%", dv: "%" },
            { id: "ct_9", ten: "Số phòng học/10.000 dân", kh: "460", dv: "Phòng" },
            { id: "ct_10", ten: "Tỉ lệ hoàn thành cấp THCS", kh: "99%", dv: "%" },
            { id: "ct_11", ten: "Giảm hộ nghèo đa chiều", kh: "-", dv: "Hộ" },
            { id: "ct_12", ten: "Tiêu chí đạt chuẩn NTM", kh: "≥3", dv: "TC" },
            { id: "ct_13", ten: "Tỷ lệ ấp văn hóa", kh: "95%", dv: "%" },
            { id: "ct_14", ten: "Tỷ lệ gia đình văn hóa", kh: "93%", dv: "%" },
            { id: "ct_15", ten: "Trẻ em tiêm chủng đầy đủ", kh: "≥95%", dv: "%" },
            { id: "ct_16", ten: "LĐ được giới thiệu việc làm", kh: "1000", dv: "Ng" },
            { id: "ct_17", phan: "Mô hình du lịch địa phương", kh: "01", dv: "MH" },
            { id: "ct_18", ten: "Tỷ lệ dân số dùng nước sạch", kh: "100%", dv: "%" },
            { id: "ct_19", ten: "Thu gom chất thải rắn sinh hoạt", kh: "100%", dv: "%" },
            { id: "ct_20", ten: "Chất thải y tế xử lý đạt chuẩn", kh: "100%", dv: "%" },
            { id: "ct_21", ten: "Xử lý nước thải công nghiệp", kh: "100%", dv: "%" },
            { id: "ct_22", ten: "Giải quyết hồ sơ đúng hạn", kh: "99.51%", dv: "%" },
            { id: "ct_23", ten: "Sử dụng chữ ký số công vụ", kh: "100%", dv: "%" },
            { id: "ct_24", ten: "Tuyển chọn gọi công dân nhập ngũ", kh: "31", dv: "Ng" },
            { id: "ct_25", ten: "Giảm tội phạm trật tự xã hội", kh: "-10%", dv: "%" },
            { id: "ct_26", ten: "Tỷ lệ khám phá án hình sự", kh: ">80%", dv: "%" },
            { id: "ct_27", ten: "Kéo giảm tai nạn giao thông", kh: "-5%", dv: "%" },
            { id: "ct_28", ten: "Không cháy nổ nghiêm trọng", kh: "0", dv: "Vụ" },
            { id: "ct_29", ten: "Địa phương ko phức tạp ma túy", kh: "Đạt", dv: "Đạt" },
            { id: "ct_30", ten: "Xử lý phản ánh đúng hạn", kh: "≥50%", dv: "%" }
        ];

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const data = snap.val(); if(!data) return;
            // 1. CAROUSEL CHỈ TIÊU (Sửa logic hiển thị DV)
            if(data.chi_tieu) {
                indicators.forEach(it => { it.th = data.chi_tieu[it.id] || 0; });
                renderUI();
            }
            // 2. HỒ SƠ TTHC, ĐƠN THƯ, 1022, VĂN BẢN (Giữ nguyên logic xử lý của bạn)
            const hs = data.ho_so || {};
            const hs_tong = hs.tong || 0;
            const hs_dh_count = hs.dung_han_count || 0;
            const hs_ol_count = hs.truc_tuyen || 0;
            const hs_da_gq = hs.da_giai_quyet || 0;
            document.getElementById('hs_tong_hien_thi').innerText = hs_tong.toLocaleString('vi-VN');
            document.getElementById('hs_dh_count_hien_thi').innerText = hs_dh_count.toLocaleString('vi-VN');
            document.getElementById('hs_dh_rate_hien_thi').innerText = `(${(hs_tong > 0 ? (hs_dh_count/hs_tong*100).toFixed(1) : 0)}%)`;
            document.getElementById('vb_tong').innerText = data.van_ban?.tong || 0;
            // (Các dòng update ID khác giữ nguyên...)
        });

        function renderUI() {
            const track = document.getElementById('carouselTrack'); track.innerHTML = '';
            for(let i=0; i < 6; i++) {
                const page = document.createElement('div'); page.className = 'carousel-page';
                page.innerHTML = indicators.slice(i*5, (i+1)*5).map(it => `
                    <div class="indicator-item">
                        <div class="text-[9px] uppercase font-bold text-slate-400 mb-1 leading-tight h-8 flex items-center justify-center text-center px-1">${it.ten || it.phan}</div>
                        <div class="text-3xl md:text-5xl font-black text-white">${it.th}<span class="text-xs font-normal text-slate-400 ml-1">${it.dv}</span></div>
                        <div class="text-[10px] md:text-[11px] mt-2 text-emerald-400 font-black uppercase italic tracking-tighter">Kế hoạch: ${it.kh}</div>
                    </div>
                `).join('');
                track.appendChild(page);
            }
        }
        
        // Logic điều hướng carousel giữ nguyên
        let curPage = 0;
        setInterval(() => {
            curPage = (curPage + 1) % 6;
            const track = document.getElementById('carouselTrack');
            if(track) track.style.transform = `translateX(-${curPage*100}%)`;
            document.getElementById('page-num').innerText = `TRANG ${curPage+1}/6`;
        }, 10000);

        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'), 1000);
    </script>
</body>
</html>

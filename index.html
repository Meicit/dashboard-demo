<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thông tin & Điều hành số Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #031b4e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 📹 VIDEO INTRO TRÀN MÀN HÌNH CHUẨN ĐỒNG BỘ */
        .bg-video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-video-content {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Lớp phủ tối mờ bảo vệ tầm nhìn chữ */
        .video-overlay-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(11, 74, 143, 0.8) 0%, rgba(3, 27, 74, 0.85) 100%);
            z-index: 1;
        }

        .fade-out-system {
            opacity: 0;
            transform: scale(1.03);
            filter: blur(10px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
    </style>
</head>
<body class="select-none" id="body-context">

    <div class="bg-video-container">
        <div class="video-overlay-mesh"></div>
        <video id="intro-video-player" class="bg-video-content" autoplay muted playsinline preload="auto">
            <source src="intro.mp4" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ phát thẻ video.
        </video>
    </div>

    <div id="intro-container" class="max-w-4xl w-full mx-auto px-6 text-center space-y-8 z-10 transition-all duration-700">
        
        <div class="flex justify-center animate-pulse">
            <img src="logo.png" alt="Logo Xã Bình Hưng" class="w-24 h-auto filter drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
        </div>

        <div class="space-y-3">
            <p class="text-cyan-300 font-bold text-xs md:text-sm uppercase tracking-[0.3em] m-0">ỦY BAN NHÂN DÂN XÃ BÌNH HƯNG</p>
            <h1 class="text-3xl md:text-5xl lg:text-6xl font-black uppercase tracking-[0.2em] text-white font-['Montserrat'] leading-tight drop-shadow-md">
                TRUNG TÂM GIÁM SÁT<br class="hidden md:inline"> ĐIỀU HÀNH THÔNG MINH
            </h1>
        </div>

        <div class="pt-4">
            <button onclick="exitIntroImmediately()" class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/25 text-white font-bold text-xs uppercase tracking-widest px-8 py-3.5 rounded-full shadow-lg backdrop-blur-md transition-all duration-300 hover:border-cyan-400 transform hover:-translate-y-0.5">
                ⏩ Bỏ qua Intro & Vào Hệ Thống
            </button>
        </div>

    </div>

    <footer class="absolute bottom-8 text-center text-white/40 font-medium text-[10px] uppercase tracking-widest w-full z-10">
        &copy; 2026 IOC Bình Hưng — Smart Government Solution
    </footer>

    <script>
        const videoPlayer = document.getElementById("intro-video-player");
        const bodyContext = document.getElementById("body-context");

        // 🧠 LỆNH ÉP BUỘC PHÁT (Kể cả khi bộ duyệt chặn cứng)
        document.addEventListener("DOMContentLoaded", () => {
            videoPlayer.muted = true; // Ép tắt tiếng để qua cổng bảo mật Autoplay
            
            const playPromise = videoPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("Video tự khởi chạy thành công!");
                }).catch(error => {
                    console.log("Trình duyệt chặn phát tự động, kích hoạt cơ chế dự phòng phát lập tức.");
                    // Cơ chế dự phòng: Tự phát ngay khi người dùng chạm vào bất cứ đâu trên màn hình
                    document.addEventListener('click', () => {
                        videoPlayer.play();
                    }, { once: true });
                });
            }
        });

        // Tự động chuyển hướng khi video chạy xong thời lượng
        videoPlayer.addEventListener("ended", () => {
            triggerTransitionToHome();
        });

        function triggerTransitionToHome() {
            bodyContext.classList.add("fade-out-system");
            setTimeout(() => {
                window.location.href = "home.html";
            }, 800);
        }

        window.exitIntroImmediately = function() {
            videoPlayer.pause();
            triggerTransitionToHome();
        }
    </script>
</body>
</html>

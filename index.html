<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; }
        .carousel-track { display: flex; transition: transform 0.7s ease-in-out; width: 100%; }
        .carousel-page { min-width: 100%; display: flex !important; flex-wrap: wrap; padding: 1.5rem 1rem; gap: 10px; justify-content: center; }
        .economic-section { background-color: #dcfce7; border: 1px solid #bbf7d0; border-radius: 1.5rem; }
        .indicator-item { 
            flex: 1; background-color: #1e293b; color: white; padding: 12px 5px; border-radius: 12px;
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 150px; min-width: 180px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .modal-table td, .modal-table th { border: 1px solid #e2e8f0; padding: 10px; text-align: left; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-6">
    <header class="mb-6 flex justify-between items-end border-b-2 border-blue-900 pb-4">
        <div>
            <h1 class="text-xl md:text-3xl font-black text-blue-900 uppercase italic">Hệ Thống Chỉ Số Điều Hành 2026</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px] md:text-xs">Ủy ban nhân dân xã Bình Hưng</p>
        </div>
        <div id="clock" class="text-xl md:text-3xl font-mono font-bold text-blue-700">00:00:00</div>
    </header>

    <section class="mb-8 economic-section overflow-hidden">
        <div class="p-4 bg-white/40 flex justify-between items-center border-b border-green-200 px-4 md:px-6">
            <h3 class="font-bold text-green-900 uppercase text-[10px] md:text-xs tracking-wider">📊 Chỉ tiêu KT-XH chủ yếu</h3>
            <span id="page-num" class="font-mono text-[10px] font-bold text-green-700 bg-green-200/50 px-3 py-1 rounded-full border border-green-300">...</span>
        </div>
        <div class="overflow-hidden"><div id="carouselTrack" class="carousel-track"></div></div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">
        <div onclick="openDonThuModal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-red-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">📂 Đơn thư (Chi tiết)</h4>
            <div class="space-y-3">
                <div class="flex justify-between items-end"><span class="text-sm font-bold text-slate-600">Tổng số đơn:</span><span id="dt_tong" class="text-3xl font-black text-blue-900">0</span></div>
                <div class="grid grid-cols-2 gap-2 text-[11px] font-bold uppercase text-center">
                    <div class="bg-emerald-50 p-2 rounded text-emerald-700">Đã xong: <span id="dt_da_giai_quyet" class="block text-lg">0</span></div>
                    <div class="bg-orange-50 p-2 rounded text-orange-700">Đang xử lý: <span id="dt_dang_giai_quyet" class="block text-lg">0</span></div>
                </div>
            </div>
        </div>
        <div onclick="open1022Modal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-orange-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">📞 Phản ánh 1022</h4>
            <div class="space-y-2">
                <div class="flex justify-between border-b pb-1"><span class="text-sm text-slate-600 font-bold">Tổng phản ánh:</span><span id="pa_1022_tong" class="text-xl font-black text-orange-600">0</span></div>
                <div class="text-[11px] font-bold">
                    <div class="flex justify-between text-emerald-600 mb-1"><span>+ Đã GQ:</span><span id="pa_1022_xong">0</span></div>
                    <div class="flex justify-between text-red-600"><span>+ Chờ:</span><span id="pa_1022_cho">0</span></div>
                </div>
            </div>
        </div>
        <div onclick="openHoSoModal()" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-blue-500 cursor-pointer hover:bg-slate-50 transition-all">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">📋 Hồ sơ TTHC</h4>
            <div class="mb-2 space-y-1">
                <div class="text-3xl font-black text-blue-900 leading-tight"><span id="hs_tong_hien_thi">0</span> hồ sơ</div>
                <div class="text-sm font-bold text-slate-600">Đúng hạn: <span id="hs_dh_count_hien_thi">0</span> <span id="hs_dh_rate_hien_thi" class="text-emerald-600 text-xs">(0%)</span></div>
            </div>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200 border-t-4 border-emerald-500 text-center flex flex-col justify-center">
            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">⚖️ Văn bản chỉ đạo</h4>
            <div id="vb_tong" class="text-5xl font-black text-emerald-700">0</div>
        </div>
    </div>

    <div id="hoSoModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4",
            authDomain: "dashboard-demo-ce0da.firebaseapp.com",
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-demo-ce0da",
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // CẤU TRÚC 38 CHỈ TIÊU ĐỒNG BỘ VỚI ADMIN
        const groups = [
            { name: "Kinh tế", items: [{id:"ct_1", ten:"Tăng trưởng GTSC", dv:"%"}, {id:"ct_2", ten:"Thu ngân sách", dv:"Tr.đ"}, {id:"ct_3", ten:"Giải ngân ĐTC", dv:"%"}] },
            { name: "Văn hóa - Xã hội", items: [{id:"ct_4", ten:"Tham gia BHYT", dv:"%"}, {id:"ct_5", ten:"Tham gia BHXH", dv:"%"}, {id:"ct_6", ten:"Mầm non chuẩn QG", dv:"%"}, {id:"ct_7", ten:"Tiểu học chuẩn QG", dv:"%"}, {id:"ct_8", ten:"THCS chuẩn QG", dv:"%"}, {id:"ct_9", ten:"Phòng học/10k dân", dv:"P"}, {id:"ct_10", ten:"Hoàn thành THCS", dv:"%"}, {id:"ct_11", ten:"Giảm hộ nghèo", dv:"Hộ"}, {id:"ct_12", ten:"Tiêu chí NTM", dv:"TC"}, {id:"ct_13", ten:"Ấp văn hóa", dv:"%"}, {id:"ct_14", ten:"Gia đình văn hóa", dv:"%"}, {id:"ct_15", ten:"Tiêm chủng đủ", dv:"%"}, {id:"ct_16", ten:"GT việc làm", dv:"Ng"}, {id:"ct_17", ten:"Mô hình du lịch", dv:"MH"}] },
            { name: "Đô thị - Môi trường", items: [{id:"ct_18", ten:"Dùng nước sạch", dv:"%"}, {id:"ct_19", ten:"Xử lý rác thải", dv:"%"}, {id:"ct_20", ten:"Rác y tế chuẩn", dv:"%"}, {id:"ct_21", ten:"Nước thải CN", dv:"%"}] },
            { name: "Cải cách & An ninh", items: [{id:"ct_22", ten:"Hồ sơ đúng hạn", dv:"%"}, {id:"ct_23", ten:"Chữ ký số", dv:"%"}, {id:"ct_24", ten:"Nhập ngũ", dv:"Ng"}, {id:"ct_25", ten:"Giảm tội phạm", dv:"%"}, {id:"ct_26", ten:"Khám phá án", dv:"%"}, {id:"ct_27", ten:"Giảm TNGT", dv:"%"}, {id:"ct_28", ten:"Cháy nổ", dv:"Vụ"}, {id:"ct_29", ten:"Ma túy", dv:"Đạt"}, {id:"ct_30", ten:"Phản ánh 1022", dv:"%"}, {id:"ct_31", ten:"Văn bản điện tử", dv:"%"}, {id:"ct_32", ten:"Số hóa TTHC", dv:"%"}, {id:"ct_33", ten:"Thanh toán online", dv:"%"}, {id:"ct_34", ten:"Hòa giải cơ sở", dv:"%"}, {id:"ct_35", ten:"Kiểm tra PCCC", dv:"%"}, {id:"ct_36", ten:"Tin báo tội phạm", dv:"%"}, {id:"ct_37", ten:"Dân quân tự vệ", dv:"%"}, {id:"ct_38", ten:"Đảng viên mới", dv:"Đ/v"}] }
        ];

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const data = snap.val(); if(!data) return;
            // 1. CAROUSEL CHỈ TIÊU
            if(data.chi_tieu) {
                groups.forEach(g => g.items.forEach(it => it.th = data.chi_tieu[it.id] || 0));
                renderUI();
            }
            // 2. LOGIC CÁC THẺ CHÍNH (GIỮ NGUYÊN)
            const summary = data.don_thu || {};
            document.getElementById('dt_tong').innerText = summary.tong || 0;
            document.getElementById('dt_da_giai_quyet').innerText = summary.da_giai_quyet || 0;
            document.getElementById('dt_dang_giai_quyet').innerText = summary.dang_giai_quyet || 0;
            const hs = data.ho_so || {};
            document.getElementById('hs_tong_hien_thi').innerText = (hs.tong||0).toLocaleString('vi-VN');
            document.getElementById('vb_tong').innerText = data.van_ban?.tong || 0;
            const pa1022 = data.pa_1022 || {};
            document.getElementById('pa_1022_tong').innerText = pa1022.tong || 0;
            document.getElementById('pa_1022_xong').innerText = pa1022.da_giai_quyet || 0;
            document.getElementById('pa_1022_cho').innerText = pa1022.chua_giai_quyet || 0;
        });

        function renderUI() {
            const track = document.getElementById('carouselTrack'); track.innerHTML = '';
            groups.forEach(g => {
                const page = document.createElement('div'); page.className = 'carousel-page';
                page.innerHTML = g.items.map(it => `
                    <div class="indicator-item">
                        <div class="text-[9px] uppercase font-bold text-slate-400 h-8 flex items-center justify-center">${it.ten}</div>
                        <div class="text-4xl font-black text-white">${it.th}<span class="text-xs ml-1 font-normal text-slate-400">${it.dv}</span></div>
                        <div class="text-[10px] text-emerald-400 italic">${g.name}</div>
                    </div>`).join('');
                track.appendChild(page);
            });
        }

        let curPage = 0;
        setInterval(() => {
            curPage = (curPage + 1) % groups.length;
            document.getElementById('carouselTrack').style.transform = `translateX(-${curPage*100}%)`;
            document.getElementById('page-num').innerText = `LĨNH VỰC: ${groups[curPage].name.toUpperCase()}`;
        }, 10000);

        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'), 1000);
        // [Các hàm Modal giữ nguyên]
        window.openDonThuModal = () => document.getElementById('donThuModal').classList.remove('hidden');
        window.closeDonThuModal = () => document.getElementById('donThuModal').classList.add('hidden');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 16px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        
        /* Style cho các mục bị khóa */
        .nav-item.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .nav-item.locked:hover { background-color: transparent; color: #94a3b8; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-lg font-black text-white uppercase tracking-tighter leading-tight">UBND XÃ<br>BÌNH HƯNG</h2>
            <div class="text-[10px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic">Hệ thống điều hành 2026</div>
        </div>

        <nav class="flex-1 mt-6 overflow-y-auto" id="main-nav">
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="setActive(this)">🏠 Tổng quan chung</a>
            
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="checkPermission(event, this)">📂 Đơn thư & Tiếp dân</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="checkPermission(event, this)">📋 Hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="checkPermission(event, this)">⚖️ Văn bản chỉ đạo</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="checkPermission(event, this)">📊 38 Chỉ tiêu KT-XH</a>
        </nav>

        <div class="p-4 border-t border-slate-800 flex flex-col gap-2">
            <button id="btn-unlock" onclick="unlockView()" class="w-full py-2 rounded-lg text-[9px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest">
                🔓 Mở khóa báo cáo chi tiết
            </button>
            <button id="btn-admin" onclick="accessAdmin()" style="display:none;" class="w-full py-2 rounded-lg text-[9px] font-black text-red-500 border border-red-900 uppercase hover:bg-red-600 hover:text-white transition-all tracking-widest">
                ⚙️ Nhập liệu số liệu
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-10 flex justify-between items-center shadow-sm relative z-10">
            <h2 id="main-title" class="text-sm font-black text-slate-800 uppercase italic tracking-wider text-blue-800">Tổng quan chung</h2>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter" id="current-time">--/--/2026</div>
        </header>
        <iframe name="main-frame" id="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        // Mã PIN bảo mật
        const VIEW_PIN = "1234"; // Mã để XEM các trang chi tiết
        const ADMIN_PIN = "2026"; // Mã để vào trang NHẬP LIỆU

        function setActive(el) {
            if(el.classList.contains('locked')) return;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-title').innerText = el.innerText.substring(3);
        }

        // Chặn click nếu chưa có quyền xem
        function checkPermission(event, el) {
            if (el.classList.contains('locked')) {
                event.preventDefault();
                alert("Vui lòng 'Mở khóa báo cáo chi tiết' để xem nội dung này!");
            } else {
                setActive(el);
            }
        }

        // Hàm mở khóa quyền XEM
        function unlockView() {
            const pin = prompt("Nhập mã PIN để xem báo cáo chi tiết:");
            if (pin === VIEW_PIN) {
                document.querySelectorAll('.nav-item[data-lock="true"]').forEach(el => {
                    el.classList.remove('locked');
                });
                document.getElementById('btn-unlock').innerHTML = "✅ Đã mở khóa xem";
                document.getElementById('btn-unlock').disabled = true;
                document.getElementById('btn-admin').style.display = 'block'; // Hiện nút admin sau khi mở xem
                localStorage.setItem('can_view', 'true');
            } else if (pin !== null) {
                alert("Mã PIN xem chi tiết không đúng!");
            }
        }

        // Hàm vào trang NHẬP LIỆU
        function accessAdmin() {
            const pin = prompt("Nhập mã PIN quản trị viên để thay đổi số liệu:");
            if (pin === ADMIN_PIN) {
                localStorage.setItem('is_admin', 'true');
                window.location.href = "nhap-lieu.html";
            } else if (pin !== null) {
                alert("Mã PIN quản trị không đúng!");
            }
        }

        // Khởi tạo trạng thái khi load trang
        window.onload = () => {
            if(localStorage.getItem('can_view') === 'true') {
                document.querySelectorAll('.nav-item[data-lock="true"]').forEach(el => el.classList.remove('locked'));
                document.getElementById('btn-unlock').innerHTML = "✅ Đã mở khóa xem";
                document.getElementById('btn-admin').style.display = 'block';
            }
            document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
        };
    </script>
</body>
</html>

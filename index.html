<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hệ thống chỉ số phục vụ công tác chỉ đạo điều hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 50; height: 100%; left: 0; transform: translateX(-280px); }
            .sidebar.open { transform: translateX(0); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
            .overlay.show { display: block; }
        }
        .nav-item { padding: 14px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all 0.2s; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        .nav-item.locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
        .nav-group-label { padding: 20px 24px 8px; font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-sm font-black text-white uppercase tracking-tighter leading-tight">UBND XÃ BÌNH HƯNG</h2>
            <div class="text-[9px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic">Điều hành số 2026</div>
        </div>

        <nav class="flex-1 overflow-y-auto" id="main-nav">
            <div class="nav-group-label">Công khai nội bộ</div>
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="handleNavClick(this)">🏠 Tổng quan chung</a>
            
            <div class="nav-group-label">Dữ liệu chỉ đạo (Khóa)</div>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📈 38 Chỉ tiêu KT-XH</a>
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📂 Đơn thư & Tiếp dân</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📋 Hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">⚖️ Văn bản chỉ đạo</a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button id="btn-unlock" onclick="unlockView()" class="w-full py-3 rounded-xl text-[10px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest">
                🔓 Mở khóa dữ liệu điều hành
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-6 md:px-10 flex justify-between items-center shadow-sm relative z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="md:hidden p-2 bg-slate-100 rounded-lg text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 id="main-title" class="text-sm font-black text-blue-800 uppercase italic">Tổng quan chung</h2>
            </div>
            <div class="hidden md:block text-[10px] font-bold text-slate-400 uppercase" id="current-time">--/--/2026</div>
        </header>
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        const VIEW_PIN = "1234"; 

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function handleNavClick(el) {
            if(el.classList.contains('locked')) return;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-title').innerText = el.innerText.substring(3);
            if(window.innerWidth <= 768) toggleMenu();
        }

        function unlockView() {
            const pin = prompt("Vui lòng nhập mã định danh để truy cập dữ liệu điều hành:");
            if (pin === VIEW_PIN) {
                document.querySelectorAll('.nav-item[data-lock="true"]').forEach(el => {
                    el.classList.remove('locked');
                    el.style.pointerEvents = "auto";
                });
                const btn = document.getElementById('btn-unlock');
                btn.innerText = "✅ DỮ LIỆU ĐÃ MỞ";
                btn.classList.add('bg-emerald-600', 'text-white', 'border-none');
                btn.onclick = null;
            } else if (pin !== null) {
                alert("Mã định danh không chính xác!");
            }
        }
        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>

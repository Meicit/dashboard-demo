<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        display: flex; 
        height: 100vh; 
        overflow: hidden;
        /* HÌNH NỀN PHƯƠNG ÁN 1: TRỐNG ĐỒNG CHÌM */
        background-color: #f8fafc;
        background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2394a3b8' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' /%3E%3C/g%3E%3C/svg%3E");
    }
        
        /* Sidebar cơ bản */
        .sidebar { 
            width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 50; height: 100%; left: 0; transform: translateX(-280px); }
            .sidebar.open { transform: translateX(0); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
            .overlay.show { display: block; }
        }

        .nav-item { 
            padding: 16px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        
        /* Trạng thái khóa */
        .nav-item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
        
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-lg font-black text-white uppercase tracking-tighter leading-tight">UBND XÃ<br>BÌNH HƯNG</h2>
            <div class="text-[10px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic">Điều hành 2026</div>
        </div>

        <nav class="flex-1 mt-6 overflow-y-auto" id="main-nav">
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="handleNavClick(this)">🏠 Tổng quan chung</a>
            
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📂 Đơn thư & Tiếp dân</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📋 Hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">⚖️ Văn bản chỉ đạo</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true" onclick="handleNavClick(this)">📊 38 Chỉ tiêu KT-XH</a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button id="btn-unlock" onclick="unlockView()" class="w-full py-3 rounded-xl text-[10px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest">
                🔓 Mở khóa báo cáo chi tiết
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-6 md:px-10 flex justify-between items-center shadow-sm relative z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="md:hidden p-2 bg-slate-100 rounded-lg text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 id="main-title" class="text-sm font-black text-slate-800 uppercase italic text-blue-800">Tổng quan chung</h2>
            </div>
            <div class="hidden md:block text-[10px] font-bold text-slate-400 uppercase" id="current-time">--/--/2026</div>
        </header>
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        const VIEW_PIN = "1234"; 

        // Xóa trạng thái mỗi khi tải lại trang
        sessionStorage.removeItem('can_view');

        // Hàm điều khiển menu trên điện thoại
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // Hàm xử lý Click Menu (Đã sửa lỗi không di chuyển phần nổi bật)
        function handleNavClick(el) {
            // Nếu đang bị khóa thì không làm gì cả
            if(el.classList.contains('locked')) return;

            // Xóa active ở tất cả các mục
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            // Thêm active vào mục vừa chọn
            el.classList.add('active');
            
            // Cập nhật tiêu đề trang
            document.getElementById('main-title').innerText = el.innerText.substring(3);

            // Nếu đang ở điện thoại, tự động đóng menu sau khi chọn
            if(window.innerWidth <= 768) {
                toggleMenu();
            }
        }

        // Hàm mở khóa
        function unlockView() {
            const pin = prompt("Nhập mã PIN để xem báo cáo chi tiết:");
            if (pin === VIEW_PIN) {
                // Gỡ khóa cho các mục menu
                document.querySelectorAll('.nav-item[data-lock="true"]').forEach(el => {
                    el.classList.remove('locked');
                    el.style.pointerEvents = "auto"; // Kích hoạt lại khả năng click
                });
                
                const btn = document.getElementById('btn-unlock');
                btn.innerText = "✅ ĐÃ MỞ KHÓA";
                btn.classList.add('bg-emerald-600', 'text-white', 'border-none');
                btn.onclick = null; 

                sessionStorage.setItem('can_view', 'true');
                alert("Đã mở khóa báo cáo chi tiết!");
            } else if (pin !== null) {
                alert("Mã PIN không chính xác!");
            }
        }

        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>

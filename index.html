<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 16px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        
        /* Hiệu ứng khóa các mục chi tiết */
        .nav-item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
        
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-lg font-black text-white uppercase tracking-tighter leading-tight">UBND XÃ<br>BÌNH HƯNG</h2>
            <div class="text-[10px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic">Điều hành 2026</div>
        </div>

        <nav class="flex-1 mt-6 overflow-y-auto" id="main-nav">
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="setActive(this)">🏠 Tổng quan chung</a>
            
            <a href="pages/don-thu.html" target="main-frame" class="nav-item locked" data-lock="true">📂 Đơn thư & Tiếp dân</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item locked" data-lock="true">📋 Hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item locked" data-lock="true">⚖️ Văn bản chỉ đạo</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item locked" data-lock="true">📊 38 Chỉ tiêu KT-XH</a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button id="btn-unlock" onclick="unlockView()" class="w-full py-3 rounded-xl text-[10px] font-black text-blue-400 border border-blue-900 uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest">
                🔓 Mở khóa báo cáo chi tiết
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-10 flex justify-between items-center shadow-sm relative z-10">
            <h2 id="main-title" class="text-sm font-black text-slate-800 uppercase italic tracking-wider text-blue-800">Tổng quan chung</h2>
            <div class="flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                <span id="current-time">--/--/2026</span>
                <div class="flex items-center gap-1.5 bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full border border-emerald-100">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    Dữ liệu trực tuyến
                </div>
            </div>
        </header>
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        // Cấu hình bảo mật
        const VIEW_PIN = "1234"; 

        // QUAN TRỌNG: Xóa quyền xem mỗi khi tải lại trang hoặc mở link mới
        sessionStorage.removeItem('can_view');

        function setActive(el) {
            // Chỉ cho phép kích hoạt nếu không bị khóa
            if(el.classList.contains('locked')) return;
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            // Cập nhật tiêu đề Header (Bỏ icon 3 ký tự đầu)
            document.getElementById('main-title').innerText = el.innerText.substring(3);
        }

        // Hàm mở khóa các mục menu
        function unlockView() {
            const pin = prompt("Nhập mã PIN để xem báo cáo chi tiết:");
            if (pin === VIEW_PIN) {
                // Gỡ bỏ class 'locked' cho các mục có data-lock
                document.querySelectorAll('.nav-item[data-lock="true"]').forEach(el => {
                    el.classList.remove('locked');
                });
                
                // Cập nhật trạng thái nút bấm
                const btn = document.getElementById('btn-unlock');
                btn.innerText = "✅ ĐÃ XÁC THỰC";
                btn.classList.add('bg-emerald-600', 'text-white', 'border-none');
                btn.onclick = null; // Vô hiệu hóa click sau khi đã mở
                
                // Lưu trạng thái vào Session (Chỉ tồn tại trong tab này)
                sessionStorage.setItem('can_view', 'true');
                alert("Đã mở khóa toàn bộ báo cáo chi tiết!");
            } else if (pin !== null) {
                alert("Mã PIN không chính xác!");
            }
        }

        // Hiển thị ngày hiện tại
        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>

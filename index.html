<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 16px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px;
            text-decoration: none; transition: all 0.2s;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; font-weight: 800; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f8fafc; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-2xl">📊</span>
            </div>
            <h2 class="text-lg font-black text-white uppercase tracking-tighter text-center leading-tight">UBND XÃ<br>BÌNH HƯNG</h2>
            <div class="text-[10px] font-bold text-blue-400 uppercase mt-2 tracking-widest">Hệ thống điều hành 2026</div>
        </div>

        <nav class="flex-1 mt-6 overflow-y-auto">
            <a href="pages/tong-quan.html" target="main-frame" class="nav-item active" onclick="setActive(this)">🏠 Tổng quan chung</a>
            <a href="pages/don-thu.html" target="main-frame" class="nav-item" onclick="setActive(this)">📂 Đơn thư & Tiếp dân</a>
            <a href="pages/ho-so-hanh-chinh.html" target="main-frame" class="nav-item" onclick="setActive(this)">📋 Hồ sơ hành chính</a>
            <a href="pages/van-ban-chi-dao.html" target="main-frame" class="nav-item" onclick="setActive(this)">⚖️ Văn bản chỉ đạo</a>
            <a href="pages/chi-tieu.html" target="main-frame" class="nav-item" onclick="setActive(this)">📊 38 Chỉ tiêu KT-XH</a>
        </nav>

       
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-10 flex justify-between items-center shadow-sm relative z-10">
            <h2 id="main-title" class="text-sm font-black text-slate-800 uppercase italic tracking-wider text-blue-800">Tổng quan chung</h2>
            <div class="flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase">
                <span id="current-time">--/--/2026</span>
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-emerald-600">Dữ liệu trực tuyến</span>
            </div>
        </header>
        <iframe name="main-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-title').innerText = el.innerText.substring(3);
        }
        // Hiển thị ngày tháng thực tế
        document.getElementById('current-time').innerText = new Date().toLocaleDateString('vi-VN');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 14px 24px; cursor: pointer; transition: all 0.2s; 
            border-left: 4px solid transparent; color: #94a3b8; font-weight: 600; font-size: 14px;
            display: block; text-decoration: none;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f1f5f9; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 text-center">
            <h2 class="text-2xl font-black text-blue-500 uppercase italic">Bình Hưng</h2>
            <div class="text-[10px] font-bold text-slate-500 uppercase mt-1">Điều hành thông minh 2026</div>
        </div>
        <nav class="flex-1 mt-6">
            <a href="pages/tong-quan.html" target="content-frame" class="nav-item active" onclick="setActive(this)">🏠 Tổng quan điều hành</a>
            <a href="pages/don-thu.html" target="content-frame" class="nav-item" onclick="setActive(this)">📂 Tình hình Đơn thư</a>
            <a href="pages/pa-1022.html" target="content-frame" class="nav-item" onclick="setActive(this)">📞 Phản ánh 1022</a>
            <a href="pages/ho-so.html" target="content-frame" class="nav-item" onclick="setActive(this)">📋 Hồ sơ hành chính</a>
            <a href="pages/chi-tieu.html" target="content-frame" class="nav-item" onclick="setActive(this)">📊 38 Chỉ tiêu chi tiết</a>
        </nav>
        <div class="p-6 border-t border-slate-800 text-center text-blue-400 font-mono text-xl" id="clock">00:00:00</div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-8 flex justify-between items-center shadow-sm z-10">
            <h2 id="header-title" class="text-lg font-black text-slate-800 uppercase italic">Trang chủ điều hành</h2>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border border-slate-200 px-3 py-1 rounded-full">UBND Xã Bình Hưng</div>
        </header>
        <iframe name="content-frame" src="pages/tong-quan.html"></iframe>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('header-title').innerText = el.innerText.substring(2);
        }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN'), 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; padding: 10px; overflow-x: hidden; }
        iframe { width: 100%; border: none; display: block; overflow: hidden; border-radius: 20px; background-color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .marquee-container {
            background: linear-gradient(90deg, #0b4a8f 0%, #075985 100%);
            color: white; padding: 8px 0; border-radius: 10px; margin-bottom: 15px;
            display: flex; align-items: center;
        }
        .marquee-label {
            background: #00FF00; color: #052e16; padding: 2px 12px; font-weight: 900; font-size: 11px;
            text-transform: uppercase; border-radius: 0 20px 20px 0; margin-right: 15px; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-label">📊 34 Chỉ tiêu KTXH 2026</div>
        <marquee behavior="scroll" direction="left" scrollamount="6">
            <span class="inline-block mr-10 text-[12px] font-bold">1. Tốc độ tăng trưởng sản phẩm: <span class="text-[#00FF00]">11.7%</span></span>
            <span class="inline-block mr-10 text-[12px] font-bold">2. Thu ngân sách nhà nước: <span class="text-[#00FF00]">69%</span></span>
            <span class="inline-block mr-10 text-[12px] font-bold">3. Giải ngân đầu tư công: <span class="text-[#00FF00]">50%</span></span>
        </marquee>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <iframe src="../pages/tong-quan/tq-ho-so.html" height="205" scrolling="no"></iframe>
        <iframe src="../pages/tong-quan/tq-1022.html" height="205" scrolling="no"></iframe>
        <iframe src="../pages/tong-quan/tq-don-thu.html" height="205" scrolling="no"></iframe>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <iframe src="../pages/tong-quan/tq-cong-an.html" height="260" scrolling="no"></iframe>
        <iframe src="../pages/tong-quan/tq-quoc-phong.html" height="260" scrolling="no"></iframe>
    </div>

</body>
</html>

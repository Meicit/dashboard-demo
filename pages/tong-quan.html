<!-- HÀNG 1: 3 Ô CHỈ SỐ -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div id="o-don-thu"><!-- Nội dung từ tq-don-thu.html sẽ vào đây --></div>
    <div id="o-1022"><!-- Nội dung từ tq-1022.html sẽ vào đây --></div>
    <div id="o-ho-so"><!-- Nội dung từ tq-ho-so.html sẽ vào đây --></div>
</div>

<!-- HÀNG 2: 2 Ô AN NINH & QUỐC PHÒNG -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div id="o-an-ninh"></div>
    <div id="o-quoc-phong"></div>
</div>

<script>
    // Hàm tải file con và chèn vào khung tương ứng
    async function loadComponent(id, filePath) {
        try {
            const response = await fetch(filePath);
            const html = await response.text();
            document.getElementById(id).innerHTML = html;
        } catch (error) {
            console.error(`Lỗi tải file ${filePath}:`, error);
        }
    }

    // Gọi các file con khi trang web sẵn sàng
    document.addEventListener("DOMContentLoaded", () => {
        loadComponent('o-don-thu', 'tong-quan/tq-don-thu.html');
        loadComponent('o-1022', 'tong-quan/tq-1022.html');
        loadComponent('o-ho-so', 'tong-quan/tq-ho-so.html');
        loadComponent('o-an-ninh', 'tong-quan/tq-an-ninh.html');
        loadComponent('o-quoc-phong', 'tong-quan/tq-quoc-phong.html');
    });
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; padding: 24px; margin: 0; }
        iframe { width: 100%; border: none; border-radius: 32px; display: block; overflow: hidden; }
    </style>
</head>
<body>
    <div class="max-w-[1600px] mx-auto space-y-8">
        
        <!-- Hàng 1: 3 ô chỉ số chính -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <iframe src="tong-quan/tq-don-thu.html" height="420"></iframe>
            <iframe src="tong-quan/tq-1022.html" height="420"></iframe>
            <iframe src="tong-quan/tq-ho-so.html" height="420"></iframe>
        </div>

        <!-- Hàng 2: 2 ô An ninh & Quốc phòng -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <iframe src="tong-quan/tq-an-ninh.html" height="420"></iframe>
            <iframe src="tong-quan/tq-quoc-phong.html" height="420"></iframe>
        </div>

    </div>
</body>
</html>

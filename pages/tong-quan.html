<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 0; margin: 0; }
        .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .carousel-page { min-width: 100%; display: flex; gap: 15px; padding: 10px; }
        .indicator-card { flex: 1; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 20px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; min-height: 155px; border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 60s linear infinite; width: max-content; }
        .animate-marquee:hover { animation-play-state: paused; }
        .marquee-wrapper { background-color: #facc15; border-bottom: 2px solid #eab308; }

        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Style cho nút bấm */
        .nav-btn { background: #fff; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .nav-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="marquee-wrapper py-3 overflow-hidden shadow-lg relative z-20">
        <div class="animate-marquee whitespace-nowrap flex items-center">
            <div id="marquee-content" class="flex gap-16 items-center px-4"></div>
            <div id="marquee-content-clone" class="flex gap-16 items-center px-4"></div>
        </div>
    </div>

    <div class="p-6 space-y-8">
        <section class="bg-white rounded-3xl overflow-hidden border border-slate-200 shadow-sm">
            <div class="p-4 bg-slate-50/50 border-b flex justify-between px-8 items-center">
                <span class="font-black text-slate-700 text-xs uppercase tracking-wider italic">Chỉ tiêu nhiệm vụ chính trị 2026</span>
                
                <div class="flex items-center gap-3">
                    <button onclick="prevPage()" class="nav-btn">◀ TRƯỚC</button>
                    <span id="page-num" class="text-[10px] font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full tracking-tighter">TRANG 1/8</span>
                    <button onclick="nextPage()" class="nav-btn">SAU ▶</button>
                </div>
            </div>
            <div class="overflow-hidden bg-slate-50"><div id="carouselTrack" class="carousel-track"></div></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8" id="lower-content">
             </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));

        const indicators = [
            {id:"ct_1", ten:"Tốc độ tăng trưởng giá trị sản xuất các ngành kinh tế", dv:"%", kh:"10.5"},
            {id:"ct_2", ten:"Tổng thu ngân sách nhà nước trên địa bàn", dv:"Tr.đ", kh:"100"},
            {id:"ct_3", ten:"Tỷ lệ giải ngân vốn đầu tư công", dv:"%", kh:"95"},
            {id:"ct_4", ten:"Phát triển doanh nghiệp mới", dv:"DN", kh:"700"},
            {id:"ct_5", ten:"Phát triển hộ kinh doanh cá thể", dv:"Hộ", kh:"500"},
            {id:"ct_6", ten:"Tỷ lệ người dân tham gia bảo hiểm y tế", dv:"%", kh:"95"},
            {id:"ct_7", ten:"Tỷ lệ lao động trong độ tuổi tham gia bảo hiểm xã hội", dv:"%", kh:"59.5"},
            {id:"ct_8", ten:"Tỷ lệ gia đình đạt chuẩn gia đình văn hóa", dv:"%", kh:"93"},
            {id:"ct_9", ten:"Tỷ lệ ấp đạt chuẩn ấp văn hóa", dv:"%", kh:"95"},
            {id:"ct_10", ten:"Tốt nghiệp Trung học cơ sở", dv:"%", kh:"99"},
            {id:"ct_11", ten:"Trẻ em tiêm chủng đầy đủ", dv:"%", kh:"95"},
            {id:"ct_12", ten:"Giảm hộ nghèo đa chiều", dv:"Hộ", kh:"-"},
            {id:"ct_13", ten:"Thu nhập bình quân đầu người", dv:"%", kh:"7.9"},
            {id:"ct_14", ten:"Lao động được giới thiệu việc làm", dv:"Người", kh:"1000"},
            {id:"ct_15", ten:"Trường học đạt chuẩn quốc gia", dv:"%", kh:"27/32/43"},
            {id:"ct_16", ten:"Số phòng học trên 10.000 dân", dv:"P", kh:"460"},
            {id:"ct_17", ten:"Tiêu chí đạt chuẩn Nông thôn mới", dv:"TC", kh:"3"},
            {id:"ct_18", ten:"Mô hình du lịch địa phương", dv:"MH", kh:"1"},
            {id:"ct_19", ten:"Tỷ lệ dân số dùng nước sạch", dv:"%", kh:"100"},
            {id:"ct_20", ten:"Thu gom chất thải rắn sinh hoạt", dv:"%", kh:"100"},
            {id:"ct_21", ten:"Xử lý chất thải y tế & nước thải CN", dv:"%", kh:"100"},
            {id:"ct_22", ten:"Giải quyết hồ sơ đúng hạn", dv:"%", kh:"99.5"},
            {id:"ct_23", ten:"Sử dụng chữ ký số công vụ", dv:"%", kh:"100"},
            {id:"ct_24", ten:"Xử lý phản ánh đúng hạn", dv:"%", kh:"50"},
            {id:"ct_25", ten:"Chuyển đổi số", dv:"-", kh:"Hiệu quả"},
            {id:"ct_26", ten:"Tuyển chọn gọi công dân nhập ngũ", dv:"Ng", kh:"31"},
            {id:"ct_27", ten:"Giảm tội phạm trật tự xã hội", dv:"%", kh:"-5"},
            {id:"ct_28", ten:"Tỷ lệ điều tra phá án hình sự", dv:"%", kh:"80"},
            {id:"ct_29", ten:"Tai nạn giao thông (giảm 3 mặt)", dv:"%", kh:"-10"},
            {id:"ct_30", ten:"Số vụ cháy nổ, tai nạn sự cố", dv:"Vụ", kh:"0"},
            {id:"ct_31", ten:"Xã an toàn về PCCC", dv:"-", kh:"Đạt"},
            {id:"ct_32", ten:"Giải quyết tin báo, tố giác tội phạm", dv:"%", kh:"100"},
            {id:"ct_33", ten:"Giải quyết đơn thư khiếu nại, tố cáo", dv:"%", kh:"100"},
            {id:"ct_34", ten:"Số hóa kết quả giải quyết TTHC", dv:"%", kh:"100"},
            {id:"ct_35", ten:"Thanh toán trực tuyến trên DVC", dv:"%", kh:"100"},
            {id:"ct_36", ten:"Hòa giải thành ở cơ sở", dv:"%", kh:"100"},
            {id:"ct_37", ten:"Dân quân tự vệ so với dân số", dv:"%", kh:"100"},
            {id:"ct_38", ten:"Đảng viên hoàn thành tốt nhiệm vụ", dv:"%", kh:"100"}
        ];

        let curP = 0;
        const totalPages = 8;

        window.nextPage = () => {
            curP = (curP + 1) % totalPages;
            updateUI();
        };

        window.prevPage = () => {
            curP = (curP - 1 + totalPages) % totalPages;
            updateUI();
        };

        function updateUI() {
            document.getElementById('carouselTrack').style.transform = `translateX(-${curP * 100}%)`;
            document.getElementById('page-num').innerText = `TRANG ${curP + 1}/${totalPages}`;
        }

        function updateMarquee(data) {
            const container = document.getElementById('marquee-content');
            const clone = document.getElementById('marquee-content-clone');
            const html = indicators.map(it => {
                const val = data[it.id] || "0";
                return `<div class="flex items-center gap-3"><span class="text-[10px] font-black text-slate-900 uppercase italic">${it.ten}:</span><span class="text-base font-black text-red-600">${val}</span><span class="text-[9px] font-bold text-slate-600">${it.dv}</span></div>`;
            }).join('<span class="mx-8 text-yellow-600 font-bold opacity-40">●</span>');
            container.innerHTML = html; clone.innerHTML = html;
        }

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            // ... các logic cập nhật đơn thư, phản ánh giữ nguyên ...
            if(d.chi_tieu) { 
                updateMarquee(d.chi_tieu); 
                indicators.forEach(it => it.th = d.chi_tieu[it.id] || 0); 
                renderCarousel(); 
            }
        });

        function renderCarousel() {
            const track = document.getElementById('carouselTrack'); track.innerHTML = '';
            for(let i=0; i < totalPages; i++) {
                const page = document.createElement('div'); page.className = 'carousel-page';
                page.innerHTML = indicators.slice(i*5, (i+1)*5).map(it => `<div class="indicator-card"><div class="text-[10px] font-black opacity-60 uppercase">${it.ten}</div><div class="text-4xl font-black italic">${it.th}<span class="text-sm font-normal opacity-60 ml-1">${it.dv}</span></div><div class="text-[10px] text-emerald-400 font-bold italic">KH: ${it.kh}</div></div>`).join('');
                track.appendChild(page);
            }
        }
    </script>
</body>
</html>

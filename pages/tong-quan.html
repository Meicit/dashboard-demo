<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; padding: 0; margin: 0; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 200s linear infinite; width: max-content; }
        .animate-marquee:hover { animation-play-state: paused; }
        .marquee-wrapper { background-color: #fbbf24; border-bottom: 3px solid #d97706; }
        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1600px] mx-auto space-y-8">
        
        <!-- MARQUEE CHỈ TIÊU -->
        <div class="marquee-wrapper py-3 overflow-hidden shadow-xl rounded-2xl relative z-20">
            <div class="animate-marquee whitespace-nowrap flex items-center">
                <div id="marquee-content" class="flex gap-16 items-center px-4"></div>
                <div id="marquee-content-clone" class="flex gap-16 items-center px-4"></div>
            </div>
        </div>

        <!-- HÀNG 1: CÁC CHỈ SỐ CƠ BẢN -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Đơn thư -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[11px] font-black text-indigo-600 uppercase tracking-widest italic border-l-4 border-indigo-600 pl-2">Tình hình Đơn thư</h3>
                <div class="donut-chart mt-6" id="dt_donut" style="background: conic-gradient(#10b981 var(--dt-p, 0%), #e2e8f0 0deg);">
                    <div class="donut-inner text-center">
                        <span id="dt_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                        <p class="text-[9px] font-extrabold text-indigo-500 uppercase">Tổng đơn</p>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-3 mt-8">
                    <div class="bg-emerald-600 p-3 rounded-2xl text-center text-white"><div id="dt_xong" class="text-xl font-black">0</div></div>
                    <div class="bg-rose-600 p-3 rounded-2xl text-center text-white"><div id="dt_cho" class="text-xl font-black">0</div></div>
                </div>
            </div>

            <!-- 1022 -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[11px] font-black text-blue-700 uppercase tracking-widest italic border-l-4 border-blue-700 pl-2">Phản ánh 1022</h3>
                <div class="donut-chart mt-6" id="pa_donut" style="background: conic-gradient(#3b82f6 var(--pa-p, 0%), #e2e8f0 0deg);">
                    <div class="donut-inner text-center">
                        <span id="pa_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                        <p class="text-[9px] font-extrabold text-blue-500 uppercase">Tổng tin</p>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-3 mt-8">
                    <div class="bg-blue-600 p-3 rounded-2xl text-center text-white"><div id="pa_xong" class="text-xl font-black">0</div></div>
                    <div class="bg-amber-500 p-3 rounded-2xl text-center text-white"><div id="pa_cho" class="text-xl font-black">0</div></div>
                </div>
            </div>

            <!-- Hồ sơ -->
            <div class="bg-gradient-to-br from-indigo-800 to-blue-900 rounded-[32px] shadow-xl text-white p-8 flex flex-col justify-center relative overflow-hidden">
                <h3 class="text-[11px] font-black text-blue-300 uppercase mb-2 italic border-l-4 border-blue-300 pl-2">Hồ sơ hành chính</h3>
                <div id="hs_luy_ke" class="text-6xl font-black italic tracking-tighter">0</div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-white/10 p-3 rounded-2xl border border-white/20"><div id="hs_rate" class="text-xl font-black text-yellow-400">0%</div></div>
                    <div class="bg-white/10 p-3 rounded-2xl border border-white/20"><div id="hs_hai_long" class="text-xl font-black text-orange-400">0%</div></div>
                </div>
            </div>
        </div>

        <!-- HÀNG 2: PHÂN TÁCH AN NINH - QUỐC PHÒNG -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- CỘT TRÁI: AN NINH TRẬT TỰ -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-slate-100 flex flex-col h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[11px] font-black text-red-600 uppercase tracking-widest italic border-l-4 border-red-600 pl-2">An ninh Trật tự</h3>
                    <span class="px-3 py-1 bg-red-50 text-red-600 text-[9px] font-black rounded-full uppercase">Tin nóng</span>
                </div>
                <div id="list-an-ninh" class="space-y-4 overflow-y-auto pr-2 scrollbar-hide flex-1">
                    <!-- Dữ liệu tin Zalo -->
                </div>
            </div>

            <!-- CỘT PHẢI: QUỐC PHÒNG AN NINH -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-slate-100 flex flex-col h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[11px] font-black text-emerald-600 uppercase tracking-widest italic border-l-4 border-emerald-600 pl-2">Quốc phòng An ninh</h3>
                    <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded-full uppercase">Hoạt động</span>
                </div>
                <div id="list-quoc-phong" class="space-y-4 overflow-y-auto pr-2 scrollbar-hide flex-1">
                    <!-- Dữ liệu tin Zalo -->
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div id="zalo-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-[32px] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50 px-8">
                <span class="text-[10px] font-black text-slate-700 uppercase">Chi tiết thông tin</span>
                <button onclick="closeZaloModal()" class="text-red-600 font-bold">ĐÓNG [✕]</button>
            </div>
            <iframe id="zalo-iframe" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Hàm cập nhật Marquee và các chỉ số (Giữ nguyên logic cũ của bạn)
        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            
            // Cập nhật Đơn thư, 1022, Hồ sơ (Rút gọn cho nhanh)
            document.getElementById('dt_tong').innerText = (d.don_thu_moi?.ky_truoc || 0) + (d.don_thu_moi?.moi_phat_sinh || 0);
            document.getElementById('pa_tong').innerText = d.pa_1022?.tong || 0;
            document.getElementById('hs_luy_ke').innerText = d.ho_so_thang?.luy_ke || 0;

            // XỬ LÝ CHIA TIN ZALO THÀNH 2 BÊN
            const zaloNews = Object.values(d.zalo_news || {}).reverse();
            const anNinhContainer = document.getElementById('list-an-ninh');
            const quocPhongContainer = document.getElementById('list-quoc-phong');

            // Hàm tạo HTML thẻ tin nhỏ gọn
            const createNewsItem = (item) => `
                <div onclick="openZaloModal('${item.link}')" class="flex gap-4 p-3 rounded-2xl hover:bg-slate-50 cursor-pointer transition-all border border-transparent hover:border-slate-100 group">
                    <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                    </div>
                    <div class="flex flex-col justify-center">
                        <span class="text-[8px] font-bold text-slate-400 uppercase">${item.date}</span>
                        <h4 class="text-xs font-black text-slate-800 line-clamp-2 leading-tight group-hover:text-blue-600">${item.title}</h4>
                    </div>
                </div>
            `;

            // Chia dữ liệu: Ở đây tôi tạm chia 50/50 tin mới nhất. 
            // Nếu bạn muốn chia theo nội dung, cần thêm field "loai" khi nhập liệu.
            const half = Math.ceil(zaloNews.length / 2);
            anNinhContainer.innerHTML = zaloNews.slice(0, half).map(createNewsItem).join('');
            quocPhongContainer.innerHTML = zaloNews.slice(half).map(createNewsItem).join('');
        });

        window.openZaloModal = (link) => {
            document.getElementById('zalo-iframe').src = link;
            document.getElementById('zalo-modal').classList.remove('hidden');
        };
        window.closeZaloModal = () => {
            document.getElementById('zalo-modal').classList.add('hidden');
            document.getElementById('zalo-iframe').src = '';
        };
    </script>
</body>
</html>

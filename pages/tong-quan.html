<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; padding: 0; margin: 0; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 200s linear infinite; width: max-content; }
        .animate-marquee:hover { animation-play-state: paused; }
        .marquee-wrapper { background-color: #fbbf24; border-bottom: 3px solid #d97706; }
        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #zalo-modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1600px] mx-auto space-y-8">
        
        <!-- MARQUEE -->
        <div class="marquee-wrapper py-3 overflow-hidden shadow-xl rounded-2xl relative z-20">
            <div class="animate-marquee whitespace-nowrap flex items-center">
                <div id="marquee-content" class="flex gap-16 items-center px-4"></div>
                <div id="marquee-content-clone" class="flex gap-16 items-center px-4"></div>
            </div>
        </div>

        <!-- HÀNG 1: 3 CỘT CHỈ SỐ -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Đơn thư -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[11px] font-black text-indigo-600 uppercase tracking-widest italic border-l-4 border-indigo-600 pl-2">Tình hình Đơn thư</h3>
                <div class="donut-chart mt-6" id="dt_donut" style="background: conic-gradient(#10b981 var(--dt-p, 0%), #e2e8f0 0deg);">
                    <div class="donut-inner text-center">
                        <span id="dt_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                        <p class="text-[9px] font-extrabold text-indigo-500 uppercase">Tổng đơn</p>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-3 mt-8">
                    <div class="bg-emerald-600 p-3 rounded-2xl text-center text-white shadow-md">
                        <div class="text-[8px] font-bold uppercase mb-1">Đã giải quyết</div>
                        <div id="dt_xong" class="text-xl font-black">0</div>
                    </div>
                    <div class="bg-rose-600 p-3 rounded-2xl text-center text-white shadow-md">
                        <div class="text-[8px] font-bold uppercase mb-1">Đang xử lý</div>
                        <div id="dt_cho" class="text-xl font-black">0</div>
                    </div>
                </div>
            </div>

            <!-- 1022 -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[11px] font-black text-blue-700 uppercase tracking-widest italic border-l-4 border-blue-700 pl-2">Phản ánh 1022</h3>
                <div class="donut-chart mt-6" id="pa_donut" style="background: conic-gradient(#3b82f6 var(--pa-p, 0%), #e2e8f0 0deg);">
                    <div class="donut-inner text-center">
                        <span id="pa_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                        <p class="text-[9px] font-extrabold text-blue-500 uppercase">Tổng tin</p>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-3 mt-8">
                    <div class="bg-blue-600 p-3 rounded-2xl text-center text-white shadow-md">
                        <div class="text-[8px] font-bold uppercase mb-1">Đã xử lý</div>
                        <div id="pa_xong" class="text-xl font-black">0</div>
                    </div>
                    <div class="bg-amber-500 p-3 rounded-2xl text-center text-white shadow-md">
                        <div class="text-[8px] font-bold uppercase mb-1">Chờ GQ</div>
                        <div id="pa_cho" class="text-xl font-black">0</div>
                    </div>
                </div>
            </div>

            <!-- Hồ sơ -->
            <div class="bg-gradient-to-br from-indigo-800 to-blue-900 rounded-[32px] shadow-xl text-white p-8 flex flex-col relative overflow-hidden">
                <h3 class="text-[11px] font-black text-blue-300 uppercase mb-2 italic tracking-widest border-l-4 border-blue-300 pl-2">Hồ sơ hành chính</h3>
                <div class="flex-1 flex flex-col justify-center">
                    <div id="hs_luy_ke" class="text-6xl font-black italic tracking-tighter">0</div>
                    <p class="text-[10px] font-bold text-blue-200 uppercase tracking-widest">Hồ sơ lũy kế trong tháng</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/20 backdrop-blur-md">
                        <div class="text-[9px] uppercase font-black text-blue-200">Đúng hạn</div>
                        <div id="hs_rate" class="text-2xl font-black text-yellow-400">0%</div>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/20 backdrop-blur-md">
                        <div class="text-[9px] uppercase font-black text-blue-200">Hài lòng</div>
                        <div id="hs_hai_long" class="text-2xl font-black text-orange-400">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- HÀNG 2: CHIA ĐÔI AN NINH - QUỐC PHÒNG -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Khối An ninh Trật tự -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-red-50">
                <h3 class="text-[11px] font-black text-red-600 uppercase tracking-widest italic border-l-4 border-red-600 pl-2 mb-6">Tình hình An ninh Trật tự</h3>
                <div id="list-an-ninh" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Dữ liệu Zalo news 1-2 sẽ vào đây -->
                </div>
            </div>

            <!-- Khối Quốc phòng An ninh -->
            <div class="bg-white p-8 rounded-[32px] shadow-lg border border-emerald-50">
                <h3 class="text-[11px] font-black text-emerald-600 uppercase tracking-widest italic border-l-4 border-emerald-600 pl-2 mb-6">Tình hình Quốc phòng An ninh</h3>
                <div id="list-quoc-phong" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Dữ liệu Zalo news 3-4 sẽ vào đây -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="zalo-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-[32px] overflow-hidden flex flex-col shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50 px-6">
                <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">Chi tiết thông tin từ Zalo</span>
                <button onclick="closeZaloModal()" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-600 rounded-full font-bold">✕</button>
            </div>
            <div class="flex-1 bg-white relative">
                <iframe id="zalo-iframe" src="" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        const indicators = [
            {id:"ct_1", ten:"Tăng trưởng sản xuất", dv:"%"},
            {id:"ct_2", ten:"Thu ngân sách", dv:"Tr.đ"},
            {id:"ct_22", ten:"Hồ sơ đúng hạn", dv:"%"},
            {id:"ct_38", ten:"Đảng viên HT tốt NV", dv:"%"}
        ];

        function updateMarquee(data) {
            const html = indicators.map(it => {
                const val = data[it.id] || "0";
                return `<div class="flex items-center gap-4"><span class="text-[11px] font-black text-slate-900 uppercase italic">${it.ten}:</span><span class="text-lg font-black text-red-700">${val}</span><span class="text-[10px] font-bold text-amber-900">${it.dv}</span></div>`;
            }).join('<span class="mx-10 text-amber-700 font-bold opacity-30">◆</span>');
            document.getElementById('marquee-content').innerHTML = html;
            document.getElementById('marquee-content-clone').innerHTML = html;
        }

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            
            // GIỮ NGUYÊN TOÀN BỘ LOGIC CŨ CỦA BẠN ĐỂ TRÁNH MẤT KẾT NỐI
            const dtT = (d.don_thu_moi?.ky_truoc || 0) + (d.don_thu_moi?.moi_phat_sinh || 0);
            const dtX = d.don_thu_moi?.da_giai_quyet || 0;
            document.getElementById('dt_tong').innerText = dtT;
            document.getElementById('dt_xong').innerText = dtX;
            document.getElementById('dt_cho').innerText = Math.max(0, dtT - dtX);
            document.getElementById('dt_donut').style.setProperty('--dt-p', (dtT > 0 ? (dtX/dtT*100) : 0) + '%');

            const pa = d.pa_1022 || {};
            document.getElementById('pa_tong').innerText = pa.tong || 0;
            document.getElementById('pa_xong').innerText = pa.da_giai_quyet || 0;
            document.getElementById('pa_cho').innerText = pa.chua_giai_quyet || 0;
            document.getElementById('pa_donut').style.setProperty('--pa-p', (pa.tong > 0 ? (pa.da_giai_quyet/pa.tong*100) : 0) + '%');

            const hs = d.ho_so_thang || {};
            document.getElementById('hs_luy_ke').innerText = hs.luy_ke || 0;
            document.getElementById('hs_rate').innerText = (hs.luy_ke > 0 ? ((hs.truoc_han || 0)/(hs.luy_ke)*100).toFixed(1) : 0) + "%";
            document.getElementById('hs_hai_long').innerText = (hs.hai_long_percent || 0) + "%";

            if(d.chi_tieu) updateMarquee(d.chi_tieu);
            
            // LOGIC MỚI: TỰ PHÂN CHIA TIN ZALO VÀO 2 Ô
            const zaloNews = Object.values(d.zalo_news || {}).reverse();
            const anNinhCont = document.getElementById('list-an-ninh');
            const quocPhongCont = document.getElementById('list-quoc-phong');

            const cardHtml = (item) => `
                <div onclick="openZaloModal('${item.link}')" class="group cursor-pointer bg-slate-50 p-3 rounded-2xl border border-transparent hover:border-blue-100 transition-all">
                    <div class="aspect-video bg-slate-200 rounded-xl mb-3 overflow-hidden">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="text-[7px] font-bold text-slate-400 uppercase mb-1">${item.date}</div>
                    <div class="text-[10px] font-black text-slate-800 leading-tight group-hover:text-blue-600 line-clamp-2">${item.title}</div>
                </div>
            `;

            if (zaloNews.length === 0) {
                anNinhCont.innerHTML = quocPhongCont.innerHTML = `<p class="text-[10px] text-slate-400 italic">Đang cập nhật...</p>`;
            } else {
                // Ô An ninh: Lấy 2 tin mới nhất (0, 1)
                anNinhCont.innerHTML = zaloNews.slice(0, 2).map(cardHtml).join('');
                // Ô Quốc phòng: Lấy 2 tin tiếp theo (2, 3)
                quocPhongCont.innerHTML = zaloNews.slice(2, 4).map(cardHtml).join('');
            }
        });

        window.openZaloModal = function(link) {
            document.getElementById('zalo-iframe').src = link;
            document.getElementById('zalo-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeZaloModal = function() {
            document.getElementById('zalo-modal').classList.add('hidden');
            document.getElementById('zalo-iframe').src = '';
            document.body.style.overflow = 'auto';
        };
    </script>
</body>
</html>

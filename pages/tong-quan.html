<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điều Hành - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; margin: 0; padding: 24px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: marquee 200s linear infinite; width: max-content; }
        .marquee-wrapper { background-color: #fbbf24; border-bottom: 3px solid #d97706; margin-bottom: 2rem; }
        /* Style cho Donut và Bar được dùng chung */
        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar-container { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .bar-label { width: 140px; font-size: 11px; font-weight: 600; color: #64748b; line-height: 1.2; }
        .bar-bg { flex: 1; height: 24px; background: #f1f5f9; border-radius: 4px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .bar-value { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-weight: 800; font-size: 12px; color: #1e293b; }
    </style>
</head>
<body>
    <div class="max-w-[1600px] mx-auto space-y-8">
        <!-- 1. Marquee -->
        <div class="marquee-wrapper py-3 overflow-hidden shadow-xl rounded-2xl relative z-20">
            <div class="animate-marquee whitespace-nowrap flex items-center">
                <div id="marquee-content" class="flex gap-16 items-center px-4"></div>
                <div id="marquee-content-clone" class="flex gap-16 items-center px-4"></div>
            </div>
        </div>

        <!-- 2. Hàng 1: Đơn thư, 1022, Hồ sơ -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div id="container-don-thu"></div>
            <div id="container-1022"></div>
            <div id="container-ho-so"></div>
        </div>

        <!-- 3. Hàng 2: An ninh, Quốc phòng -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div id="container-an-ninh"></div>
            <div id="container-quoc-phong"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Hàm nạp file con
        async function loadComponent(id, file) {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        }

        // Chạy khi nạp xong tất cả components
        async function initDashboard() {
            await Promise.all([
                loadComponent('container-don-thu', 'tong-quan/tq-don-thu.html'),
                loadComponent('container-1022', 'tong-quan/tq-1022.html'),
                loadComponent('container-ho-so', 'tong-quan/tq-ho-so.html'),
                loadComponent('container-an-ninh', 'tong-quan/tq-an-ninh.html'),
                loadComponent('container-quoc-phong', 'tong-quan/tq-quoc-phong.html')
            ]);

            // Sau khi nạp HTML xong, bắt đầu lắng nghe Firebase
            onValue(ref(db, 'dashboard_binhhung'), (snap) => {
                const d = snap.val(); if(!d) return;
                
                // Đổ dữ liệu vào các ID nằm trong các file con
                // 1. Đơn thư
                const dtT = (d.don_thu_moi?.ky_truoc || 0) + (d.don_thu_moi?.moi_phat_sinh || 0);
                const dtX = d.don_thu_moi?.da_giai_quyet || 0;
                document.getElementById('dt_tong').innerText = dtT;
                document.getElementById('dt_xong').innerText = dtX;
                document.getElementById('dt_cho').innerText = Math.max(0, dtT - dtX);
                document.getElementById('dt_donut').style.background = `conic-gradient(#10b981 ${(dtX/dtT*100) || 0}%, #e2e8f0 0deg)`;

                // 2. 1022
                const pa = d.pa_1022 || {};
                document.getElementById('pa_tong').innerText = pa.tong || 0;
                document.getElementById('pa_xong').innerText = pa.da_giai_quyet || 0;
                document.getElementById('pa_cho').innerText = pa.chua_giai_quyet || 0;
                document.getElementById('pa_donut').style.background = `conic-gradient(#3b82f6 ${(pa.da_giai_quyet/pa.tong*100) || 0}%, #e2e8f0 0deg)`;

                // 3. Hồ sơ
                const hs = d.ho_so_thang || {};
                document.getElementById('hs_luy_ke').innerText = hs.luy_ke || 0;
                document.getElementById('hs_rate').innerText = (hs.luy_ke > 0 ? ((hs.truoc_han || 0)/(hs.luy_ke)*100).toFixed(1) : 0) + "%";
                document.getElementById('hs_hai_long').innerText = (hs.hai_long_percent || 0) + "%";

                // 4. Marquee (Tự động lặp lại cho mượt)
                if(d.chi_tieu) {
                    const html = Object.entries(d.chi_tieu).map(([k, v]) => `<div class="flex gap-2"><b>${k}:</b> <span class="text-red-700">${v}</span></div>`).join(' ◆ ');
                    document.getElementById('marquee-content').innerHTML = html;
                    document.getElementById('marquee-content-clone').innerHTML = html;
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>

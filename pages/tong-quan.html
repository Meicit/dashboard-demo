<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; }
        .carousel-track { display: flex; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .carousel-page { min-width: 100%; display: flex; gap: 15px; padding: 10px; }
        .indicator-card { flex: 1; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 20px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; min-height: 155px; border: 1px solid rgba(255,255,255,0.1); }
        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="space-y-8">
        <section class="bg-white rounded-3xl overflow-hidden border border-slate-200 shadow-sm">
            <div class="p-4 bg-slate-50/50 border-b flex justify-between px-8 items-center">
                <span class="font-black text-slate-700 text-xs uppercase tracking-wider">Chỉ tiêu nhiệm vụ chính trị 2026</span>
                <span id="page-num" class="text-[10px] font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full">TRANG 1/8</span>
            </div>
            <div class="overflow-hidden bg-slate-50"><div id="carouselTrack" class="carousel-track"></div></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <div class="md:col-span-4 bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tình hình Đơn thư</h3>
                <div class="donut-chart mt-4" id="dt_donut" style="background: conic-gradient(#10b981 var(--dt-p, 0%), #f1f5f9 0deg);">
                    <div class="donut-inner">
                        <span id="dt_tong" class="text-4xl font-black text-slate-800">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Tổng đơn</span>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-4 mt-8">
                    <div class="bg-emerald-50 p-4 rounded-2xl text-center"><div class="text-[10px] font-bold text-emerald-600 uppercase mb-1">Đã xong</div><div id="dt_xong" class="text-2xl font-black text-emerald-700">0</div></div>
                    <div class="bg-red-50 p-4 rounded-2xl text-center"><div class="text-[10px] font-bold text-red-600 uppercase mb-1">Chờ GQ</div><div id="dt_cho" class="text-2xl font-black text-red-700">0</div></div>
                </div>
            </div>

            <div class="md:col-span-4 bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-center relative">
                <h3 class="absolute top-6 left-8 text-[10px] font-black text-slate-400 uppercase tracking-widest">Phản ánh 1022</h3>
                <div class="donut-chart mt-4" id="pa_donut" style="background: conic-gradient(#3b82f6 var(--pa-p, 0%), #f1f5f9 0deg);">
                    <div class="donut-inner">
                        <span id="pa_tong" class="text-4xl font-black text-slate-800">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Tổng tin</span>
                    </div>
                </div>
                <div class="w-full grid grid-cols-2 gap-4 mt-8">
                    <div class="bg-blue-50 p-4 rounded-2xl text-center"><div class="text-[10px] font-bold text-blue-600 uppercase mb-1">Đã xong</div><div id="pa_xong" class="text-2xl font-black text-blue-700">0</div></div>
                    <div class="bg-orange-50 p-4 rounded-2xl text-center"><div class="text-[10px] font-bold text-orange-600 uppercase mb-1">Chờ GQ</div><div id="pa_cho" class="text-2xl font-black text-orange-700">0</div></div>
                </div>
            </div>

            <div class="md:col-span-4 space-y-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[32px] shadow-xl relative overflow-hidden text-white flex flex-col justify-between h-[185px]">
                    <div><div class="text-[10px] font-bold opacity-70 uppercase mb-2">Hồ sơ hành chính</div><div id="hs_tong" class="text-5xl font-black italic">0</div></div>
                    <div class="z-10 flex justify-between items-center bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Đúng hạn:</span><span id="hs_rate" class="text-2xl font-black text-emerald-300">0%</span>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-6 rounded-[32px] shadow-xl text-white text-center h-[130px] flex flex-col justify-center">
                    <div class="text-[10px] font-bold opacity-70 uppercase mb-1">Văn bản chỉ đạo</div><div id="vb_tong" class="text-6xl font-black italic">0</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));

        const indicators = [ {id:"ct_1", ten:"Tăng trưởng GTSC", dv:"%", kh:"10.5"}, {id:"ct_2", ten:"Thu ngân sách", dv:"Tr.đ", kh:"100"}, {id:"ct_3", ten:"Giải ngân ĐTC", dv:"%", kh:"95"}, {id:"ct_4", ten:"BHYT", dv:"%", kh:"95"}, {id:"ct_5", ten:"BHXH", dv:"%", kh:"59.5"}, {id:"ct_6", ten:"Mầm non", dv:"%", kh:"27"}, {id:"ct_7", ten:"Tiểu học", dv:"%", kh:"32"}, {id:"ct_8", ten:"THCS", dv:"%", kh:"43"}, {id:"ct_9", ten:"Phòng học", dv:"P", kh:"460"}, {id:"ct_10", ten:"HT THCS", dv:"%", kh:"99"}, {id:"ct_11", ten:"Hộ nghèo", dv:"H", kh:"-"}, {id:"ct_12", ten:"Chuẩn NTM", dv:"TC", kh:"3"}, {id:"ct_13", ten:"Ấp VH", dv:"%", kh:"95"}, {id:"ct_14", ten:"GĐ VH", dv:"%", kh:"93"}, {id:"ct_15", ten:"Tiêm chủng", dv:"%", kh:"95"}, {id:"ct_16", ten:"Việc làm", dv:"Ng", kh:"1000"}, {id:"ct_17", ten:"Du lịch", dv:"MH", kh:"1"}, {id:"ct_18", ten:"Nước sạch", dv:"%", kh:"100"}, {id:"ct_19", ten:"Rác thải", dv:"%", kh:"100"}, {id:"ct_20", ten:"Rác y tế", dv:"%", kh:"100"}, {id:"ct_21", ten:"Nước thải CN", dv:"%", kh:"100"}, {id:"ct_22", ten:"HS đúng hạn", dv:"%", kh:"99.5"}, {id:"ct_23", ten:"Chữ ký số", dv:"%", kh:"100"}, {id:"ct_24", ten:"Nhập ngũ", dv:"Ng", kh:"31"}, {id:"ct_25", ten:"Tội phạm", dv:"%", kh:"-10"}, {id:"ct_26", ten:"Phá án", dv:"%", kh:">80"}, {id:"ct_27", ten:"TNGT", dv:"%", kh:"-5"}, {id:"ct_28", ten:"Cháy nổ", dv:"V", kh:"0"}, {id:"ct_29", ten:"Ma túy", dv:"Đ", kh:"Đạt"}, {id:"ct_30", ten:"Phản ánh", dv:"%", kh:"50"}, {id:"ct_31", ten:"Văn bản ĐT", dv:"%", kh:"100"}, {id:"ct_32", ten:"Số hóa", dv:"%", kh:"100"}, {id:"ct_33", ten:"TT Online", dv:"%", kh:"100"}, {id:"ct_34", ten:"Hòa giải", dv:"%", kh:"100"}, {id:"ct_35", ten:"PCCC", dv:"%", kh:"100"}, {id:"ct_36", ten:"Tin báo", dv:"%", kh:"100"}, {id:"ct_37", ten:"DQTV", dv:"%", kh:"100"}, {id:"ct_38", ten:"Đảng viên", dv:"Đ/v", kh:"-"} ];

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            
            // --- ĐƠN THƯ (Sửa lỗi trỏ vào nhánh don_thu_moi) ---
            const dtData = d.don_thu_moi || {};
            const dtXong = dtData.du_dieu_kien || 0; // Hoặc sử dụng một logic tính toán khác nếu bạn muốn
            const dtTong = (dtData.ky_truoc || 0) + (dtData.moi_phat_sinh || 0);
            const dtHienTaiT = dtTong || 1;
            
            document.getElementById('dt_tong').innerText = dtTong;
            document.getElementById('dt_xong').innerText = dtXong;
            document.getElementById('dt_cho').innerText = dtTong - dtXong > 0 ? dtTong - dtXong : 0;
            document.getElementById('dt_donut').style.setProperty('--dt-p', (dtXong/dtHienTaiT*100) + '%');

            // --- 1022 (Giữ nguyên) ---
            const paX = d.pa_1022?.da_giai_quyet || 0; const paT = d.pa_1022?.tong || 1;
            document.getElementById('pa_tong').innerText = d.pa_1022?.tong || 0;
            document.getElementById('pa_xong').innerText = paX;
            document.getElementById('pa_cho').innerText = d.pa_1022?.chua_giai_quyet || 0;
            document.getElementById('pa_donut').style.setProperty('--pa-p', (paX/paT*100) + '%');

            // --- HO SO (Sửa lỗi trỏ vào nhánh ho_so_thang) ---
            const hsData = d.ho_so_thang || {};
            const hsT = hsData.thang_tong || 0; 
            const hsD = hsData.truoc_han || 0; // Lấy hồ sơ trước hạn làm chỉ số đúng hạn
            document.getElementById('hs_tong').innerText = hsT;
            document.getElementById('hs_rate').innerText = (hsT > 0 ? (hsD/hsT*100).toFixed(1) : 0) + "%";
            
            document.getElementById('vb_tong').innerText = d.van_ban?.tong || 0;

            if(d.chi_tieu) { indicators.forEach(it => it.th = d.chi_tieu[it.id] || 0); renderCarousel(); }
        });

        function renderCarousel() {
            const track = document.getElementById('carouselTrack'); track.innerHTML = '';
            for(let i=0; i < 8; i++) {
                const page = document.createElement('div'); page.className = 'carousel-page';
                page.innerHTML = indicators.slice(i*5, (i+1)*5).map(it => `<div class="indicator-card"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${it.ten}</div><div class="text-4xl font-black italic">${it.th}<span class="text-sm font-normal opacity-60 ml-1">${it.dv}</span></div><div class="text-[10px] text-emerald-400 font-bold uppercase tracking-tighter">Kế hoạch: ${it.kh}</div></div>`).join('');
                track.appendChild(page);
            }
        }
        let curP = 0; setInterval(() => { curP=(curP+1)%8; const track=document.getElementById('carouselTrack'); if(track) track.style.transform=`translateX(-${curP*100}%)`; document.getElementById('page-num').innerText=`TRANG ${curP+1}/8`; }, 10000);
    </script>
</body>
</html>

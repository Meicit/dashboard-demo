<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; } </style>
</head>
<body>
    <div class="bg-white p-8 rounded-3xl border shadow-sm max-w-4xl mx-auto">
        <h3 class="font-bold border-b pb-4 mb-6 text-blue-900 uppercase">Báo cáo xử lý đơn thư</h3>
        <table class="w-full border-collapse text-center">
            <thead><tr class="bg-slate-100 font-bold uppercase text-xs"><td class="p-4 border">Mục lục đơn thư</td><td class="p-4 border">Số lượng</td></tr></thead>
            <tbody id="dt_body"></tbody>
        </table>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));
        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('dt_body').innerHTML = `
                <tr><td class="p-4 border text-left italic">Phản ánh, kiến nghị</td><td class="p-4 border font-black text-2xl text-blue-600">${d.don_thu?.pa_kn||0}</td></tr>
                <tr><td class="p-4 border text-left italic">Khiếu nại</td><td class="p-4 border font-black text-2xl text-blue-600">${d.don_thu?.khieu_nai||0}</td></tr>
                <tr><td class="p-4 border text-left italic">Tố cáo</td><td class="p-4 border font-black text-2xl text-blue-600">${d.don_thu?.to_cao||0}</td></tr>
            `;
        });
    </script>
</body>
</html>

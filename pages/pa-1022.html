<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; } </style>
</head>
<body>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
            <h3 class="font-bold uppercase text-xs text-slate-500 border-b pb-2">Báo cáo 1022</h3>
            <div class="flex justify-between"><span>Tổng số tin:</span><span id="m1022_tong" class="font-black text-lg">0</span></div>
            <div class="flex justify-between text-emerald-600 font-bold"><span>Đã xử lý:</span><span id="m1022_xong">0</span></div>
            <div class="pt-2 border-t">
                <div class="flex justify-between text-blue-600 mb-1 font-bold"><span>Tỷ lệ:</span><span id="m1022_rate">0%</span></div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div id="m1022_bar" class="bg-blue-500 h-full" style="width:0%"></div></div>
            </div>
        </div>
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl border shadow-sm">
            <h3 class="font-bold uppercase text-xs text-slate-500 mb-4">Lĩnh vực phản ánh</h3>
            <div id="pa_fields_container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            const p1 = d.pa_1022 || {}; const p1d = d.pa_1022_detail || {};
            const rate = p1.tong > 0 ? (p1.da_giai_quyet / p1.tong * 100).toFixed(1) : 0;
            document.getElementById('m1022_tong').innerText = p1.tong || 0;
            document.getElementById('m1022_xong').innerText = p1.da_giai_quyet || 0;
            document.getElementById('m1022_rate').innerText = rate + "%";
            document.getElementById('m1022_bar').style.width = rate + "%";

            const fields = [ {l:'Tiếng ồn',v:p1d.tieng_on,c:'bg-red-500'}, {l:'Kinh tế',v:p1d.kinh_te_ha_tang,c:'bg-orange-500'}, {l:'Trật tự',v:p1d.trat_tu_do_thi,c:'bg-yellow-500'}, {l:'Văn hóa',v:p1d.van_hoa_xa_hoi,c:'bg-emerald-500'}, {l:'Hành chính',v:p1d.hanh_chinh_cong,c:'bg-blue-500'}, {l:'Khác',v:p1d.khac,c:'bg-slate-400'} ];
            document.getElementById('pa_fields_container').innerHTML = fields.map(f => `<div class="space-y-1"><div class="flex justify-between text-xs font-bold"><span>${f.l}</span><span>${f.v||0}</span></div><div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="${f.c} h-full" style="width:${p1.tong>0?(f.v/p1.tong*100):0}%"></div></div></div>`).join('');
        });
    </script>
</body>
</html>

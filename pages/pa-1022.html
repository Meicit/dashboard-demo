<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; } </style>
</head>
<body>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
        <div class="bg-white p-8 rounded-3xl border shadow-sm space-y-6">
            <h3 class="font-bold border-b pb-2 uppercase text-slate-500 text-xs tracking-widest">Số liệu tổng hợp</h3>
            <div class="flex justify-between items-center bg-slate-50 p-6 rounded-2xl"><span>TỔNG TIN</span><b id="p_tong" class="text-4xl font-black">0</b></div>
            <div class="flex justify-between items-center bg-blue-50 p-6 rounded-2xl text-blue-700"><span>ĐÃ XỬ LÝ</span><b id="p_xong" class="text-4xl font-black">0</b></div>
        </div>
        <div class="bg-white p-8 rounded-3xl border shadow-sm">
            <h3 class="font-bold border-b pb-4 mb-4 uppercase text-slate-500 text-xs tracking-widest">Phân bổ lĩnh vực</h3>
            <div id="fields_list" class="space-y-4"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));
        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            const p = d.pa_1022 || {}; const p1d = d.pa_1022_detail || {};
            document.getElementById('p_tong').innerText = p.tong || 0;
            document.getElementById('p_xong').innerText = p.da_giai_quyet || 0;
            const fs = [ {l:'Tiếng ồn',v:p1d.tieng_on,c:'bg-red-500'}, {l:'Kinh tế',v:p1d.kinh_te_ha_tang,c:'bg-orange-500'}, {l:'Trật tự',v:p1d.trat_tu_do_thi,c:'bg-yellow-500'}, {l:'Văn hóa',v:p1d.van_hoa_xa_hoi,c:'bg-emerald-500'}, {l:'Hành chính',v:p1d.hanh_chinh_cong,c:'bg-blue-500'}, {l:'Khác',v:p1d.khac,c:'bg-slate-400'} ];
            document.getElementById('fields_list').innerHTML = fs.map(f => `<div class="space-y-1"><div class="flex justify-between text-xs font-bold uppercase tracking-tight"><span>${f.l}</span><span>${f.v||0}</span></div><div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="${f.c} h-full" style="width:${p.tong>0?(f.v/p.tong*100):0}%"></div></div></div>`).join('');
        });
    </script>
</body>
</html>

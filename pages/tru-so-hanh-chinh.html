<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trụ sở cơ quan hành chính - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(rgba(241, 245, 249, 0.15), rgba(241, 245, 249, 0.15)), url('../hinhnen.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #0c4a6e; display: flex; flex-direction: column;
        }
        .container-wrapper { max-width: 1440px; margin: 50px auto 80px; padding: 0 40px; width: 100%; }
        .title-main { font-weight: 900; text-transform: uppercase; font-size: clamp(2rem, 5vw, 3.5rem); color: #0c4a6e; text-shadow: 0 2px 12px rgba(255, 255, 255, 0.9); }
        
        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 2px solid rgba(255, 255, 255, 0.8); border-left: 2px solid rgba(255, 255, 255, 0.7); border-radius: 32px; padding: 50px; box-shadow: 0 25px 50px -12px rgba(12, 74, 110, 0.2); }
        
        /* Cấu trúc dòng thông tin phẳng */
        .row-flat { background: white; border-radius: 16px; border: 1px solid rgba(14, 165, 233, 0.15); transition: all 0.3s ease; cursor: pointer; }
        .row-flat:hover { transform: translateX(8px); border-color: #0ea5e9; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.1); }
        .row-flat.active { border-color: #0b4a8f; background: rgba(224, 242, 254, 0.4); box-shadow: 0 0 0 2px #0b4a8f; }

        .btn-back { display: inline-flex; align-items: center; gap: 10px; background: #ffffff; border: 1px solid #e2e8f0; color: #0c4a6e; padding: 14px 32px; border-radius: 16px; font-weight: 800; font-size: 13px; text-transform: uppercase; box-shadow: 0 4px 6px -1px rgba(12, 74, 110, 0.1); transition: all 0.3s ease; margin-bottom: 30px; }
        .btn-back:hover { transform: translateY(-3px); border-color: #0ea5e9; color: #0ea5e9; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.3); }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <a href="../home.html" class="btn-back">⬅️ Quay lại Trang chủ</a>

        <header class="text-center mb-10">
            <h1 class="title-main italic">Trụ sở các cơ quan hành chính trên địa bàn xã Bình Hưng</h1>
            <p class="text-sky-800 font-bold uppercase tracking-[0.3em] mt-3 text-xs md:text-sm drop-shadow-sm">Cơ sở dữ liệu định vị địa giới chính quyền số liên thông</p>
        </header>

        <div class="glass-panel space-y-8">
            
            <div class="relative w-full max-w-2xl mx-auto">
                <span class="absolute left-5 top-4 text-xl">🔍</span>
                <input type="text" id="search_input" placeholder="Nhập tên cơ quan hoặc từ khóa địa chỉ để tra cứu nhanh..." class="w-full bg-white/90 border-2 border-sky-200 rounded-2xl px-14 py-4 text-base font-semibold text-slate-800 focus:outline-none focus:border-sky-500 shadow-md placeholder-slate-400 font-['Inter']">
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <div id="list_container" class="lg:col-span-5 space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    <p class="italic text-slate-400 p-4">Hệ thống đang đồng bộ kho dữ liệu JSON...</p>
                </div>

                <div class="lg:col-span-7 w-full h-[600px] rounded-2xl overflow-hidden border-2 border-sky-900/10 shadow-xl bg-white">
                    <iframe id="map_frame" src="" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </div>

        </div>
    </div>

    <footer class="text-center py-12 text-sky-900 font-bold text-xs uppercase tracking-widest drop-shadow-sm mt-auto">
        © 2026 IOC Bình Hưng - Hệ thống Quản trị Bản đồ vị trí hành chính công
    </footer>

    <script>
        let localDataStore = [];

        // 1. Hàm nạp dữ liệu từ file JSON cục bộ
        async function fetchTruSoData() {
            try {
                const response = await fetch('data-tru-so.json');
                localDataStore = await response.json();
                renderList(localDataStore);
                
                // Mặc định nạp bản đồ của cơ quan đầu tiên khi vừa mở trang
                if(localDataStore.length > 0) {
                    switchMapLocation(localDataStore[0].map_embed, localDataStore[0].id);
                }
            } catch (error) {
                console.error("Lỗi liên thông tệp dữ liệu:", error);
                document.getElementById('list_container').innerHTML = `<p class="p-4 text-red-600 font-bold">⚠️ Không thể nạp file dữ liệu JSON. Vui lòng kiểm tra lại cấu trúc file data-tru-so.json</p>`;
            }
        }

        // 2. Hàm kết xuất dữ liệu thành cấu trúc từng dòng phẳng
        function renderList(dataArray) {
            const container = document.getElementById('list_container');
            if (dataArray.length === 0) {
                container.innerHTML = `<p class="p-6 text-center text-slate-500 font-bold">❌ Không tìm thấy cơ quan nào khớp với từ khóa tìm kiếm!</p>`;
                return;
            }

            container.innerHTML = dataArray.map(item => `
                <div id="card_item_${item.id}" onclick="switchMapLocation('${item.map_embed}', ${item.id})" class="row-flat p-5 flex gap-4 items-start font-['Inter']">
                    <span class="text-2xl mt-1">📍</span>
                    <div class="space-y-1">
                        <h3 class="text-base font-extrabold text-slate-900 leading-snug">${item.name}</h3>
                        <p class="text-xs font-medium text-slate-500 leading-relaxed">${item.address}</p>
                    </div>
                </div>
            `).join('');
        }

        // 3. Hàm cốt lõi: Đổi vị trí bản đồ sang mã nhúng nhúng chuẩn xác
        window.switchMapLocation = function(embedUrl, id) {
            const mapFrame = document.getElementById('map_frame');
            
            // Cập nhật URL nhúng thực tế từ Google Maps
            mapFrame.setAttribute('src', embedUrl);
            
            // Đồng bộ hiệu ứng màu nền sáng cho hàng được chọn
            document.querySelectorAll('.row-flat').forEach(el => el.classList.remove('active'));
            const activeCard = document.getElementById(`card_item_${id}`);
            if(activeCard) activeCard.classList.add('active');
        }

        // 4. Bộ lọc tìm kiếm thời gian thực
        document.getElementById('search_input').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredData = localDataStore.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.address.toLowerCase().includes(keyword)
            );
            renderList(filteredData);
        });

        document.addEventListener("DOMContentLoaded", fetchTruSoData);
    </script>
</body>
</html>

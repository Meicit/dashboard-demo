<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; } </style>
</head>
<body>
    <div class="bg-white p-10 rounded-2xl border shadow-sm max-w-5xl mx-auto">
        <h3 class="font-bold border-b pb-4 mb-8 uppercase text-blue-900">Kết quả thực hiện hồ sơ hành chính</h3>
        <div id="hs_view" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            const hs = d.ho_so || {};
            document.getElementById('hs_view').innerHTML = `
                <div class="p-8 bg-slate-50 rounded-2xl border">TỔNG TIẾP NHẬN<br><b class="text-4xl text-slate-800">${hs.tong||0}</b></div>
                <div class="p-8 bg-blue-50 rounded-2xl border border-blue-100 text-blue-700">GIẢI QUYẾT ĐÚNG HẠN<br><b class="text-4xl">${hs.dung_han_count||0}</b></div>
                <div class="p-8 bg-emerald-50 rounded-2xl border border-emerald-100 text-emerald-700">NỘP TRỰC TUYẾN<br><b class="text-4xl">${hs.truc_tuyen||0}</b></div>
            `;
        });
    </script>
</body>
</html>

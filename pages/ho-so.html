<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; }
        .stat-card {
            background: white; border-radius: 24px; padding: 32px;
            border: 1px solid #e2e8f0; shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto">
        <div class="mb-8 border-b pb-4">
            <h3 class="font-black text-blue-900 uppercase tracking-wider text-lg">📊 Kết quả thực hiện hồ sơ hành chính</h3>
            <p class="text-slate-500 text-xs mt-1 italic">* Dữ liệu được cập nhật từ hệ thống một cửa điện tử 2026</p>
        </div>

        <div id="hs_view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
            <div class="stat-card">Đang tải...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'dashboard_binhhung'), (snap) => {
            const d = snap.val(); if(!d) return;
            const hs = d.ho_so || {};
            const hsT = hs.tong || 0;
            const hsD = hs.dung_han_count || 0;
            const hsO = hs.truc_tuyen || 0;
            const hsQ = hsT - hsD;

            document.getElementById('hs_view').innerHTML = `
                <div class="stat-card border-t-4 border-slate-400">
                    <span class="text-xs font-bold text-slate-400 uppercase mb-2">Tổng tiếp nhận</span>
                    <b class="text-5xl font-black text-slate-800">${hsT}</b>
                </div>
                <div class="stat-card border-t-4 border-blue-500 bg-blue-50/30">
                    <span class="text-xs font-bold text-blue-600 uppercase mb-2">Đúng hạn</span>
                    <b class="text-5xl font-black text-blue-700">${hsD}</b>
                    <span class="text-[10px] font-bold text-blue-400 mt-2 uppercase">Đạt: ${hsT>0?(hsD/hsT*100).toFixed(1):0}%</span>
                </div>
                <div class="stat-card border-t-4 border-emerald-500 bg-emerald-50/30">
                    <span class="text-xs font-bold text-emerald-600 uppercase mb-2">Trực tuyến</span>
                    <b class="text-5xl font-black text-emerald-700">${hsO}</b>
                    <span class="text-[10px] font-bold text-emerald-400 mt-2 uppercase">Tỷ lệ: ${hsT>0?(hsO/hsT*100).toFixed(1):0}%</span>
                </div>
                <div class="stat-card border-t-4 border-red-500 bg-red-50/30">
                    <span class="text-xs font-bold text-red-600 uppercase mb-2">Quá hạn</span>
                    <b class="text-5xl font-black text-red-700">${hsQ >= 0 ? hsQ : 0}</b>
                </div>
            `;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch công tác tuần - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 15px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .calendar-wrapper {
            flex: 1;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto w-full h-full flex flex-col space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-[24px] border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-blue-600 rounded-xl text-white shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-base font-black text-slate-800 uppercase italic leading-none">Lịch công tác tuần</h2>
                    <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mt-1">Hệ thống đồng bộ thời gian thực</p>
                </div>
            </div>
            <div class="text-right">
                <span id="live-date" class="text-xs font-bold text-slate-500 italic uppercase"></span>
            </div>
        </div>

        <div class="calendar-wrapper">
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=uybannhandan.xabinhhung%40gmail.com&ctz=Asia%2FHo_Chi_Minh&mode=WEEK&showTitle=0&showNav=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&wkst=2&hl=vi" 
                style="border: 0" 
                frameborder="0" 
                scrolling="no">
            </iframe>
        </div>
    </div>

    <script>
        // Hiển thị ngày hiện tại tiếng Việt
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = new Date().toLocaleDateString('vi-VN', options);
    </script>
</body>
</html>

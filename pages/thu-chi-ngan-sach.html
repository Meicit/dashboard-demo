<script type="module">
    // ... (Giữ nguyên các khai báo firebase)

    // Hàm đệ quy để render bảng chi tiết bao gồm cả mục con
    function renderRecursiveTable(data, level = 0) {
        let html = '';
        data.forEach((item, index) => {
            const isHeader = level === 0;
            const padding = level * 20; // Thụt lề cho mục con
            
            // Lấy số liệu (xử lý an toàn với các trường có thể bị null)
            const plan = (item.du_toan && typeof item.du_toan === 'object') ? item.du_toan.thu_nsdp : (item.du_toan || 0);
            const exec = (item.thuc_hien && typeof item.thuc_hien === 'object') ? item.thuc_hien.thu_nsdp : (item.thuc_hien || 0);
            const rate = item.ty_le ? (item.ty_le * 100).toFixed(1) : ((exec / (plan || 1)) * 100).toFixed(1);

            html += `
                <div class="table-row-item ${isHeader ? 'bg-sky-50 dark:bg-sky-900/20' : ''}">
                    <div class="grid-table-layout" style="padding-left: ${16 + padding}px">
                        <div class="w-idx font-black text-dynamic-label">${item.stt || '-'}</div>
                        <div class="w-name truncate text-dynamic-body ${level === 0 ? 'font-black' : 'font-medium'}">${item.noi_dung}</div>
                        <div class="w-plan font-mono text-dynamic-title">${formatMoney(plan)}</div>
                        <div class="w-exec font-mono text-emerald-600 font-bold">${formatMoney(exec)}</div>
                        <div class="w-rate font-bold text-sky-600">${rate}%</div>
                    </div>
                </div>
            `;

            // Nếu có mục con, gọi đệ quy tiếp
            if (item.danh_muc_con && item.danh_muc_con.length > 0) {
                html += renderRecursiveTable(item.danh_muc_con, level + 1);
            }
        });
        return html;
    }

    // Khi nhận dữ liệu từ Firebase
    onValue(thuRef, (snap) => {
        const data = snap.val();
        if(!data) return;
        
        // Gọi hàm đệ quy để render toàn bộ bảng
        document.getElementById('thu-table-body').innerHTML = renderRecursiveTable(data.chi_tiet_ngan_sach);
    });

    onValue(chiRef, (snap) => {
        const data = snap.val();
        if(!data) return;
        
        // Gọi hàm đệ quy cho bên Chi
        document.getElementById('chi-table-body').innerHTML = renderRecursiveTable(data.chi_tiet_ngan_sach);
    });
    
    // ... (Giữ nguyên các hàm drawCharts và setTheme)
</script>

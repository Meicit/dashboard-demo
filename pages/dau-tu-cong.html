<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đầu tư công - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; padding: 15px; }
        .grid-row { display: flex; align-items: center; width: 100%; padding: 12px 15px; position: relative; }
        .col-stt { width: 5%; text-align: center; }
        .col-name { width: 35%; padding-left: 15px; }
        .col-type { width: 12%; text-align: center; }
        .col-cap { width: 15%; text-align: right; }
        .col-invest { width: 13%; text-align: right; }
        .col-rate { width: 8%; text-align: center; }
        .col-status { width: 12%; text-align: center; }

        .header-row { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; border-radius: 15px;
            margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .row-container { margin-bottom: 8px; perspective: 1000px; }
        .row-3d { position: relative; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.8); }
        .row-content { position: relative; z-index: 1; }

        /* Khung kính mờ Glassmorphism dành riêng cho AI phân tích số liệu */
        .ai-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.1);
        }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto italic">
        
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-slate-900">
                <p class="text-[9px] font-black text-slate-500 uppercase italic">Số dự án</p>
                <h3 id="card_tong_du_an" class="text-3xl font-[950] text-slate-900">0</h3>
            </div>
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-indigo-700">
                <p class="text-[9px] font-black text-indigo-500 uppercase italic">Tổng vốn GĐ</p>
                <h3 id="card_von_giai_doan" class="text-3xl font-[950] text-indigo-700">0</h3>
            </div>
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-blue-700">
                <p class="text-[9px] font-black text-blue-500 uppercase italic">Vốn năm 2026</p>
                <h3 id="card_von_nam" class="text-3xl font-[950] text-blue-700">0</h3>
            </div>
        </div>

        <div class="w-full mb-6">
            <div class="grid-row header-row">
                <div class="col-stt">STT</div>
                <div class="col-name text-left uppercase">Tên dự án / công trình trọng điểm</div>
                <div class="col-type">Lĩnh vực</div>
                <div class="col-cap">Tổng vốn</div>
                <div class="col-invest text-blue-300">Đã đầu tư</div>
                <div class="col-rate">Tỷ lệ</div>
                <div class="col-status">Trạng thái</div>
            </div>
            <div id="project-list-container" class="text-[11px] font-extrabold text-slate-900"></div>
        </div>

        <div class="w-full ai-panel rounded-[25px] p-6 mb-8">
            <div class="flex items-center gap-3 border-b border-sky-900/10 pb-3 mb-4">
                <span class="text-2xl">🤖</span>
                <div>
                    <h2 class="text-xs font-[900] text-sky-900 uppercase tracking-wider font-['Montserrat']">Trợ lý Số điều hành i-Dashboard</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-0.5">Tự động đánh giá hiệu quả tiến độ giải ngân đầu tư công</p>
                </div>
            </div>
            <div id="ai-analysis-content" class="text-[12px] font-semibold text-slate-700 leading-relaxed text-justify space-y-2">
                <p class="italic text-slate-400">Hệ thống đang thu thập dữ liệu từ Firebase và tiến hành phân tích chỉ số...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        // Thư viện kết nối trực tiếp với dòng lệnh AI của Google Gemini
        import { GoogleGenAI } from "https://esm.run/@google/generative-ai";

        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dtcRef = ref(db, 'dashboard_binhhung/dau_tu_cong_chi_tiet');

        // Khởi tạo thực thể AI (Dùng dòng mô hình thế hệ mới Gemini 1.5 Flash để xử lý tốc độ cao)
        // Lưu ý: Thay chuỗi "AIzaSy..." bằng mã API Key cá nhân bạn lấy từ Google AI Studio
        const aiKey = "AIzaSyChuoiApiKeyCuaBanGiaTriThucTe"; 
        const aiEngine = new GoogleGenAI({ apiKey: aiKey });
        const aiModel = aiEngine.getGenerativeModel({ model: "gemini-1.5-flash" });

        const parseVNNumber = (str) => {
            if (!str) return 0;
            const cleanStr = String(str).replace(/\./g, '').replace(',', '.');
            return parseFloat(cleanStr) || 0;
        };

        // Hàm chuyển gói dữ liệu Firebase gửi sang cho AI phân tích chuyên sâu
        async function runAiAnalysis(rawSnapshotData) {
            const aiViewElement = document.getElementById('ai-analysis-content');
            
            try {
                // Tạo câu lệnh cấu trúc (Prompt) định hình vai trò chuyên gia kinh tế cho AI
                const promptContext = `
                    Bạn là Trợ lý số điều hành thông minh (IOC) của Ủy ban nhân dân xã Bình Hưng, TP.HCM năm 2026.
                    Hãy đọc dữ liệu JSON đầu tư công thời gian thực dưới đây và viết một đoạn phân tích, đánh giá số liệu súc tích khoảng 3-4 câu:
                    - Tổng số dự án: ${rawSnapshotData.tong_du_an}
                    - Tổng vốn giai đoạn: ${rawSnapshotData.von_giai_doan} tỷ VNĐ
                    - Kế hoạch vốn giao năm 2026: ${rawSnapshotData.von_nam} tỷ VNĐ
                    - Chi tiết danh mục các công trình: ${JSON.stringify(rawSnapshotData.projects)}

                    Yêu cầu nội dung phản hồi:
                    1. Đánh giá nhanh tổng quan quy mô đầu tư và dự án nào đang có tỷ lệ giải ngân cao nhất/thấp nhất dựa trên việc so sánh số vốn đã đầu tư (invested) và tổng vốn (capital).
                    2. Chỉ ra dự án nào cần đôn đốc tiến độ giải phóng mặt bằng hoặc thi công (nếu tỷ lệ thấp).
                    3. Viết bằng văn phong công vụ chính xác, trang trọng, không dùng các ký hiệu định dạng như dấu sao vuông (**).
                `;

                const aiResponse = await aiModel.generateContent(promptContext);
                const resultText = aiResponse.response.text();
                
                // Trả văn bản phân tích sạch lên giao diện
                aiViewElement.innerHTML = `<p class="text-slate-800">${resultText.replace(/\*\*/g, '')}</p>`;
            } catch (error) {
                aiViewElement.innerHTML = `<p class="text-amber-700 font-bold">⚠️ Trợ lý số tạm thời chưa thể xuất báo cáo phân tích do chưa cấu hình chính xác API Key hoặc vượt quá hạn mức kết nối dữ liệu.</p>`;
            }
        }

        onValue(dtcRef, (snap) => {
            const d = snap.val();
            if (d && d.projects) {
                document.getElementById('card_tong_du_an').innerText = d.tong_du_an || 0;
                document.getElementById('card_von_giai_doan').innerText = d.von_giai_doan || 0;
                document.getElementById('card_von_nam').innerText = d.von_nam || 0;

                const container = document.getElementById('project-list-container');
                container.innerHTML = d.projects.map((p, i) => {
                    const totalCap = parseVNNumber(p.capital);
                    const invested = parseVNNumber(p.invested || 0);
                    const percentage = totalCap > 0 ? ((invested / totalCap) * 100).toFixed(1) : 0;

                    return `
                        <div class="row-container">
                            <div class="row-3d">
                                <div class="grid-row row-content">
                                    <div class="col-stt text-slate-400 font-black">${i+1}</div>
                                    <div class="col-name font-[900] truncate text-slate-900">${p.name}</div>
                                    <div class="col-type">
                                        <span class="bg-slate-100 px-2 py-0.5 rounded-md text-[8px] border border-slate-200 shadow-sm">${p.type}</span>
                                    </div>
                                    <div class="col-cap italic">${p.capital}</div>
                                    <div class="col-invest text-blue-800 italic">${p.invested || '0'}</div>
                                    <div class="col-rate">
                                        <span class="bg-slate-900 text-white px-2 py-0.5 rounded-md shadow-lg">${percentage}%</span>
                                    </div>
                                    <div class="col-status text-[8px] text-orange-700 font-[900] uppercase italic">${p.status}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // GỌI KÍCH HOẠT AI: Mỗi khi dữ liệu trên Firebase Realtime thay đổi, AI sẽ tự động phân tích lại số liệu mới
                runAiAnalysis(d);
            }
        });
    </script>
</body>
</html>

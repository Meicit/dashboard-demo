<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #e2e8f0; }
        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background-color: #f8fafc; padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; color: #475569; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-gd { background-color: #eef2ff; color: #4f46e5; } /* Giáo dục */
        .badge-gt { background-color: #ecfdf5; color: #059669; } /* Giao thông */
        .badge-vh { background-color: #fff7ed; color: #ea580c; } /* Văn hóa */
        .badge-ql { background-color: #f5f3ff; color: #7c3aed; } /* Quản lý NN */
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
                <h2 class="text-2xl font-[900] text-slate-800 uppercase tracking-tighter italic">Danh mục Dự án Đầu tư công</h2>
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">Kế hoạch trung hạn giai đoạn 2026 - 2030</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Tổng mức đầu tư</p>
                    <p class="text-lg font-black text-purple-600 tracking-tight">554.323 <span class="text-[10px]">tr.đ</span></p>
                </div>
            </div>
        </div>

        <div class="card shadow-xl">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="5%">STT</th>
                            <th width="45%">Tên công trình / Dự án</th>
                            <th width="15%" class="text-center">Lĩnh vực</th>
                            <th width="15%" class="text-right">Vốn TP hỗ trợ</th>
                            <th width="15%" class="text-right">Vốn Xã (đối ứng)</th>
                            <th width="5%" class="text-center">Ghi chú</th>
                        </tr>
                    </thead>
                    <tbody id="project-table-body">
                        </tbody>
                </table>
            </div>

            <div class="mt-6 flex flex-col md:flex-row justify-between items-center text-[10px] font-bold text-slate-400 gap-4">
                <div class="flex items-center gap-4">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> Giáo dục</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Giao thông</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-purple-500"></span> Quản lý NN</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-500"></span> Văn hóa</span>
                </div>
                <p class="italic uppercase tracking-widest">Đơn vị tính: Triệu đồng (tr.đ)</p>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 1, name: "Xây dựng mới Trường Mầm non Bình Hưng (Cơ sở 2)", type: "GD", tp: 125450, xa: 1250 },
            { id: 2, name: "Nâng cấp, mở rộng đường liên ấp 2-3 (đoạn từ QL50 đến Rạch Mã Voi)", type: "GT", tp: 85600, xa: 850 },
            { id: 3, name: "Xây dựng Trụ sở làm việc UBND xã Bình Hưng (khu trung tâm mới)", type: "QL", tp: 62300, xa: 600 },
            { id: 4, name: "Cải tạo, sửa chữa Nhà Văn hóa xã và sân thể thao đa năng", type: "VH", tp: 12500, xa: 125 },
            { id: 5, name: "Xây dựng hệ thống thoát nước đường Phạm Hùng (đoạn ấp 4, 5)", type: "GT", tp: 42200, xa: 420 },
            { id: 6, name: "Xây dựng mới Trường Tiểu học Bình Hưng 3", type: "GD", tp: 95800, xa: 960 },
            { id: 7, name: "Nâng cấp tuyến hẻm ấp 1 kết nối đường Nguyễn Văn Linh", type: "GT", tp: 18400, xa: 180 },
            { id: 8, name: "Lắp đặt hệ thống Camera giám sát an ninh trật tự trên địa bàn xã", type: "QL", tp: 8500, xa: 85 },
            { id: 9, name: "Xây dựng Công viên cây xanh kết hợp khu vui chơi thiếu nhi ấp 2", type: "VH", tp: 15600, xa: 150 },
            { id: 10, name: "Dự án chống sạt lở bờ rạch Ông Lớn (đoạn qua ấp 5)", type: "GT", tp: 35000, xa: 350 },
            { id: 11, name: "Cải tạo cảnh quan và nạo vét rạch Xóm Củi", type: "GT", tp: 22400, xa: 220 },
            { id: 12, name: "Trang bị thiết bị dạy học số cho các trường công lập", type: "GD", tp: 7500, xa: 75 },
            { id: 13, name: "Xây dựng trạm trung chuyển rác khép kín ấp 3", type: "QL", tp: 12200, xa: 120 },
            { id: 14, name: "Nâng cấp mặt đường và vỉa hè đường số 10 (KDC Bình Hưng)", type: "GT", tp: 11500, xa: 110 },
            { id: 15, name: "Xây dựng Bia ghi danh liệt sĩ và khu truyền thống xã", type: "VH", tp: 5800, xa: 60 }
        ];

        const typeLabels = {
            "GD": "Giáo dục",
            "GT": "Giao thông",
            "VH": "Văn hóa",
            "QL": "Quản lý NN"
        };

        const tbody = document.getElementById('project-table-body');

        projects.forEach(p => {
            const row = `
                <tr>
                    <td class="text-slate-400 font-bold text-xs">${String(p.id).padStart(2, '0')}</td>
                    <td class="text-slate-800">${p.name}</td>
                    <td class="text-center">
                        <span class="badge badge-${p.type.toLowerCase()}">${typeLabels[p.type]}</span>
                    </td>
                    <td class="text-right font-bold text-blue-600">${p.tp.toLocaleString()}</td>
                    <td class="text-right font-bold text-purple-600">${p.xa.toLocaleString()}</td>
                    <td class="text-center text-slate-300">...</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    </script>
</body>
</html>

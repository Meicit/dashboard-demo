<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; padding: 15px; }
        
        /* Cấu trúc cột cố định để không bị lệch */
        .grid-row { display: flex; align-items: center; width: 100%; padding: 10px 15px; position: relative; }
        .col-stt { width: 5%; text-align: center; }
        .col-name { width: 35%; padding-left: 15px; }
        .col-type { width: 12%; text-align: center; }
        .col-cap { width: 15%; text-align: right; }
        .col-invest { width: 13%; text-align: right; }
        .col-rate { width: 8%; text-align: center; }
        .col-status { width: 12%; text-align: center; }

        /* Tiêu đề bảng kiểu Glassmorphism */
        .header-row { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; border-radius: 15px;
            margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* Hiệu ứng Hàng 3D tinh giản (Nền trắng thuần) */
        .row-container {
            margin-bottom: 8px;
            perspective: 1000px;
        }

        .row-3d {
            position: relative;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .row-3d:hover {
            transform: translateY(-2px) scale(1.005);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .row-content { position: relative; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto italic">
        
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-slate-900">
                <p class="text-[9px] font-black text-slate-500 uppercase italic">Số dự án</p>
                <h3 id="card_tong_du_an" class="text-3xl font-[950] text-slate-900">0</h3>
            </div>
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-indigo-700">
                <p class="text-[9px] font-black text-indigo-500 uppercase italic">Tổng vốn GĐ</p>
                <h3 id="card_von_giai_doan" class="text-3xl font-[950] text-indigo-700">0</h3>
            </div>
            <div class="bg-white p-4 rounded-[25px] shadow-lg border-b-4 border-blue-700">
                <p class="text-[9px] font-black text-blue-500 uppercase italic">Vốn năm 2026</p>
                <h3 id="card_von_nam" class="text-3xl font-[950] text-blue-700">0</h3>
            </div>
        </div>

        <div class="w-full">
            <div class="grid-row header-row">
                <div class="col-stt">STT</div>
                <div class="col-name text-left uppercase">Tên dự án / công trình trọng điểm</div>
                <div class="col-type">Lĩnh vực</div>
                <div class="col-cap">Tổng vốn</div>
                <div class="col-invest text-blue-300">Đã đầu tư</div>
                <div class="col-rate">Tỷ lệ</div>
                <div class="col-status">Trạng thái</div>
            </div>

            <div id="project-list-container" class="text-[11px] font-extrabold text-slate-900">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dtcRef = ref(db, 'dashboard_binhhung/dau_tu_cong_chi_tiet');

        const parseVNNumber = (str) => {
            if (!str) return 0;
            const cleanStr = String(str).replace(/\./g, '').replace(',', '.');
            return parseFloat(cleanStr) || 0;
        };

        onValue(dtcRef, (snap) => {
            const d = snap.val();
            if (d && d.projects) {
                document.getElementById('card_tong_du_an').innerText = d.tong_du_an || 0;
                document.getElementById('card_von_giai_doan').innerText = d.von_giai_doan || 0;
                document.getElementById('card_von_nam').innerText = d.von_nam || 0;

                const container = document.getElementById('project-list-container');
                container.innerHTML = d.projects.map((p, i) => {
                    const totalCap = parseVNNumber(p.capital);
                    const invested = parseVNNumber(p.invested || 0);
                    const percentage = totalCap > 0 ? ((invested / totalCap) * 100).toFixed(1) : 0;

                    return `
                        <div class="row-container">
                            <div class="row-3d">
                                <div class="grid-row row-content">
                                    <div class="col-stt text-slate-400 font-black">${i+1}</div>
                                    <div class="col-name font-[900] truncate text-slate-900">${p.name}</div>
                                    <div class="col-type">
                                        <span class="bg-slate-100 px-2 py-0.5 rounded-md text-[8px] border border-slate-200 shadow-sm">${p.type}</span>
                                    </div>
                                    <div class="col-cap italic">${p.capital}</div>
                                    <div class="col-invest text-blue-800 italic">${p.invested || '0'}</div>
                                    <div class="col-rate">
                                        <span class="bg-slate-900 text-white px-2 py-0.5 rounded-md shadow-lg">${percentage}%</span>
                                    </div>
                                    <div class="col-status text-[8px] text-orange-700 font-[900] uppercase italic">${p.status}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        });
    </script>
</body>
</html>

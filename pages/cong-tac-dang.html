<script>
        function loadDataFromViettelDB() {
            // ĐIỀN ĐƯỜNG DẪN ĐẾN FILE PHP CỦA BẠN VÀO ĐÂY
            const apiUrl = "https://tenmiencuaban.com/api_congtacdang.php"; 

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if(!data || data.error) {
                        console.error("Lỗi dữ liệu:", data.error);
                        return;
                    }

                    const fmt = (num) => new Intl.NumberFormat('vi-VN').format(num || 0);
                    
                    const setTxt = (id, val, prefix="") => { 
                        const el = document.getElementById(id); 
                        if(el) el.innerText = prefix + fmt(val); 
                    }

                    // 1. TỔ CHỨC ĐẢNG
                    if (data.to_chuc) {
                        setTxt('tc_tong', data.to_chuc.tong);
                        setTxt('tc_dbcs', data.to_chuc.dang_bo_cs);
                        setTxt('tc_cbcs', data.to_chuc.chi_bo_cs);
                        setTxt('tc_cbtt', data.to_chuc.chi_bo_truc_thuoc);
                    }

                    // 2. SỐ LƯỢNG ĐẢNG VIÊN
                    if (data.dang_vien) {
                        setTxt('dv_tong', data.dang_vien.tong);
                        setTxt('dv_ct', data.dang_vien.chinh_thuc);
                        setTxt('dv_db', data.dang_vien.du_bi);
                        setTxt('dv_mien', data.dang_vien.mien_sinh_hoat);
                    }

                    // 3. TIẾN ĐỘ PHÁT TRIỂN ĐẢNG VIÊN
                    if (data.phat_trien) {
                        setTxt('pt_ht', data.phat_trien.hien_tai);
                        setTxt('pt_ct', data.phat_trien.chi_tieu);
                        
                        let p_ht = data.phat_trien.hien_tai || 0;
                        let p_ct = data.phat_trien.chi_tieu || 1;
                        let pct = ((p_ht / p_ct) * 100).toFixed(2);
                        
                        let pctEl = document.getElementById('pt_percent');
                        if (pctEl) pctEl.innerText = pct + "%";
                        
                        let barEl = document.getElementById('pt_progress_bar');
                        if (barEl) barEl.style.width = pct + "%";

                        setTxt('pt_ll', data.phat_trien.dang_viet_ly_lich);
                        setTxt('pt_xm', data.phat_trien.dang_xac_minh);
                        setTxt('pt_tc', data.phat_trien.trinh_tieu_chuan);
                        setTxt('pt_nv', data.phat_trien.thuc_hien_nghiep_vu);
                    }

                    // 4. BIẾN ĐỘNG ĐẢNG VIÊN
                    if (data.bien_dong) {
                        setTxt('bd_tn', data.bien_dong.tiep_nhan, "+");
                        setTxt('bd_cd', data.bien_dong.chuyen_di, "-");
                        setTxt('bd_cnb', data.bien_dong.chuyen_noi_bo);
                        setTxt('bd_cct', data.bien_dong.chuyen_chinh_thuc);
                        setTxt('bd_xt', data.bien_dong.xoa_ten);
                    }

                    // 5. THẨM TRA & NHẬN XÉT
                    if (data.tham_tra) {
                        setTxt('tt_xvd', data.tham_tra.xin_vao_dang);
                        setTxt('tt_ctcb', data.tham_tra.cong_tac_can_bo);
                        setTxt('tt_nkd', data.tham_tra.noi_khac_den);
                        setTxt('tt_cuct', data.tham_tra.cap_uy_cu_tru);
                        setTxt('tt_xvdct', data.tham_tra.xin_vao_dang_cu_tru);
                    }

                    // 6. ĐẢNG VIÊN ĐI NƯỚC NGOÀI
                    if (data.di_nuoc_ngoai) {
                        setTxt('nn_dpd', data.di_nuoc_ngoai.da_phe_duyet);
                        setTxt('nn_dxm', data.di_nuoc_ngoai.dang_xac_minh);
                    }
                })
                .catch(error => {
                    console.error("Lỗi kết nối cơ sở dữ liệu:", error);
                });
        }

        window.setTheme = function(themeName) {
            const body = document.getElementById('body-context');
            const btnLight = document.getElementById('btn-theme-light');
            const btnDark = document.getElementById('btn-theme-dark');

            if (themeName === 'light') {
                body.classList.remove('dark-theme'); 
                body.classList.add('light-theme');
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-white text-blue-900 shadow-sm border border-transparent";
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-800 hover:text-white border border-transparent";
            } else {
                body.classList.remove('light-theme'); 
                body.classList.add('dark-theme');
                btnDark.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition bg-red-600 text-white shadow-sm border border-transparent";
                btnLight.className = "flex items-center gap-1.5 text-[11px] font-bold uppercase px-3 py-1.5 rounded-lg transition text-blue-200 hover:text-white border border-transparent";
            }
        }

        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('body-context');
            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); 
                body.classList.add('theme-do-hanhchinh');
                if (window.parent && window.parent.document) {
                    window.parent.document.body.classList.add('theme-do-hanhchinh');
                }
            } else {
                body.classList.remove('theme-do-hanhchinh'); 
                body.classList.add('theme-xanh-ios');
                if (window.parent && window.parent.document) {
                    window.parent.document.body.classList.remove('theme-do-hanhchinh');
                }
            }
            setTheme('light'); 
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTheme('light');
            loadDataFromViettelDB(); 
        });
    </script>

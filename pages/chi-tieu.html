<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 24px; }
        .table-container { background: white; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        th { background: #0f172a; color: white; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 16px; }
        td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-black text-slate-800 uppercase italic">Chi tiết 38 Chỉ tiêu nhiệm vụ chính trị 2026</h2>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Dữ liệu thời gian thực</span>
            </div>
        </div>

        <div class="table-container">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th class="w-16 text-center">STT</th>
                        <th>Nội dung chỉ tiêu nhiệm vụ</th>
                        <th class="text-center">ĐVT</th>
                        <th class="text-center">Kế hoạch</th>
                        <th class="text-center text-blue-400">Thực hiện</th>
                        <th class="text-center">Đánh giá</th>
                    </tr>
                </thead>
                <tbody id="indicators-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Danh sách định nghĩa gốc (Giữ nguyên tên từ file Excel)
        const indicators = [
            {id:"ct_1", ten:"Tốc độ tăng trưởng giá trị sản xuất các ngành kinh tế", dv:"%", kh:"10.5"},
            {id:"ct_2", ten:"Tổng thu ngân sách nhà nước trên địa bàn", dv:"Tr.đ", kh:"100"},
            {id:"ct_3", ten:"Tỷ lệ giải ngân vốn đầu tư công", dv:"%", kh:"95"},
            {id:"ct_4", ten:"Tỷ lệ người dân tham gia bảo hiểm y tế", dv:"%", kh:"95"},
            {id:"ct_5", ten:"Tỷ lệ lao động trong độ tuổi tham gia bảo hiểm xã hội", dv:"%", kh:"59.5"},
            {id:"ct_6", ten:"Tỷ lệ trẻ em dưới 5 tuổi suy dinh dưỡng (thể nhẹ cân)", dv:"%", kh:"27"},
            {id:"ct_7", ten:"Tỷ lệ trẻ em dưới 5 tuổi suy dinh dưỡng (thể thấp còi)", dv:"%", kh:"32"},
            {id:"ct_8", ten:"Số lao động được tạo việc làm mới", dv:"Người", kh:"1000"},
            {id:"ct_9", ten:"Tỷ lệ lao động qua đào tạo có bằng cấp, chứng chỉ", dv:"%", kh:"43"},
            {id:"ct_10", ten:"Tỷ lệ hộ nghèo theo chuẩn đa chiều", dv:"%", kh:"0.0"},
            {id:"ct_11", ten:"Tỷ lệ hộ cận nghèo theo chuẩn đa chiều", dv:"%", kh:"0.0"},
            {id:"ct_12", ten:"Số tiêu chí nông thôn mới nâng cao duy trì và giữ vững", dv:"Tiêu chí", kh:"19/19"},
            {id:"ct_13", ten:"Tỷ lệ ấp đạt chuẩn ấp văn hóa", dv:"%", kh:"100"},
            {id:"ct_14", ten:"Tỷ lệ gia đình đạt chuẩn gia đình văn hóa", dv:"%", kh:"95"},
            {id:"ct_15", ten:"Tỷ lệ trẻ em trong độ tuổi được tiêm chủng đầy đủ", dv:"%", kh:"98"},
            {id:"ct_16", ten:"Tỷ lệ học sinh tốt nghiệp trung học cơ sở", dv:"%", kh:"100"},
            {id:"ct_17", ten:"Tỷ lệ học sinh tốt nghiệp trung học phổ thông", dv:"%", kh:"100"},
            {id:"ct_18", ten:"Tỷ lệ dân cư được sử dụng nước sạch", dv:"%", kh:"100"},
            {id:"ct_19", ten:"Tỷ lệ thu gom và xử lý rác thải sinh hoạt", dv:"%", kh:"100"},
            {id:"ct_20", ten:"Tỷ lệ thu gom và xử lý rác thải y tế", dv:"%", kh:"100"},
            {id:"ct_21", ten:"Tỷ lệ khu dân cư đạt chuẩn an toàn về ANTT", dv:"%", kh:"100"},
            {id:"ct_22", ten:"Tỷ lệ hồ sơ hành chính giải quyết đúng hạn", dv:"%", kh:"100"},
            {id:"ct_23", ten:"Tỷ lệ sử dụng chữ ký số trong phát hành văn bản", dv:"%", kh:"100"},
            {id:"ct_24", ten:"Chỉ tiêu tuyển quân (giao quân)", dv:"Người", kh:"31/31"},
            {id:"ct_25", ten:"Tỷ lệ tội phạm về trật tự xã hội (giảm)", dv:"%", kh:"-5"},
            {id:"ct_26", ten:"Tỷ lệ điều tra khám phá án hình sự", dv:"%", kh:">85"},
            {id:"ct_27", ten:"Tai nạn giao thông (giảm cả 3 tiêu chí)", dv:"%", kh:"-10"},
            {id:"ct_28", ten:"Số vụ cháy nổ, tai nạn sự cố nghiêm trọng", dv:"Vụ", kh:"0"},
            {id:"ct_29", ten:"Xây dựng xã đạt tiêu chuẩn an toàn về PCCC", dv:"-", kh:"Đạt"},
            {id:"ct_30", ten:"Tỷ lệ giải quyết tin báo, tố giác tội phạm", dv:"%", kh:"100"},
            {id:"ct_31", ten:"Tỷ lệ giải quyết đơn thư khiếu nại, tố cáo", dv:"%", kh:"100"},
            {id:"ct_32", ten:"Tỷ lệ số hóa kết quả giải quyết TTHC", dv:"%", kh:"100"},
            {id:"ct_33", ten:"Tỷ lệ thanh toán trực tuyến", dv:"%", kh:"100"},
            {id:"ct_34", ten:"Tỷ lệ hòa giải thành ở cơ sở", dv:"%", kh:">85"},
            {id:"ct_35", ten:"Tỷ lệ dân quân tự vệ so với dân số", dv:"%", kh:"1.3"},
            {id:"ct_36", ten:"Xây dựng lực lượng công an xã chính quy", dv:"-", kh:"Đạt"},
            {id:"ct_37", ten:"Tỷ lệ đảng viên hoàn thành tốt nhiệm vụ", dv:"%", kh:">90"},
            {id:"ct_38", ten:"Số lượng đảng viên mới được kết nạp", dv:"Người", kh:"12"}
        ];

        onValue(ref(db, 'dashboard_binhhung/chi_tieu'), (snap) => {
            const data = snap.val() || {};
            const tbody = document.getElementById('indicators-body');
            tbody.innerHTML = '';

            indicators.forEach((it, idx) => {
                const value = data[it.id] || "0";
                const isFinished = parseFloat(value) >= parseFloat(it.kh);
                
                tbody.innerHTML += `
                    <tr>
                        <td class="text-center text-slate-400 font-bold">${idx + 1}</td>
                        <td class="text-slate-700">${it.ten}</td>
                        <td class="text-center text-slate-500">${it.dv}</td>
                        <td class="text-center font-bold text-slate-800">${it.kh}</td>
                        <td class="text-center font-black text-blue-600 bg-blue-50/50">${value}</td>
                        <td class="text-center">
                            <span class="status-badge ${isFinished ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'}">
                                ${isFinished ? '● Đạt' : '○ Tiến độ'}
                            </span>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: transparent; margin: 0; overflow: hidden; }
        .donut { position: relative; width: 170px; height: 170px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f1f5f9; }
        .donut-inner { position: absolute; inset: 15px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col items-center h-[420px]">
        <div class="absolute top-8 left-8 flex items-center gap-3">
            <div class="w-[5px] h-6 bg-indigo-700 rounded-full"></div>
            <h3 class="text-[13px] font-black text-indigo-800 uppercase italic">Tình hình Đơn thư</h3>
        </div>
        <div class="mt-12">
            <div class="donut" id="dt_donut">
                <div class="donut-inner">
                    <span id="dt_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                    <p class="text-[10px] font-black text-indigo-600 uppercase mt-1">Tổng đơn</p>
                </div>
            </div>
        </div>
        <div class="w-full grid grid-cols-2 gap-4 mt-auto mb-2">
            <div class="bg-[#059669] p-5 rounded-[24px] text-center text-white shadow-md">
                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Đã giải quyết</div>
                <div id="dt_xong" class="text-2xl font-black text-white">0</div>
            </div>
            <div class="bg-[#e11d48] p-5 rounded-[24px] text-center text-white shadow-md">
                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Đang xử lý</div>
                <div id="dt_cho" class="text-2xl font-black text-white">0</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/don_thu_moi'), (snap) => {
            const d = snap.val() || {};
            const tong = (d.ky_truoc || 0) + (d.moi_phat_sinh || 0);
            const rate = tong > 0 ? (d.da_giai_quyet/tong*100) : 0;
            document.getElementById('dt_tong').innerText = tong;
            document.getElementById('dt_xong').innerText = d.da_giai_quyet || 0;
            document.getElementById('dt_cho').innerText = Math.max(0, tong - (d.da_giai_quyet || 0));
            document.getElementById('dt_donut').style.background = `conic-gradient(#10b981 ${rate}%, #f1f5f9 0deg)`;
        });
    </script>
</body>
</html>

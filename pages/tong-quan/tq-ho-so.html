<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-2 overflow-hidden bg-transparent">
    <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col items-center relative h-[420px]">
        <div class="absolute top-8 left-8 flex items-center gap-3">
            <div class="w-[5px] h-6 bg-blue-800 rounded-full"></div>
            <h3 class="text-[13px] font-black text-blue-800 uppercase italic">Hồ sơ hành chính</h3>
        </div>
        <div class="flex-1 flex flex-col justify-center items-center mt-6">
            <div id="hs_luy_ke" class="text-7xl font-black italic tracking-tighter text-slate-900">0</div>
            <p class="text-[11px] font-bold text-slate-500 uppercase mt-2">Hồ sơ lũy kế trong tháng</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-8 w-full">
            <div class="bg-blue-50/50 p-5 rounded-[24px] border border-blue-100 text-center">
                <div class="text-[10px] uppercase font-black text-blue-600 mb-1">Đúng hạn</div>
                <div id="hs_rate" class="text-3xl font-black text-blue-700">0%</div>
            </div>
            <div class="bg-orange-50/50 p-5 rounded-[24px] border border-orange-100 text-center">
                <div class="text-[10px] uppercase font-black text-orange-600 mb-1">Hài lòng</div>
                <div id="hs_hai_long" class="text-3xl font-black text-orange-700">0%</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/ho_so_thang'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('hs_luy_ke').innerText = d.luy_ke || 0;
            document.getElementById('hs_rate').innerText = (d.luy_ke > 0 ? (d.truoc_han/d.luy_ke*100).toFixed(1) : 0) + "%";
            document.getElementById('hs_hai_long').innerText = (d.hai_long_percent || 0) + "%";
        });
    </script>
</body>
</html>

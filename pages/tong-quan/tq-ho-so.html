<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-5 rounded-[30px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-blue-50 flex flex-col h-[190px] justify-between italic">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <div class="w-6 h-6 bg-blue-700 rounded-lg flex items-center justify-center text-white text-[10px] shadow-lg shadow-blue-100">📋</div>
                <h3 class="text-[10px] font-black text-blue-900 uppercase tracking-[0.15em]">Hồ sơ TTHC (Lũy kế)</h3>
            </div>
            
            <p id="hs_tong_lk" class="text-3xl font-[900] text-slate-900 tracking-tighter leading-tight italic">0 hồ sơ</p>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider mt-1">Tổng hồ sơ đến hôm nay</p>
        </div>

        <div class="pt-3 border-t border-blue-50">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-black text-blue-800 uppercase tracking-tighter">Đã giải quyết:</span>
                <span id="hs_da_gq_lk" class="text-sm font-[900] text-blue-700">0 hồ sơ</span>
            </div>
            
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black text-emerald-700 uppercase tracking-tighter">Tỷ lệ đúng hạn:</span>
                <span id="hs_rate_lk" class="text-sm font-[900] text-emerald-600 border-b-2 border-emerald-100">0%</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Cấu hình Firebase
        const firebaseConfig = { 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Trỏ vào node dữ liệu chi tiết
        const hsRef = ref(db, 'dashboard_binhhung/ho_so_chi_tiet');

        onValue(hsRef, (snap) => {
            const d = snap.val() || {};
            
            // 1. Tổng hồ sơ lũy kế (lấy từ total_luy_ke)
            const tongLK = d.total_luy_ke || 0;
            
            // 2. Tổng đã giải quyết lũy kế (Trước hạn LK + Trong hạn LK + Trễ hạn LK)
            const daGQLK = (d.lk_res_before || 0) + (d.lk_res_in_time || 0) + (d.lk_res_late || 0);
            
            // 3. Tỷ lệ đúng hạn lũy kế (Trước hạn LK + Trong hạn LK) / Tổng đã GQ LK
            const dungHanLK = (d.lk_res_before || 0) + (d.lk_res_in_time || 0);
            const rateLK = daGQLK > 0 ? ((dungHanLK / daGQLK) * 100).toFixed(1) : 0;

            // Hiển thị dữ liệu
            document.getElementById('hs_tong_lk').innerText = tongLK.toLocaleString() + " hồ sơ";
            document.getElementById('hs_da_gq_lk').innerText = daGQLK.toLocaleString() + " hồ sơ";
            document.getElementById('hs_rate_lk').innerText = rateLK + "%";
        });
    </script>
</body>
</html>

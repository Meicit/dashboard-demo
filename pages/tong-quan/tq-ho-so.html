<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }</style>
</head>
<body class="p-4">
    <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative h-[380px]">
        <h3 class="absolute top-6 left-8 text-[11px] font-black text-blue-800 uppercase tracking-widest italic border-l-4 border-blue-800 pl-2">Hồ sơ hành chính</h3>
        <div class="flex-1 flex flex-col justify-center items-center h-[140px] mt-6">
            <div id="hs_luy_ke" class="text-6xl font-red italic tracking-tighter text-slate-900">0</div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2">Hồ sơ lũy kế trong tháng</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-8 w-full">
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center">
                <div class="text-[9px] uppercase font-black text-blue-600 tracking-tighter">Đúng hạn</div>
                <div id="hs_rate" class="text-2xl font-black text-blue-700 leading-none">0%</div>
            </div>
            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 text-center">
                <div class="text-[9px] uppercase font-black text-orange-600 tracking-tighter">Hài lòng</div>
                <div id="hs_hai_long" class="text-2xl font-black text-orange-700 leading-none">0%</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'dashboard_binhhung/ho_so_thang'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('hs_luy_ke').innerText = d.luy_ke || 0;
            document.getElementById('hs_rate').innerText = (d.luy_ke > 0 ? ((d.truoc_han/d.luy_ke)*100).toFixed(1) : 0) + "%";
            document.getElementById('hs_hai_long').innerText = (d.hai_long_percent || 0) + "%";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: transparent; margin: 0; overflow: hidden; }
        .donut { position: relative; width: 170px; height: 170px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f1f5f9; }
        .donut-inner { position: absolute; inset: 15px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col items-center h-[420px]">
        <div class="absolute top-8 left-8 flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-sm">💼</div>
            <h3 class="text-[13px] font-black text-slate-800 uppercase tracking-tight">Thủ tục hành chính</h3>
        </div>
        <div class="mt-12">
            <div class="donut" id="hs_donut">
                <div class="donut-inner">
                    <span id="hs_rate" class="text-4xl font-black text-slate-900 tracking-tighter">0%</span>
                    <p class="text-[10px] font-black text-blue-600 uppercase mt-1">Đúng hạn</p>
                </div>
            </div>
        </div>
        <div class="w-full grid grid-cols-2 gap-4 mt-auto mb-2">
            <div class="bg-blue-700 p-5 rounded-[24px] text-center text-white shadow-md">
                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Tổng hồ sơ</div>
                <div id="hs_luy_ke" class="text-2xl font-black text-white">0</div>
            </div>
            <div class="bg-orange-500 p-5 rounded-[24px] text-center text-white shadow-md">
                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Hài lòng</div>
                <div id="hs_hai_long" class="text-2xl font-black text-white">0%</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/ho_so_thang'), (snap) => {
            const d = snap.val() || {};
            const rate = d.luy_ke > 0 ? (d.truoc_han/d.luy_ke*100) : 0;
            document.getElementById('hs_luy_ke').innerText = (d.luy_ke || 0).toLocaleString();
            document.getElementById('hs_rate').innerText = rate.toFixed(1) + "%";
            document.getElementById('hs_hai_long').innerText = (d.hai_long_percent || 0) + "%";
            document.getElementById('hs_donut').style.background = `conic-gradient(#1d4ed8 ${rate}%, #f1f5f9 0deg)`;
        });
    </script>
</body>
</html>

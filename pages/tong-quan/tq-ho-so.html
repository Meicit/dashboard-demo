<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }
    </style>
</head>
<body class="p-1">
    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-[320px] justify-between">
        <div>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                    <span class="text-blue-600 text-lg">📋</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-600">Hồ sơ TTHC</h3>
            </div>

            <p id="display_luy_ke" class="text-3xl font-bold text-gray-900 tracking-tight">0 hồ sơ</p>
            
            <p id="display_rate" class="text-sm text-gray-500 mt-1 font-medium italic">Đúng hạn: 0%</p>
        </div>

        <div class="mt-2 pt-4 border-t border-slate-50">
            <p id="display_details" class="text-xs text-gray-500 font-medium">
                Đã GQ: 0 (0%)
            </p>
            <p class="text-[10px] text-slate-300 mt-2 uppercase tracking-widest font-bold">Dữ liệu tháng hiện tại</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = { 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Lấy dữ liệu từ node ho_so_thang
        onValue(ref(db, 'dashboard_binhhung/ho_so_thang'), (snap) => {
            const d = snap.val() || {};
            
            const luyKe = d.luy_ke || 0;
            const truocHan = d.truoc_han || 0;
            
            // Tính toán % đúng hạn và % đã giải quyết (giả định truoc_han là số đã giải quyết xong)
            const rateDungHan = luyKe > 0 ? (truocHan / luyKe * 100).toFixed(2) : 0;
            
            // 1. Cập nhật Tổng số hồ sơ
            document.getElementById('display_luy_ke').innerText = luyKe.toLocaleString('vi-VN') + " hồ sơ";
            
            // 2. Cập nhật tỷ lệ Đúng hạn
            document.getElementById('display_rate').innerText = `Đúng hạn: ${rateDungHan}%`;
            
            // 3. Cập nhật dòng chi tiết cuối cùng
            // Giả sử truoc_han là con số thực tế đã xử lý xong
            document.getElementById('display_details').innerText = `Đã GQ: ${truocHan.toLocaleString('vi-VN')} (${rateDungHan}%)`;
        });
    </script>
</body>
</html>

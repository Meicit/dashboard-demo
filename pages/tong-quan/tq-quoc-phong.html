<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }
        .bar-container { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .bar-label { width: 140px; font-size: 11px; font-weight: 600; color: #64748b; line-height: 1.2; }
        .bar-bg { flex: 1; height: 24px; background: #f1f5f9; border-radius: 4px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 4px; }
        .bar-value { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-weight: 800; font-size: 12px; color: #1e293b; }
    </style>
</head>
<body class="p-4">
    <div class="bg-white p-8 rounded-[32px] shadow-lg border border-slate-100 h-[380px]">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white text-[10px]">✓</div>
            <h3 class="text-base font-black text-slate-800 uppercase tracking-tight">Lĩnh vực Quốc phòng</h3>
        </div>
        <div class="space-y-4">
            <div class="bar-container"><span class="bar-label">Đăng ký khám NVQS</span><div class="bar-bg"><div class="bar-fill bg-blue-700" style="width: 100%"></div><span class="bar-value">8/8</span></div></div>
            <div class="bar-container"><span class="bar-label">Xây dựng dân quân</span><div class="bar-bg"><div class="bar-fill bg-emerald-400" style="width: 100%"></div><span class="bar-value">8/8</span></div></div>
        </div>
        <div class="mt-8 border-t border-dashed pt-6">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center text-sm font-bold">✚</div>
                <div><div class="text-[11px] font-black text-slate-800">Khám sức khỏe NVQS</div><div class="text-[10px] text-slate-500">Tỷ lệ hoàn thành 100%</div></div>
            </div>
        </div>
    </div>
</body>
</html>

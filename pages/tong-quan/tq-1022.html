<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: transparent; margin: 0; overflow: hidden; }
        .donut-chart { position: relative; width: 170px; height: 170px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #e2e8f0; }
        .donut-inner { position: absolute; inset: 15px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col items-center relative h-[420px]">
        <div class="absolute top-8 left-8 flex items-center gap-3">
            <div class="w-[5px] h-6 bg-blue-700 rounded-full"></div>
            <h3 class="text-[13px] font-black text-blue-800 uppercase italic">Phản ánh 1022</h3>
        </div>
        <div class="mt-12">
            <div class="donut-chart" id="pa_donut">
                <div class="donut-inner">
                    <span id="pa_tong" class="text-5xl font-black text-slate-900 leading-none">0</span>
                    <p class="text-[10px] font-black text-blue-600 uppercase mt-2">Tổng tin</p>
                </div>
            </div>
        </div>
        <div class="w-full grid grid-cols-2 gap-4 mt-10">
            <div class="bg-blue-600 p-5 rounded-[24px] text-center text-white">
                <div class="text-[10px] font-black uppercase mb-1">Đã xử lý</div>
                <div id="pa_xong" class="text-3xl font-black">0</div>
            </div>
            <div class="bg-amber-500 p-5 rounded-[24px] text-center text-white">
                <div class="text-[10px] font-black uppercase mb-1">Chờ GQ</div>
                <div id="pa_cho" class="text-3xl font-black">0</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/pa_1022'), (snap) => {
            const data = snap.val() || {};
            document.getElementById('pa_tong').innerText = data.tong || 0;
            document.getElementById('pa_xong').innerText = data.da_giai_quyet || 0;
            document.getElementById('pa_cho').innerText = data.chua_giai_quyet || 0;
            document.getElementById('pa_donut').style.background = `conic-gradient(#3b82f6 ${((data.da_giai_quyet/data.tong)*100)||0}%, #e2e8f0 0deg)`;
        });
    </script>
</body>
</html>

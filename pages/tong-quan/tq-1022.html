<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-[320px] justify-between">
        <div>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                    <span class="text-blue-600 text-lg">📞</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-600">Phản ánh 1022</h3>
            </div>
            <p id="pa_tong" class="text-3xl font-bold text-gray-900 tracking-tight">0 phản ánh</p>
            <p id="pa_rate" class="text-sm text-gray-500 mt-1 font-medium italic">Đã xử lý: 0%</p>
        </div>
        <div class="mt-2 pt-4 border-t border-slate-50">
            <p id="pa_details" class="text-xs text-gray-500 font-medium">Đang chờ: 0 phản ánh</p>
            <p class="text-[10px] text-slate-300 mt-2 uppercase tracking-widest font-bold">Dữ liệu từ tổng đài 1022</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/pa_1022'), (snap) => {
            const d = snap.val() || {};
            const rate = d.tong > 0 ? (d.da_giai_quyet / d.tong * 100).toFixed(1) : 0;
            document.getElementById('pa_tong').innerText = (d.tong || 0) + " phản ánh";
            document.getElementById('pa_rate').innerText = `Đã xử lý: ${rate}%`;
            document.getElementById('pa_details').innerText = `Đang chờ: ${d.chua_giai_quyet || 0} phản ánh`;
        });
    </script>
</body>
</html>

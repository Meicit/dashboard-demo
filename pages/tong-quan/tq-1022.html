<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }
        .donut-chart { position: relative; width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .donut-inner { position: absolute; inset: 12px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">
    <div class="bg-white p-8 rounded-[32px] shadow-lg border border-blue-50 flex flex-col items-center relative h-[380px]">
        <h3 class="absolute top-6 left-8 text-[11px] font-black text-blue-700 uppercase tracking-widest italic border-l-4 border-blue-700 pl-2">Phản ánh 1022</h3>
        <div class="donut-chart mt-6" id="pa_donut" style="background: #e2e8f0;">
            <div class="donut-inner text-center">
                <span id="pa_tong" class="text-4xl font-black text-slate-900 tracking-tighter">0</span>
                <p class="text-[9px] font-extrabold text-blue-500 uppercase">Tổng tin</p>
            </div>
        </div>
        <div class="w-full grid grid-cols-2 gap-3 mt-8">
            <div class="bg-blue-600 p-3 rounded-2xl text-center text-white shadow-md">
                <div id="pa_xong" class="text-xl font-black">0</div>
            </div>
            <div class="bg-amber-500 p-3 rounded-2xl text-center text-white shadow-md">
                <div id="pa_cho" class="text-xl font-black">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'dashboard_binhhung/pa_1022'), (snap) => {
            const d = snap.val() || {};
            const tong = d.tong || 0;
            const xong = d.da_giai_quyet || 0;
            document.getElementById('pa_tong').innerText = tong;
            document.getElementById('pa_xong').innerText = xong;
            document.getElementById('pa_cho').innerText = d.chua_giai_quyet || 0;
            document.getElementById('pa_donut').style.background = `conic-gradient(#3b82f6 ${(xong/tong*100) || 0}%, #e2e8f0 0deg)`;
        });
    </script>
</body>
</html>

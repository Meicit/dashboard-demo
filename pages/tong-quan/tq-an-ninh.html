<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }
        
        /* CSS Biểu đồ thanh ngang */
        .bar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .bar-label { width: 140px; font-size: 11px; font-weight: 600; color: #64748b; line-height: 1.2; }
        .bar-bg { flex: 1; height: 28px; background: #f1f5f9; border-radius: 4px; position: relative; display: flex; align-items: center; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .bar-value { margin-left: 12px; font-weight: 800; font-size: 13px; color: #1e293b; min-width: 20px; }

        /* Custom Scrollbar cho phần đánh giá nếu cần */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col h-[420px] overflow-hidden">
        
        <!-- Header: Lĩnh vực công an -->
        <div class="flex items-center gap-3 mb-8">
            <div class="w-8 h-8 bg-[#2563eb] rounded-lg flex items-center justify-center shadow-md shadow-blue-100">
                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                </svg>
            </div>
            <h3 class="text-base font-black text-slate-800 tracking-tight">Lĩnh vực công an</h3>
        </div>

        <!-- Section 1: Biểu đồ thống kê -->
        <div class="mb-6">
            <div class="bar-row">
                <span class="bar-label">Tội phạm về trật tự xã hội</span>
                <div class="bar-bg"><div id="fill_tp" class="bar-fill bg-[#5491be]" style="width: 0%"></div></div>
                <span id="val_tp" class="bar-value">0</span>
            </div>
            <div class="bar-row">
                <span class="bar-label">Phạm pháp hình sự</span>
                <div class="bar-bg"><div id="fill_hs" class="bar-fill bg-[#f3a939]" style="width: 0%"></div></div>
                <span id="val_hs" class="bar-value">0</span>
            </div>
            <div class="bar-row">
                <span class="bar-label">Khu phố đạt chuẩn an toàn thông tin</span>
                <div class="bar-bg"><div id="fill_at" class="bar-fill bg-[#e6704e]" style="width: 0%"></div></div>
                <span id="val_at" class="bar-value">0</span>
            </div>
            <div class="bar-row">
                <span class="bar-label">Tin báo/Tố giác được giải quyết</span>
                <div class="bar-bg"><div id="fill_tg" class="bar-fill bg-[#94a3b8]" style="width: 0%"></div></div>
                <span id="val_tg" class="bar-value">0</span>
            </div>
        </div>

        <!-- Section 2: Đánh giá chung -->
        <div class="border-t border-dashed border-slate-200 pt-5 mt-2">
            <h4 class="text-[12px] font-black text-slate-800 mb-4">Đánh giá chung</h4>
            <div class="grid grid-cols-2 gap-y-4 gap-x-6">
                <!-- Item 1 -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center text-red-500 font-bold">!</div>
                    <div class="leading-tight">
                        <div class="text-[11px] font-black text-slate-800">Vụ án hình sự nghiêm trọng</div>
                        <div id="val_ngh_trong" class="text-[10px] text-slate-400 font-semibold">0 (0%)</div>
                    </div>
                </div>
                <!-- Item 2 -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-50 rounded-full flex items-center justify-center text-amber-500">⚑</div>
                    <div class="leading-tight">
                        <div class="text-[11px] font-black text-slate-800">Tỷ lệ phá án</div>
                        <div id="val_pha_an" class="text-[10px] text-slate-400 font-semibold">0/0 vụ (0%)</div>
                    </div>
                </div>
                <!-- Item 3 -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500">⚖</div>
                    <div class="leading-tight">
                        <div class="text-[11px] font-black text-slate-800">Tỷ lệ phạm pháp thấp</div>
                        <div id="val_pham_phap" class="text-[10px] text-slate-400 font-semibold">0/1000 dân</div>
                    </div>
                </div>
                <!-- Item 4 -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-500">✓</div>
                    <div class="leading-tight">
                        <div class="text-[11px] font-black text-slate-800">Tin báo xử lý kịp thời</div>
                        <div id="val_kip_thoi" class="text-[10px] text-slate-400 font-semibold">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Lắng nghe dữ liệu an ninh trật tự
        onValue(ref(db, 'dashboard_binhhung/an_ninh'), (snap) => {
            const data = snap.val() || {};
            
            // 1. Cập nhật biểu đồ (Giả định thang đo tối đa là 20 để tính % độ dài thanh)
            const maxScale = 20;
            
            const updateBar = (idFill, idVal, value) => {
                const val = value || 0;
                document.getElementById(idVal).innerText = val;
                document.getElementById(idFill).style.width = Math.min((val / maxScale) * 100, 100) + "%";
            };

            updateBar('fill_tp', 'val_tp', data.toi_pham_xh);
            updateBar('fill_hs', 'val_hs', data.pham_phap_hs);
            updateBar('fill_at', 'val_at', data.khu_pho_at);
            updateBar('fill_tg', 'val_tg', data.tin_bao_gq);

            // 2. Cập nhật đánh giá chung
            document.getElementById('val_ngh_trong').innerText = `${data.vua_an_ngh_trong || 0} (0%)`;
            document.getElementById('val_pha_an').innerText = `${data.pha_an_so_vu || 0}/${data.pha_an_tong || 0} vụ (${data.pha_an_percent || 0}%)`;
            document.getElementById('val_pham_phap').innerText = `${data.ti_le_pham_phap || 0}/1000 dân`;
            document.getElementById('val_kip_thoi').innerText = `${data.xu_ly_kip_thoi || 0}%`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-[320px] justify-between">
        <div>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center">
                    <span class="text-amber-600 text-lg">⭐</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-600">An ninh trật tự</h3>
            </div>
            <div class="space-y-4">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Tội phạm trật tự xã hội</p>
                    <p id="an_v1" class="text-2xl font-bold text-gray-900">0 vụ</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Phạm pháp hình sự</p>
                    <p id="an_v2" class="text-2xl font-bold text-gray-900">0 vụ</p>
                </div>
            </div>
        </div>
        <div class="mt-2 pt-4 border-t border-slate-50">
            <p class="text-xs text-emerald-600 font-bold uppercase italic">Tai nạn giao thông: KIỀM CHẾ</p>
            <p class="text-[10px] text-slate-300 mt-2 uppercase tracking-widest font-bold">Trực ban 24/7</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/an_ninh'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('an_v1').innerText = (d.toi_pham_xh || 0) + " vụ";
            document.getElementById('an_v2').innerText = (d.pham_phap_hs || 0) + " vụ";
        });
    </script>
</body>
</html>

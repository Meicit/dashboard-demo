<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-2">
    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col h-[420px]">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-white text-xs">⭐</div>
            <h3 class="text-[13px] font-black text-slate-800 uppercase tracking-tight">An ninh trật tự</h3>
        </div>

        <div class="space-y-8 flex-1 flex flex-col justify-center">
            <div class="flex justify-between items-end border-b border-slate-100 pb-2">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Tội phạm về trật tự xã hội</p>
                    <p class="text-xs font-bold text-slate-600 mt-1">Giảm so với cùng kỳ</p>
                </div>
                <div id="v1" class="text-4xl font-black text-slate-900 italic">0</div>
            </div>

            <div class="flex justify-between items-end border-b border-slate-100 pb-2">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Phạm pháp hình sự</p>
                    <p class="text-xs font-bold text-slate-600 mt-1">Số vụ ghi nhận</p>
                </div>
                <div id="v2" class="text-4xl font-black text-slate-900 italic">0</div>
            </div>

            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Tai nạn giao thông</p>
                    <p class="text-xs font-bold text-slate-600 mt-1">Kiềm chế trên cả 3 tiêu chí</p>
                </div>
                <div id="v3" class="text-4xl font-black text-emerald-600 italic">Đạt</div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/an_ninh'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('v1').innerText = d.toi_pham_xh || 0;
            document.getElementById('v2').innerText = d.pham_phap_hs || 0;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; background: transparent; margin: 0; overflow: hidden; }</style>
</head>
<body class="p-1">
    <div class="bg-white p-4 rounded-[24px] shadow-sm border border-slate-100 flex flex-col h-[190px] justify-between">
        <div class="flex items-center gap-2 mb-2">
            <div class="w-7 h-7 bg-amber-100 rounded-lg flex items-center justify-center text-xs">⭐</div>
            <h3 class="text-[11px] font-bold text-gray-500 uppercase">An ninh trật tự</h3>
        </div>
        <div class="space-y-3">
            <div class="flex justify-between items-center border-b border-gray-50 pb-1">
                <span class="text-[10px] font-medium text-gray-400 uppercase">Tội phạm trật tự</span>
                <span id="an_v1" class="text-lg font-bold text-gray-800">0 vụ</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-50 pb-1">
                <span class="text-[10px] font-medium text-gray-400 uppercase">Pháp pháp hình sự</span>
                <span id="an_v2" class="text-lg font-bold text-gray-800">0 vụ</span>
            </div>
        </div>
        <div class="pt-2 flex justify-between items-center">
            <span class="text-[9px] font-black text-emerald-600 uppercase italic">GT: KIỀM CHẾ</span>
            <span class="text-[8px] text-slate-300 font-bold">24/7 LIVE</span>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app" }));
        onValue(ref(db, 'dashboard_binhhung/an_ninh'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('an_v1').innerText = (d.toi_pham_xh || 0) + " vụ";
            document.getElementById('an_v2').innerText = (d.pham_phap_hs || 0) + " vụ";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhập Liệu - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { 
            padding: 14px 24px; cursor: pointer; border-left: 4px solid transparent; color: #94a3b8; 
            font-weight: 600; font-size: 13px; display: block; text-decoration: none; transition: 0.2s;
        }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #1e293b; color: white; border-left-color: #3b82f6; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex: 1; width: 100%; border: none; background-color: #f1f5f9; }
    </style>
</head>
<body>
    <aside class="sidebar shadow-2xl">
        <div class="p-8 border-b border-slate-800 text-center">
            <h2 class="text-xl font-black text-blue-400 uppercase tracking-tighter">NHẬP LIỆU 2026</h2>
        </div>
        <nav class="flex-1 mt-6">
            <a href="nhap-lieu/nhap-lieu-don-thu.html" target="admin-frame" class="nav-item active" onclick="setActive(this)">📂 Cập nhật Đơn thư</a>
            <a href="nhap-lieu/nhap-lieu-pa-1022.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📞 Cập nhật 1022</a>
            <a href="nhap-lieu/nhap-lieu-ho-so-hanh-chinh.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📋 Kết quả giải quyết hồ sơ hành chính</a>
            <a href="nhap-lieu/nhap-lieu-van-ban.html" target="admin-frame" class="nav-item" onclick="setActive(this)">⚖️ Văn bản chỉ đạo</a>
            <a href="nhap-lieu/nhap-lieu-chi-tieu.html" target="admin-frame" class="nav-item" onclick="setActive(this)">📊 38 Chỉ tiêu KT-XH</a>
        </nav>
        <div class="p-4 border-t border-slate-800 text-center">
            <a href="index.html" class="text-[10px] font-bold text-blue-500 uppercase hover:underline">← Xem Dashboard</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="bg-white border-b p-4 px-8 flex justify-between items-center shadow-sm">
            <h2 id="admin-title" class="text-lg font-black text-slate-800 uppercase italic">Cập nhật Đơn thư</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <div class="text-red-600 text-[10px] font-black uppercase tracking-widest">Chế độ hiệu chỉnh</div>
            </div>
        </header>
        <iframe name="admin-frame" src="nhap-lieu/nhap-lieu-don-thu.html"></iframe>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('admin-title').innerText = el.innerText.substring(2);
        }
    </script>
</body>
</html>

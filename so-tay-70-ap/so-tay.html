<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm Điều hành Số - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS GIAO DIỆN ĐỒNG BỘ */
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; min-height: 100vh; }
        .main-header { background-size: 400% 400%; animation: gradientGIF 12s ease infinite; }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Chủ đề Xanh/Đỏ */
        body.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); }
        body.theme-do-hanhchinh .main-header { background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a); }
        
        /* Chế độ Sáng/Tối */
        body.bg-light-mode { background-color: #f8fafc; color: #0f172a; }
        body.bg-dark-mode { background-color: #0f172a; color: #f8fafc; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.95); border: 1px solid #e2e8f0; border-radius: 20px; }
        body.bg-dark-mode .glass-panel { background: rgba(30, 41, 59, 0.7); border-color: #334155; }
        
        .tab-btn.active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; font-weight: 800; }
    </style>
</head>
<body class="theme-xanh-ios bg-light-mode" id="body-context">

    <header class="main-header w-full py-6 px-12 text-white">
        <div class="max-w-[1550px] mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="logo.png" alt="Logo" class="w-16 h-auto">
                <div>
                    <h1 class="text-xl font-black uppercase tracking-widest font-['Montserrat']">IOC BINH HUNG</h1>
                    <p class="text-[10px] font-bold uppercase opacity-80">Trung tâm Điều hành Số 70 ấp</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="switchSystemTheme('xanh')" class="text-[9px] font-bold uppercase px-3 py-1 bg-blue-600 rounded">🔵 Xanh</button>
                <button onclick="switchSystemTheme('do')" class="text-[9px] font-bold uppercase px-3 py-1 bg-red-600 rounded">🔴 Đỏ</button>
                <button onclick="setTheme('light')" class="text-[9px] font-bold uppercase px-3 py-1 bg-white text-black rounded">☀️ Sáng</button>
                <button onclick="setTheme('dark')" class="text-[9px] font-bold uppercase px-3 py-1 bg-black rounded">🌙 Tối</button>
            </div>
        </div>
    </header>

    <div class="max-w-[1550px] mx-auto p-6 space-y-6">
        <div class="flex border-b border-slate-300 dark:border-slate-700">
            <button onclick="switchTab('ap', this)" class="tab-btn active px-6 py-3 uppercase text-xs">Thông tin Ấp</button>
            <button onclick="switchTab('chungcu', this)" class="tab-btn px-6 py-3 uppercase text-xs">Thông tin Chung cư</button>
        </div>

        <div id="content-ap" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            </div>

        <div id="content-chungcu" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6">
            </div>
    </div>

    <script>
        // Hàm chuyển tab
        window.switchTab = function(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(type === 'ap') {
                document.getElementById('content-ap').classList.remove('hidden');
                document.getElementById('content-chungcu').classList.add('hidden');
            } else {
                document.getElementById('content-ap').classList.add('hidden');
                document.getElementById('content-chungcu').classList.remove('hidden');
            }
        }

        // Hàm chuyển chủ đề màu
        window.switchSystemTheme = function(mode) {
            const body = document.getElementById('body-context');
            body.className = body.className.replace(/theme-xanh-ios|theme-do-hanhchinh/g, '') + (mode === 'do' ? ' theme-do-hanhchinh' : ' theme-xanh-ios');
        }

        // Hàm chuyển nền sáng/tối
        window.setTheme = function(mode) {
            const body = document.getElementById('body-context');
            body.className = body.className.replace(/bg-light-mode|bg-dark-mode/g, '') + (mode === 'dark' ? ' bg-dark-mode' : ' bg-light-mode');
        }
    </script>
</body>
</html>

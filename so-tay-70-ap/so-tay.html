<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm Điều hành số 39 ấp - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* [Giữ nguyên CSS của bạn, đảm bảo các class dynamic như .text-3d-white-main/sub hoạt động] */
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s ease, color 0.3s ease; }
        .container-wrapper { max-width: 1550px; margin: 0 auto; padding: 0 24px; width: 100%; }
        .glass-panel { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid; border-radius: 24px; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1); }
        .input-dark { border-radius: 12px; padding: 10px 14px; outline: none; border: 1px solid; }
        .tab-content { transition: all 0.2s; }
        .text-3d-white-main { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; color: #ffffff; text-shadow: 0 3px 0 #1e293b, 0 6px 3px rgba(0,0,0,0.4); }
        .text-3d-white-sub { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; color: #ffffff; text-shadow: 0 2px 2px rgba(0,0,0,0.5); }
        
        body.light-theme { background-color: #f8fafc; color: #0b4a8f; }
        body.dark-theme { background-color: #0f172a; color: #38bdf8; }
        .main-header { background-size: 400% 400%; animation: gradientGIF 12s ease infinite; }
        body.theme-xanh-ios .main-header { background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d); }
        body.theme-do-hanhchinh .main-header { background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a); }
        @keyframes gradientGIF { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="theme-xanh-ios light-theme" id="dynamic-body">

    <header class="main-header w-full py-6 px-12 mb-6">
        <div class="max-w-[1550px] mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <img src="logo.png" alt="Logo" class="w-20 h-auto">
                <div>
                    <p class="text-3xl text-3d-white-main">IOC BINH HUNG</p>
                    <h1 class="text-base text-3d-white-sub">Cổng thông tin và điều hành xã Bình Hưng, TP.HCM</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="switchSystemTheme('xanh')" class="bg-blue-600 text-white px-3 py-1 text-[10px] font-bold rounded">🔵 XANH</button>
                <button onclick="switchSystemTheme('do')" class="bg-red-600 text-white px-3 py-1 text-[10px] font-bold rounded">🔴 ĐỎ</button>
            </div>
        </div>
    </header>

    <div class="container-wrapper space-y-6" id="body-context">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-panel p-5 border-l-4 border-sky-500">
                <p class="text-[10px] font-bold uppercase">Đơn vị hành chính</p>
                <h3 class="text-2xl font-black mt-1">39 <span class="text-sm font-bold">Ấp quản lý</span></h3>
            </div>
            <div class="glass-panel p-5 border-l-4 border-emerald-500">
                <p class="text-[10px] font-bold uppercase">Tổng diện tích</p>
                <h3 class="text-2xl font-black mt-1">3.235,43 <span class="text-sm font-bold">ha</span></h3>
            </div>
            <div class="glass-panel p-5 border-l-4 border-amber-500">
                <p class="text-[10px] font-bold uppercase">Quy mô dân cư</p>
                <h3 id="total_households" class="text-2xl font-black mt-1">...</h3>
            </div>
            <div class="glass-panel p-5 border-l-4 border-indigo-500">
                <p class="text-[10px] font-bold uppercase">Tổng nhân khẩu</p>
                <h3 id="total_population" class="text-2xl font-black mt-1">...</h3>
            </div>
        </div>

        <div id="hamlets_grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

        // Các hàm xử lý giao diện...
        window.switchSystemTheme = (mode) => {
            document.body.className = mode === 'do' ? 'theme-do-hanhchinh' : 'theme-xanh-ios';
        };
        window.setTheme = (mode) => {
            document.body.className = document.body.className.replace(/light-theme|dark-theme/g, '') + ' ' + mode + '-theme';
        };
    </script>
</body>
</html>

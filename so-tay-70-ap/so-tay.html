<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Binh Hung - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .chart-container { height: 300px; }
    </style>
</head>
<body>

<div class="container-fluid p-4">
    <h2 class="mb-4">Dashboard IOC Bình Hưng</h2>

    <div class="row">
        <div class="col-md-3"><div class="card p-3 text-center"><h5>Tổng số Ấp</h5><h3 id="total-ap">39</h3></div></div>
        <div class="col-md-9"><div class="card p-3 text-center"><h5>Tổng Nhân khẩu</h5><h3 id="total-pop">...</h3></div></div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card p-3"><canvas id="barChart"></canvas></div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Top 5 Ấp đông dân nhất</h5>
                <ul id="top5-list" class="list-group"></ul>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = { /* Dán cấu hình Firebase của bạn ở đây */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    get(ref(db, 'du_lieu_39_ap')).then((snapshot) => {
        const data = snapshot.val();
        
        // 1. Dữ liệu Top 5
        const top5 = [...data].sort((a, b) => b.population_num - a.population_num).slice(0, 5);
        top5.forEach(ap => {
            document.getElementById('top5-list').innerHTML += `<li class="list-group-item">${ap.name}: ${ap.population_num} người</li>`;
        });

        // 2. Vẽ biểu đồ so sánh
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: data.map(d => d.name),
                datasets: [{ label: 'Số hộ', data: data.map(d => d.households_num), backgroundColor: 'blue' }]
            }
        });
    });
</script>
</body>
</html>

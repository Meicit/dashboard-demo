<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Chung cư - Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* ================= KỸ THUẬT NỀN ĐỘNG GRADIENT TẠI HEADER ĐỒNG BỘ HOME.HTML ================= */
        body.theme-xanh-ios .main-header {
            background: linear-gradient(-45deg, #0b4a8f, #05234a, #0d5cb3, #02142d);
            background-size: 400% 400%;
            animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(11, 74, 143, 0.15);
            border-bottom: 2px solid #032b5c;
        }

        body.theme-do-hanhchinh .main-header {
            background: linear-gradient(-45deg, #dc2626, #7f1d1d, #ef4444, #450a0a);
            background-size: 400% 400%;
            animation: gradientGIF 12s ease infinite;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15);
            border-bottom: 2px solid #991b1b;
        }

        @keyframes gradientGIF {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* LOGO ANIMATION CHUYỂN ĐỘNG NHẸ */
        .logo-main {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2)); }
            50% { transform: translateY(-3px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)); }
        }

        @media (max-width: 1024px) {
            .header-layout { flex-direction: column !important; }
            .theme-selector-vertical { 
                position: relative !important; top: 0 !important; right: 0 !important; 
                margin-top: 16px; flex-direction: row !important; space-x: 2; width: auto !important;
            }
            .theme-selector-vertical button { margin-left: 4px; margin-right: 4px; }
        }
    </style>
</head>
<body class="theme-xanh-ios bg-slate-100 flex flex-col min-h-screen" id="dynamic-body">

    <header class="main-header w-full py-6 px-6 md:px-12 select-none relative transition-all duration-300">
        <div class="max-w-[1550px] mx-auto flex flex-col items-center justify-center relative header-layout">
            
            <div class="flex flex-row items-center space-x-6 w-auto">
                <div class="flex-shrink-0">
                    <img src="../logo.png" alt="Logo" class="logo-main w-20 h-auto" onerror="this.src='logo.png'">
                </div>
                <div class="flex flex-col items-start justify-center space-y-2 text-left">
                    <p class="text-white font-black tracking-[0.12em] text-xl md:text-2xl lg:text-3xl uppercase leading-none m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)] font-['Montserrat']">
                        IOC BINH HUNG
                    </p>
                    <h1 class="title-main text-sm md:text-base lg:text-lg font-bold uppercase tracking-[0.08em] text-white/90 leading-tight m-0 p-0 drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]">
                        Cổng thông tin và điều hành xã Bình Hưng, Thành phố Hồ Chí Minh
                    </h1>
                </div>
            </div>

            <div class="theme-selector-vertical lg:absolute lg:top-0 lg:right-0 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-xl flex flex-col space-y-1.5 w-[75px] z-20 shadow-inner">
                <button onclick="switchSystemTheme('xanh')" id="btn-theme-xanh" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md">🔵 Xanh</button>
                <button onclick="switchSystemTheme('do')" id="btn-theme-do" class="w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white">🔴 Đỏ</button>
            </div>
            
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 py-8">
        <a href="hien-thi-ap-chungcu.html" class="mb-6 inline-flex items-center gap-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm transition-all duration-300 hover:-translate-y-0.5 shrink-0">
            ⬅️ Quay lại Trang Điều phối
        </a>
        
        <div class="bg-white p-6 rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <h2 class="text-xl md:text-2xl font-black text-sky-700 mb-6 uppercase text-center border-b border-slate-100 pb-4 tracking-tight">
                Bảng Thống kê Quản lý Nhà Chung cư Xã Bình Hưng
            </h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-sky-600 text-white text-[11px] uppercase tracking-wider">
                            <th class="p-4 rounded-tl-xl">Tên Chung cư</th>
                            <th class="p-4 text-center">Block</th>
                            <th class="p-4">Chủ đầu tư</th>
                            <th class="p-4 text-center">Năm XD</th>
                            <th class="p-4 text-center rounded-tr-xl">Tổng Căn hộ</th>
                        </tr>
                    </thead>
                    <tbody id="chung-cu-table" class="text-sm text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-slate-400 font-medium text-[11px] uppercase tracking-widest border-t border-slate-200 bg-white shadow-sm mt-auto">
        &copy; 2026 IOC BINH HƯNG — BẢN QUYỀN THUỘC UBND XÃ BÌNH HƯNG
    </footer>

    <script>
        const chungCuData = [
            { name: "CHUNG CƯ AVIEW 1", block: 1, cdt: "Tân Bình", nam: 2008, canHo: 192 },
            { name: "CHUNG CƯ AVIEW 2", block: 1, cdt: "Tân Bình", nam: 2019, canHo: 223 },
            { name: "CHUNG CƯ CONIC GARDEN", block: 2, cdt: "Lĩnh Phong", nam: 2006, canHo: 362 },

            { name: "CHUNG CƯ CONIC SKYWAY G", block: 1, cdt: "Lĩnh Phong", nam: 2016, canHo: 164 },

            { name: "CHUNG CƯ TERAROSSA C2", block: 1, cdt: "Khang Nam", nam: 2018, canHo: 129 },
            { name: "CHUNG CƯ THE MANSION", block: 5, cdt: "Quốc Cường GL", nam: 2012, canHo: 212 },
            { name: "CHUNG CƯ LOVERA VISTA", block: 1, cdt: "Khang Phúc", nam: 2021, canHo: 1310 },
            { name: "CHUNG CƯ SÀI GÒN INTELA", block: 1, cdt: "Bắc Phước Kiển", nam: 2021, canHo: 1068 },
            { name: "CHUNG CƯ HẠNH PHÚC A", block: 1, cdt: "Tổng Cty Xây dựng số 1", nam: 2018, canHo: 336 },
            { name: "CHUNG CƯ HẠNH PHÚC B", block: 1, cdt: "Tổng Cty Xây dựng số 1", nam: 2016, canHo: 218 },
            { name: "CHUNG CƯ HẠNH PHÚC C", block: 1, cdt: "Tổng Cty Xây dựng số 1", nam: 2016, canHo: 190 },
            { name: "CHUNG CƯ HẠNH PHÚC D", block: 1, cdt: "Tổng Cty Xây dựng số 1", nam: 2017, canHo: 0 },

            { name: "CHUNG CƯ SÀI GÒN MIA", block: 3, cdt: "Việt Tâm", nam: 2019, canHo: 964 },
            { name: "FLORA MIZUKI MP1, MP2", block: 2, cdt: "NNH Mizuki", nam: 2019, canHo: 590 },
            { name: "FLORA MIZUKI MP3-MP5", block: 3, cdt: "NNH Mizuki", nam: 2019, canHo: 847 },
            { name: "FLORA MIZUKI MP6-MP8", block: 3, cdt: "NNH Mizuki", nam: 2022, canHo: 760 },
            { name: "FLORA MIZUKI MP9, MPX", block: 2, cdt: "NNH Mizuki", nam: 2023, canHo: 177 },
            { name: "FLORA PANORAMA FP1", block: 1, cdt: "NNH Mizuki", nam: 2023, canHo: 164 },
            { name: "FLORA PANORAMA FP2, FP3", block: 2, cdt: "NNH Mizuki", nam: 2023, canHo: 252 },
            { name: "EHOMES NAM SÀI GÒN A", block: 3, cdt: "Nguyễn Sơn", nam: 2018, canHo: 218 },
            { name: "EHOMES NAM SÀI GÒN B,D,E,G,H", block: 2, cdt: "Nguyễn Sơn", nam: 2019, canHo: 1218 },
            { name: "CHUNG CƯ TERRA MI-A", block: 1, cdt: "Khang Nam", nam: 2022, canHo: 440 }
        ];

        const tbody = document.getElementById('chung-cu-table');
        chungCuData.forEach(cc => {
            tbody.innerHTML += `
                <tr class="border-b border-slate-100 hover:bg-sky-50 transition duration-200">
                    <td class="p-4 font-bold text-sky-900">${cc.name}</td>
                    <td class="p-4 text-center font-medium">${cc.block}</td>
                    <td class="p-4 text-slate-600">${cc.cdt}</td>
                    <td class="p-4 text-center text-slate-600">${cc.nam}</td>
                    <td class="p-4 text-center font-black text-sky-600">${cc.canHo.toLocaleString()}</td>
                </tr>
            `;
        });

        // HOÁN ĐỔI THEME HEADER (XANH / ĐỎ)
        window.switchSystemTheme = function(modeName) {
            const body = document.getElementById('dynamic-body');
            const btnXanh = document.getElementById('btn-theme-xanh');
            const btnDo = document.getElementById('btn-theme-do');
            if (modeName === 'do') {
                body.classList.remove('theme-xanh-ios'); body.classList.add('theme-do-hanhchinh');
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-red-600 text-white shadow-md";
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            } else {
                body.classList.remove('theme-do-hanhchinh'); body.classList.add('theme-xanh-ios');
                btnXanh.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 bg-blue-600 text-white shadow-md";
                btnDo.className = "w-full text-center text-[10px] font-extrabold uppercase py-1.5 rounded-lg transition-all duration-300 text-white/80 hover:text-white";
            }
        }
    </script>
</body>
</html>

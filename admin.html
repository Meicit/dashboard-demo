<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Dashboard - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 2rem; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 1.5rem; margin-bottom: 2rem; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 600; outline: none; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b pb-6">
            <h1 class="text-2xl font-black uppercase italic text-slate-800">Cập nhật số liệu Demo 2026</h1>
            <button onclick="saveAll()" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-12 rounded-xl shadow-lg transition-all active:scale-95">LƯU DỮ LIỆU</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="card border-t-4 border-blue-700">
                <h2 class="font-black text-blue-700 uppercase mb-4 italic">⚖️ Quản lý Hồ sơ TTHC</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Tổng hồ sơ</label><input type="number" id="hs_tong"></div>
                    <div><label class="text-blue-600 font-bold">Đã giải quyết</label><input type="number" id="hs_da_giai_quyet" class="bg-blue-50"></div>
                    <div><label>Trực tuyến</label><input type="number" id="hs_online"></div>
                    <div><label class="text-emerald-600 font-bold">Số Đúng hạn</label><input type="number" id="hs_dung_han_count" class="bg-emerald-50"></div>
                </div>
            </section>

            <section class="card border-t-4 border-emerald-500">
                <h2 class="font-black text-emerald-600 uppercase mb-4 italic">📊 30 Chỉ tiêu (%)</h2>
                <div id="indicators-list" class="grid grid-cols-3 gap-2 max-h-[300px] overflow-y-auto pr-2"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4",
            authDomain: "dashboard-demo-ce0da.firebaseapp.com",
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-demo-ce0da",
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        const rootRef = ref(db, 'dashboard_binhhung');

        // Tạo 30 ô chỉ tiêu
        const listContainer = document.getElementById('indicators-list');
        for(let i=1; i<=30; i++) {
            listContainer.innerHTML += `<div class="p-1 border rounded bg-slate-50"><label class="text-[9px]">#${i}</label><input type="number" id="ct_${i}" step="0.1" class="text-xs p-1"></div>`;
        }

        // Lưu dữ liệu
        window.saveAll = () => {
            const data = {
                ho_so: {
                    tong: Number(document.getElementById('hs_tong').value),
                    da_giai_quyet: Number(document.getElementById('hs_da_giai_quyet').value),
                    truc_tuyen: Number(document.getElementById('hs_online').value),
                    dung_han_count: Number(document.getElementById('hs_dung_han_count').value)
                },
                chi_tieu: {}
            };
            for(let i=1; i<=30; i++) { data.chi_tieu[`ct_${i}`] = Number(document.getElementById(`ct_${i}`).value); }
            
            set(rootRef, data).then(() => alert("✅ Đã cập nhật thành công!")).catch(e => alert("❌ Lỗi: " + e));
        };
    </script>
</body>
</html>

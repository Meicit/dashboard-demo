<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 24px; border: 1px solid #e2e8f0; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600; outline: none; margin-bottom: 12px; }
        .section-title { font-weight: 900; text-transform: uppercase; border-left: 4px solid #ef4444; padding-left: 12px; margin-bottom: 20px; color: #1e293b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <div class="card border-t-4 border-red-500 shadow-lg">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-2 z-10 border-b">
                <h3 class="font-black text-slate-800 uppercase tracking-tighter">Cập nhật 38 Chỉ tiêu nhiệm vụ chính trị</h3>
                <button onclick="saveChiTieu()" class="bg-red-600 text-white font-black px-6 py-2 rounded-lg hover:bg-red-700 transition-all shadow-md active:scale-95 text-xs">
                    💾 LƯU SỐ LIỆU
                </button>
            </div>
            
            <div id="input-container" class="space-y-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));
        const rootRef = ref(db, 'dashboard_binhhung/chi_tieu');

        const indicators = [
            {id:"ct_1", ten:"Tốc độ tăng trưởng giá trị sản xuất các ngành kinh tế", dv:"%"},
            {id:"ct_2", ten:"Tổng thu ngân sách nhà nước trên địa bàn", dv:"Tr.đ"},
            {id:"ct_3", ten:"Tỷ lệ giải ngân vốn đầu tư công", dv:"%"},
            {id:"ct_4", ten:"Tỷ lệ người dân tham gia bảo hiểm y tế", dv:"%"},
            {id:"ct_5", ten:"Tỷ lệ lao động trong độ tuổi tham gia bảo hiểm xã hội", dv:"%"},
            {id:"ct_6", ten:"Tỷ lệ trẻ em dưới 5 tuổi suy dinh dưỡng (thể nhẹ cân)", dv:"%"},
            {id:"ct_7", ten:"Tỷ lệ trẻ em dưới 5 tuổi suy dinh dưỡng (thể thấp còi)", dv:"%"},
            {id:"ct_8", ten:"Số lao động được tạo việc làm mới", dv:"Người"},
            {id:"ct_9", ten:"Tỷ lệ lao động qua đào tạo có bằng cấp, chứng chỉ", dv:"%"},
            {id:"ct_10", ten:"Tỷ lệ hộ nghèo theo chuẩn đa chiều", dv:"%"},
            {id:"ct_11", ten:"Tỷ lệ hộ cận nghèo theo chuẩn đa chiều", dv:"%"},
            {id:"ct_12", ten:"Số tiêu chí nông thôn mới nâng cao duy trì và giữ vững", dv:"Tiêu chí"},
            {id:"ct_13", ten:"Tỷ lệ ấp đạt chuẩn ấp văn hóa", dv:"%"},
            {id:"ct_14", ten:"Tỷ lệ gia đình đạt chuẩn gia đình văn hóa", dv:"%"},
            {id:"ct_15", ten:"Tỷ lệ trẻ em trong độ tuổi được tiêm chủng đầy đủ các loại vắc xin", dv:"%"},
            {id:"ct_16", ten:"Tỷ lệ học sinh tốt nghiệp trung học cơ sở", dv:"%"},
            {id:"ct_17", ten:"Tỷ lệ học sinh tốt nghiệp trung học phổ thông", dv:"%"},
            {id:"ct_18", ten:"Tỷ lệ dân cư được sử dụng nước sạch", dv:"%"},
            {id:"ct_19", ten:"Tỷ lệ thu gom và xử lý rác thải sinh hoạt", dv:"%"},
            {id:"ct_20", ten:"Tỷ lệ thu gom và xử lý rác thải y tế", dv:"%"},
            {id:"ct_21", ten:"Tỷ lệ khu dân cư đạt chuẩn an toàn về an ninh trật tự", dv:"%"},
            {id:"ct_22", ten:"Tỷ lệ hồ sơ hành chính giải quyết đúng hạn", dv:"%"},
            {id:"ct_23", ten:"Tỷ lệ sử dụng chữ ký số trong phát hành văn bản", dv:"%"},
            {id:"ct_24", ten:"Chỉ tiêu tuyển quân (giao quân)", dv:"Người"},
            {id:"ct_25", ten:"Tỷ lệ tội phạm về trật tự xã hội (giảm so với cùng kỳ)", dv:"%"},
            {id:"ct_26", ten:"Tỷ lệ điều tra khám phá án hình sự", dv:"%"},
            {id:"ct_27", ten:"Tai nạn giao thông (giảm cả 3 tiêu chí)", dv:"%"},
            {id:"ct_28", ten:"Số vụ cháy nổ, tai nạn sự cố nghiêm trọng", dv:"Vụ"},
            {id:"ct_29", ten:"Xây dựng xã đạt tiêu chuẩn an toàn về PCCC", dv:"Đạt/Không"},
            {id:"ct_30", ten:"Tỷ lệ giải quyết tin báo, tố giác tội phạm", dv:"%"},
            {id:"ct_31", ten:"Tỷ lệ giải quyết đơn thư khiếu nại, tố cáo", dv:"%"},
            {id:"ct_32", ten:"Tỷ lệ số hóa kết quả giải quyết thủ tục hành chính", dv:"%"},
            {id:"ct_33", ten:"Tỷ lệ thanh toán trực tuyến trên Cổng dịch vụ công", dv:"%"},
            {id:"ct_34", ten:"Tỷ lệ hòa giải thành ở cơ sở", dv:"%"},
            {id:"ct_35", ten:"Tỷ lệ dân quân tự vệ so với dân số", dv:"%"},
            {id:"ct_36", ten:"Xây dựng lực lượng công an xã chính quy, tinh nhuệ", dv:"Đạt/Không"},
            {id:"ct_37", ten:"Tỷ lệ đảng viên hoàn thành tốt nhiệm vụ trở lên", dv:"%"},
            {id:"ct_38", ten:"Số lượng đảng viên mới được kết nạp", dv:"Đảng viên"}
        ];

        const container = document.getElementById('input-container');
        indicators.forEach(it => {
            container.innerHTML += `
                <div class="border-b pb-2">
                    <label>${it.ten} (${it.dv})</label>
                    <input type="text" id="${it.id}" placeholder="Nhập kết quả thực hiện...">
                </div>
            `;
        });

        onValue(rootRef, (snap) => {
            const d = snap.val();
            if(d) Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; });
        }, { onlyOnce: true });

        window.saveChiTieu = () => {
            const data = {};
            indicators.forEach(it => { data[it.id] = document.getElementById(it.id).value || "0"; });
            update(rootRef, data).then(() => alert("✅ Đã lưu kết quả thực hiện!")).catch(e => alert("❌ Lỗi: " + e));
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 24px; }
        .card { background: white; border-radius: 20px; padding: 24px; border: 1px solid #e2e8f0; }
        .input-group { 
            background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        label { display: block; font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; line-height: 1.2; height: 22px; overflow: hidden; }
        input { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 700; color: #1e40af; outline: none; text-align: right; }
        input:focus { border-color: #3b82f6; ring: 2px ring-blue-100; }
        .unit { font-size: 9px; color: #94a3b8; font-weight: 700; margin-left: 4px; width: 25px; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto">
        <div class="card border-t-4 border-blue-600 shadow-lg">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="font-black text-slate-800 uppercase tracking-wider text-xl">Cập nhật 38 Chỉ tiêu KT-XH</h3>
                    <p class="text-slate-500 text-xs font-bold mt-1 uppercase">Hệ thống quản trị dữ liệu Real-time</p>
                </div>
                <button onclick="saveData()" class="bg-blue-600 text-white font-black px-8 py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg active:scale-95 text-xs flex items-center gap-2">
                    💾 LƯU DỮ LIỆU
                </button>
            </div>
            
            <div id="input-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", authDomain: "dashboard-demo-ce0da.firebaseapp.com", databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "dashboard-demo-ce0da", appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" };
        const db = getDatabase(initializeApp(firebaseConfig));
        const rootRef = ref(db, 'dashboard_binhhung/chi_tieu');

        const indicators = [ 
            {id:"ct_1", ten:"Tăng trưởng GTSC", dv:"%"}, {id:"ct_2", ten:"Thu ngân sách", dv:"Tr.đ"}, {id:"ct_3", ten:"Giải ngân ĐTC", dv:"%"}, 
            {id:"ct_4", ten:"Tham gia BHYT", dv:"%"}, {id:"ct_5", ten:"Tham gia BHXH", dv:"%"}, {id:"ct_6", ten:"Mầm non chuẩn", dv:"%"}, 
            {id:"ct_7", ten:"Tiểu học chuẩn", dv:"%"}, {id:"ct_8", ten:"THCS chuẩn", dv:"%"}, {id:"ct_9", ten:"Phòng học/10k dân", dv:"P"}, 
            {id:"ct_10", ten:"Hoàn thành THCS", dv:"%"}, {id:"ct_11", ten:"Giảm hộ nghèo", dv:"H"}, {id:"ct_12", ten:"Chuẩn NTM", dv:"TC"}, 
            {id:"ct_13", ten:"Ấp văn hóa", dv:"%"}, {id:"ct_14", ten:"Gia đình văn hóa", dv:"%"}, {id:"ct_15", ten:"Tiêm chủng đủ", dv:"%"}, 
            {id:"ct_16", ten:"Giải quyết việc làm", dv:"Ng"}, {id:"ct_17", ten:"Mô hình du lịch", dv:"MH"}, {id:"ct_18", ten:"Nước sạch", dv:"%"}, 
            {id:"ct_19", ten:"Rác sinh hoạt", dv:"%"}, {id:"ct_20", ten:"Rác y tế", dv:"%"}, {id:"ct_21", ten:"Nước thải CN", dv:"%"}, 
            {id:"ct_22", ten:"Hồ sơ đúng hạn", dv:"%"}, {id:"ct_23", ten:"Chữ ký số", dv:"%"}, {id:"ct_24", ten:"Nhập ngũ", dv:"Ng"}, 
            {id:"ct_25", ten:"Giảm tội phạm", dv:"%"}, {id:"ct_26", ten:"Khám phá án", dv:"%"}, {id:"ct_27", ten:"Giảm TNGT", dv:"%"}, 
            {id:"ct_28", ten:"Cháy nổ", dv:"V"}, {id:"ct_29", ten:"Không ma túy", dv:"Đ"}, {id:"ct_30", ten:"Phản ánh 1022", dv:"%"}, 
            {id:"ct_31", ten:"Văn bản điện tử", dv:"%"}, {id:"ct_32", ten:"Số hóa TTHC", dv:"%"}, {id:"ct_33", ten:"Thanh toán trực tuyến", dv:"%"}, 
            {id:"ct_34", ten:"Hòa giải cơ sở", dv:"%"}, {id:"ct_35", ten:"Kiểm tra PCCC", dv:"%"}, {id:"ct_36", ten:"Tin báo tội phạm", dv:"%"}, 
            {id:"ct_37", ten:"Dân quân tự vệ", dv:"%"}, {id:"ct_38", ten:"Đảng viên mới", dv:"Đ/v"} 
        ];

        // Tạo giao diện nhập liệu
        document.getElementById('input-grid').innerHTML = indicators.map(it => `
            <div class="input-group">
                <label>${it.ten}</label>
                <div class="flex items-center">
                    <input type="number" id="${it.id}" step="0.1">
                    <span class="unit">${it.dv}</span>
                </div>
            </div>
        `).join('');

        // Tải dữ liệu cũ
        onValue(rootRef, (snap) => {
            const data = snap.val();
            if(data) indicators.forEach(it => { if(data[it.id] !== undefined) document.getElementById(it.id).value = data[it.id]; });
        }, { onlyOnce: true });

        // Lưu dữ liệu
        window.saveData = () => {
            const updates = {};
            indicators.forEach(it => { updates[it.id] = Number(document.getElementById(it.id).value || 0); });
            update(rootRef, updates).then(() => alert("✅ Thành công!")).catch(e => alert("❌ Lỗi: " + e));
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật Tin tức Zalo OA - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 40px 20px; }
        .card { background: white; border-radius: 32px; padding: 40px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 600px; margin: 0 auto; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 16px; font-weight: 700; margin-bottom: 20px; outline: none; background-color: #f8fafc; }
        input:focus { border-color: #3b82f6; background-color: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-send { background-color: #0068ff; color: white; font-weight: 800; padding: 18px; border-radius: 16px; width: 100%; text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; transition: all 0.3s; }
        .btn-send:hover { background-color: #0056d2; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-800 uppercase italic">📱 Tin tức Zalo OA</h2>
            <p class="text-[10px] font-bold text-blue-600 uppercase mt-2">Cập nhật bảng tin lên Dashboard điều hành</p>
        </div>

        <form id="zaloForm">
            <label>Tiêu đề bài viết (Ngắn gọn)</label>
            <input type="text" id="zalo_title" placeholder="Ví dụ: Lịch tiếp công dân tuần tới..." required>

            <label>Đường dẫn bài viết (Link Zalo.me)</label>
            <input type="url" id="zalo_link" placeholder="Dán link bài viết từ Zalo OA tại đây..." required>

            <label>Link ảnh minh họa (Thumbnail)</label>
            <input type="text" id="zalo_image" placeholder="Dán link ảnh (hoặc để trống)...">

            <button type="submit" class="btn-send shadow-lg shadow-blue-200">
                🚀 Đăng tin lên Dashboard
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('zaloForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newsData = {
                title: document.getElementById('zalo_title').value,
                link: document.getElementById('zalo_link').value,
                image: document.getElementById('zalo_image').value || "https://img.icons8.com/color/144/zalo.png",
                date: new Date().toLocaleDateString('vi-VN')
            };

            const newsRef = ref(db, 'dashboard_binhhung/zalo_news');
            push(newsRef, newsData).then(() => {
                alert("✅ Đã đăng tin thành công lên Dashboard!");
                document.getElementById('zaloForm').reset();
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập liệu Văn bản - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        .card-container { background: white; border-radius: 32px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); height: calc(100vh - 80px); overflow: hidden; }
        .form-input { width: 100%; padding: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; font-weight: 700; margin-bottom: 16px; outline: none; }
        .form-input:focus { border-color: #3b82f6; background: white; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-3/5">
            <div class="card-container flex flex-col">
                <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                    <span class="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-100 px-3 py-1 rounded-full">🤖 Trợ lý AI Bóc tách Văn bản</span>
                    <button onclick="reloadAI()" class="text-[9px] font-bold text-slate-400 hover:text-blue-600 uppercase italic">🔄 Tải lại công cụ</button>
                </div>
                <iframe 
                    id="ai-iframe"
                    src="https://aistudio.google.com/app/prompts/9e9b9b1d-e1c3-47e2-bc4b-1742d4d9b0ce?embed=true" 
                    class="flex-1 w-full border-none"
                    allow="clipboard-read; clipboard-write"
                    title="AI Analyzer">
                </iframe>
                <div class="p-3 text-center bg-indigo-50">
                    <p class="text-[9px] text-indigo-400 font-bold uppercase">Nếu khung trên không hiển thị, hãy <a href="https://aistudio.google.com/app/prompts/9e9b9b1d-e1c3-47e2-bc4b-1742d4d9b0ce" target="_blank" class="text-indigo-700 underline">bấm vào đây để mở trực tiếp</a></p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/5">
            <div class="card-container p-8 overflow-y-auto">
                <h3 class="text-xl font-black text-slate-800 mb-6 uppercase italic">⚖️ Cập nhật nhiệm vụ chỉ đạo</h3>
                
                <form id="vbForm">
                    <label>Trích yếu văn bản</label>
                    <input type="text" id="title" class="form-input" placeholder="Nhập số hiệu/trích yếu..." required>

                    <label>Nội dung nhiệm vụ (Dán từ AI)</label>
                    <textarea id="content" rows="8" class="form-input" placeholder="Kết quả phân tích từ trợ lý AI..."></textarea>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Đơn vị chủ trì</label>
                            <select id="dept" class="form-input">
                                <option value="Văn phòng">Văn phòng</option>
                                <option value="Địa chính">Địa chính</option>
                                <option value="Tư pháp">Tư pháp</option>
                                <option value="Công an">Công an</option>
                            </select>
                        </div>
                        <div>
                            <label>Hạn hoàn thành</label>
                            <input type="date" id="deadline" class="form-input">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-blue-600 transition-all uppercase text-xs tracking-widest mt-4">
                        🚀 Lưu dữ liệu thời gian thực
                    </button>
                </form>

                <div class="mt-8 p-4 bg-amber-50 rounded-2xl border border-amber-100">
                    <h4 class="text-[10px] font-black text-amber-700 uppercase mb-2">Hướng dẫn nhanh:</h4>
                    <ul class="text-[11px] text-amber-800 space-y-1 font-medium italic">
                        <li>1. Tải tệp văn bản vào khung AI bên trái.</li>
                        <li>2. Sao chép kết quả bóc tách nhiệm vụ.</li>
                        <li>3. Dán vào biểu mẫu bên phải và nhấn Lưu.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function reloadAI() {
            document.getElementById('ai-iframe').src += '';
        }

        // Logic Firebase (Giữ nguyên cấu hình cũ của bạn tại đây)
        document.getElementById('vbForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Code push dữ liệu lên Firebase van_ban_chi_dao
            alert("Đã lưu dữ liệu thành công!");
        });
    </script>
</body>
</html>

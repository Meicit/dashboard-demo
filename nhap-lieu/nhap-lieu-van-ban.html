<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập liệu Văn bản Chỉ đạo - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #e5e7eb; height: 100%; }
        label { display: block; font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-weight: 700; margin-bottom: 16px; outline: none; font-size: 14px; }
        input:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; }
    </style>
</head>
<body>
    <div class="max-w-[1600px] mx-auto">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-black text-slate-800 uppercase italic leading-none">⚖️ Cập nhật Văn bản chỉ đạo</h2>
                <p class="text-[10px] font-bold text-blue-600 uppercase mt-2 tracking-widest italic">Hệ thống bóc tách dữ liệu thông minh</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">Trợ lý AI bóc tách hồ sơ</span>
                </div>
                <iframe src="https://ais-pre-vedmnktpzb3j4yd7w6dnjc-180608878984.asia-east1.run.app/?embed=true" 
                        style="width: 100%; height: 750px; border: 1px solid #e5e7eb; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);"
                        title="AI Document Analyzer"></iframe>
            </div>

            <div class="card shadow-lg">
                <div class="flex items-center gap-2 mb-6">
                    <span class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">Thông tin nhiệm vụ chỉ đạo</span>
                </div>
                
                <form id="vbForm">
                    <label>Số hiệu/Trích yếu văn bản</label>
                    <input type="text" id="vb_so_hieu" placeholder="Ví dụ: 123/UBND-VP - Về việc..." required>

                    <label>Nội dung nhiệm vụ cụ thể</label>
                    <textarea id="vb_nhiem_vu" rows="4" placeholder="Nhập nhiệm vụ đã bóc tách từ AI vào đây..." required></textarea>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Đơn vị chủ trì</label>
                            <select id="vb_don_vi">
                                <option value="Địa chính - Xây dựng">Địa chính - Xây dựng</option>
                                <option value="Tư pháp - Hộ tịch">Tư pháp - Hộ tịch</option>
                                <option value="Văn phòng">Văn phòng</option>
                                <option value="Công an - Quân sự">Công an - Quân sự</option>
                            </select>
                        </div>
                        <div>
                            <label>Thời hạn hoàn thành</label>
                            <input type="date" id="vb_deadline">
                        </div>
                    </div>

                    <label>Trạng thái thực hiện</label>
                    <select id="vb_status" class="text-blue-600">
                        <option value="Đang thực hiện">🟡 Đang thực hiện</option>
                        <option value="Hoàn thành">🟢 Hoàn thành</option>
                        <option value="Trễ hạn">🔴 Trễ hạn</option>
                    </select>

                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-blue-600 transition-all mt-4 uppercase tracking-widest text-xs">
                        🚀 Lưu nhiệm vụ vào hệ thống
                    </button>
                </form>
            </div>
        </div>
    </div>

    </body>
</html>

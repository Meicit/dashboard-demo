<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật Nhiệm vụ Chỉ đạo - UBND Xã Bình Hưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 32px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 800px; margin: 0 auto; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 16px; font-weight: 700; margin-bottom: 20px; outline: none; font-size: 14px; transition: all 0.2s; background-color: #f1f5f9; }
        input:focus, textarea:focus { border-color: #3b82f6; background-color: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-save { background-color: #0f172a; color: white; font-weight: 800; padding: 18px; border-radius: 16px; width: 100%; text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; transition: all 0.3s; }
        .btn-save:hover { background-color: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h2 class="text-3xl font-black text-slate-800 uppercase italic">⚖️ Phân hệ Chỉ đạo & Theo dõi Nhiệm vụ</h2>
            <p class="text-[10px] font-bold text-blue-600 uppercase mt-2 tracking-widest italic">Cập nhật dữ liệu thời gian thực (Real-time)</p>
        </header>

        <div class="card">
            <div class="mb-8 flex items-center gap-3">
                <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
                <span class="text-sm font-black text-slate-700 uppercase tracking-tight">Thông tin nhiệm vụ chi tiết</span>
            </div>

            <form id="missionForm">
                <label>Trích yếu văn bản chỉ đạo (Số hiệu/Ngày ban hành)</label>
                <input type="text" id="vb_title" placeholder="Ví dụ: 125/UBND-VP ngày 19/4/2026..." required>

                <label>Nội dung nhiệm vụ cụ thể</label>
                <textarea id="vb_content" rows="5" placeholder="Nhập chi tiết nhiệm vụ được giao..." required></textarea>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label>Bộ phận chủ trì thực hiện</label>
                        <select id="vb_dept">
                            <option value="Văn phòng">Văn phòng HĐND & UBND</option>
                            <option value="Địa chính - Xây dựng">Địa chính - Xây dựng</option>
                            <option value="Tư pháp - Hộ tịch">Tư pháp - Hộ tịch</option>
                            <option value="Văn hóa - Xã hội">Văn hóa - Xã hội</option>
                            <option value="Công an - Quân sự">Công an - Quân sự</option>
                        </select>
                    </div>
                    <div>
                        <label>Thời hạn hoàn thành (Deadline)</label>
                        <input type="date" id="vb_deadline" required>
                    </div>
                </div>

                <label>Trạng thái thực thi hiện tại</label>
                <select id="vb_status" class="text-blue-700">
                    <option value="Đang thực hiện">🟡 Đang thực hiện</option>
                    <option value="Hoàn thành">🟢 Hoàn thành</option>
                    <option value="Chưa thực hiện">⚪ Chưa thực hiện</option>
                </select>

                <button type="submit" class="btn-save shadow-xl shadow-blue-500/20 mt-6">
                    🚀 Cập nhật dữ liệu điều hành
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Hệ thống phục vụ công tác chỉ đạo điều hành - xã bình hưng</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Cấu hình Firebase giữ nguyên từ dự án của bạn
        const firebaseConfig = { 
            apiKey: "AIzaSyCjS8jJtoV5HLcYIpVTX1zP5DbyYmXsbh4", 
            authDomain: "dashboard-demo-ce0da.firebaseapp.com", 
            databaseURL: "https://dashboard-demo-ce0da-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "dashboard-demo-ce0da", 
            appId: "1:969593884637:web:47d4e6b03a51e7dcfbb034" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('missionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const missionData = {
                title: document.getElementById('vb_title').value,
                content: document.getElementById('vb_content').value,
                department: document.getElementById('vb_dept').value,
                deadline: document.getElementById('vb_deadline').value,
                status: document.getElementById('vb_status').value,
                updatedAt: new Date().toISOString()
            };

            const missionsRef = ref(db, 'dashboard_binhhung/van_ban_chi_dao/nhiem_vu_chi_tiet');
            const newMissionRef = push(missionsRef);
            
            set(newMissionRef, missionData)
                .then(() => {
                    alert("✅ Đã cập nhật nhiệm vụ thành công lên Dashboard!");
                    document.getElementById('missionForm').reset();
                })
                .catch((error) => {
                    alert("❌ Lỗi: " + error.message);
                });
        });
    </script>
</body>
</html>
